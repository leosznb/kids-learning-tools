<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>20分攻防戰 — 實用文寫作訓練 · 海納</title>
<style>
:root {
  --primary: #2563EB; --primary-bg: #EFF6FF; --primary-accent: #DBEAFE; --primary-dark: #1D4ED8;
  --slate-50: #F8FAFC; --slate-100: #F1F5F9; --slate-200: #E2E8F0; --slate-300: #CBD5E1;
  --slate-400: #94A3B8; --slate-500: #64748B; --slate-600: #475569; --slate-700: #334155; --slate-800: #1E293B; --slate-900: #0F172A;
  --red: #DC2626; --red-bg: #FEF2F2; --amber: #D97706; --amber-bg: #FFFBEB; --green: #059669; --green-bg: #ECFDF5;
  --radius: 10px; --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "PingFang HK", "Noto Sans HK", "Microsoft YaHei", system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--slate-50); color: var(--slate-800); line-height: 1.6; min-height: 100vh; }
/* TOP BAR */
.topbar { background: #fff; border-bottom: 1px solid var(--slate-200); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100; }
.topbar .logo { font-weight: 800; font-size: 1.1rem; color: var(--slate-800); letter-spacing: -0.01em; }
.topbar .logo .a{color:var(--primary);}
.topbar .user-tag { padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; color: #fff; background: var(--primary); white-space: nowrap; }
.scoreboard { display: flex; gap: 16px; align-items: center; }
.scoreboard .score-item { text-align: center; min-width: 46px; }
.scoreboard .score-label { font-size: 0.68rem; color: var(--slate-500); text-transform: uppercase; letter-spacing: .05em; }
.scoreboard .score-value { font-size: 1.5rem; font-weight: 800; color: var(--slate-800); }
.scoreboard .score-value.max { color: var(--primary); }
.scoreboard .score-divider { width: 1px; height: 28px; background: var(--slate-200); }
/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }
/* STAGE TABS */
.stage-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--slate-100); border-radius: var(--radius); padding: 4px; }
.stage-tab { flex: 1; padding: 12px 8px; text-align: center; border: none; background: transparent; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--slate-500); font-family: var(--font); transition: all .15s; white-space: nowrap; }
.stage-tab.active { background: #fff; color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stage-tab .badge { font-size: 0.7rem; display: block; color: var(--slate-400); margin-top: 1px; }
.stage-tab.active .badge { color: var(--primary); opacity: .6; }
/* QUESTION SELECTOR */
.q-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.q-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--slate-200); background: #fff; font-size: 0.8rem; cursor: pointer; font-family: var(--font); font-weight: 500; transition: all .15s; }
.q-btn:hover { border-color: var(--primary); }
.q-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.q-btn.done { border-color: var(--primary); border-style: dashed; color: var(--primary); }
.q-btn.done::after { content: " ✓"; }
/* GAME CARD */
.game-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--slate-200); overflow: hidden; }
.game-header { padding: 14px 20px; border-bottom: 1px solid var(--slate-100); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.game-header h2 { font-size: 1.05rem; font-weight: 700; }
.game-header .meta { font-size: 0.78rem; color: var(--slate-500); }
.game-body { padding: 20px; }
/* Stage 1: Format Puzzle */
.puzzle-instruction { font-size: 0.88rem; color: var(--slate-600); margin-bottom: 16px; padding: 12px; background: var(--primary-bg); border-radius: var(--radius-sm); }
.puzzle-workspace { border: 2px dashed var(--slate-200); border-radius: var(--radius); padding: 16px; min-height: 200px; }
.puzzle-slot { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 6px; border: 2px dotted var(--slate-300); border-radius: var(--radius-sm); min-height: 44px; transition: all .15s; cursor: pointer; background: var(--slate-50); }
.puzzle-slot.filled { border-style: solid; border-color: var(--primary); background: var(--primary-bg); }
.puzzle-slot.wrong { border-color: var(--red); background: var(--red-bg); animation: shake .4s ease; }
.puzzle-slot .slot-label { font-size: 0.75rem; color: var(--slate-400); font-weight: 600; min-width: 70px; white-space: nowrap; }
.puzzle-slot .slot-content { font-size: 0.86rem; color: var(--slate-800); flex: 1; word-break: break-all; }
.puzzle-slot .slot-remove { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--slate-200); color: var(--slate-600); font-size: 0.8rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.puzzle-pool { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
.puzzle-chip { padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--slate-300); background: #fff; font-size: 0.82rem; cursor: pointer; font-family: var(--font); transition: all .15s; user-select: none; }
.puzzle-chip:hover { border-color: var(--primary); background: var(--primary-bg); }
.puzzle-chip.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
.puzzle-chip.used { opacity: .3; pointer-events: none; }
.puzzle-feedback { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; display: none; }
.puzzle-feedback.show { display: block; }
.puzzle-feedback.ok { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
.puzzle-feedback.err { background: var(--red-bg); color: #991B1B; border: 1px solid #FECACA; }
@keyframes shake { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)} }
/* Stage 2 */
.content-passage { font-size: 0.92rem; line-height: 2.1; color: var(--slate-700); padding: 18px; background: var(--slate-50); border-radius: var(--radius-sm); margin-bottom: 16px; user-select: none; -webkit-user-select: none; }
.content-passage .info-point { cursor: pointer; padding: 2px 5px; border-radius: 3px; transition: all .1s; border-bottom: 2px solid transparent; white-space: nowrap; }
.content-passage .info-point:hover { background: var(--primary-accent); }
.content-passage .info-point.marked { background: var(--primary-accent); border-bottom-color: var(--primary); font-weight: 700; color: var(--primary-dark); }
.content-passage .info-point.reveal-missed { background: #FEF3C7; border-bottom-color: var(--amber); font-weight: 600; }
.content-passage .info-point.reveal-correct { background: #D1FAE5; border-bottom-color: #059669; font-weight: 600; }
.content-points-panel { margin-top: 14px; }
.cp-header { font-weight: 700; font-size: 0.88rem; margin-bottom: 8px; color: var(--slate-600); }
.found-points { display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; }
.found-point-tag { padding: 4px 10px; border-radius: 12px; background: var(--primary-accent); font-size: 0.78rem; font-weight: 600; color: var(--primary); }
/* Stage 3 */
.style-versions { display: flex; flex-direction: column; gap: 12px; }
.style-card { padding: 16px; border: 2px solid var(--slate-200); border-radius: var(--radius); background: #fff; transition: all .15s; }
.style-card.rated-low { border-color: var(--red); background: var(--red-bg); }
.style-card.rated-mid { border-color: var(--amber); background: var(--amber-bg); }
.style-card.rated-high { border-color: #059669; background: #ECFDF5; }
.style-card .style-text { font-size: 0.88rem; color: var(--slate-700); white-space: pre-wrap; line-height: 1.8; margin-bottom: 10px; }
.style-rank-select { display: flex; gap: 8px; flex-wrap: wrap; }
.rank-btn { padding: 6px 16px; border-radius: 14px; border: 1.5px solid var(--slate-300); background: #fff; font-size: 0.78rem; cursor: pointer; font-family: var(--font); font-weight: 600; transition: all .15s; }
.rank-btn.low.active { background: var(--red); color: #fff; border-color: var(--red); }
.rank-btn.mid.active { background: var(--amber); color: #fff; border-color: var(--amber); }
.rank-btn.high.active { background: #059669; color: #fff; border-color: #059669; }
/* BUTTONS */
.btn { padding: 10px 22px; border-radius: var(--radius-sm); border: none; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-ghost { background: transparent; color: var(--slate-500); border: 1.5px solid var(--slate-300); }
.action-bar { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
.action-feedback { flex: 1 0 100%; padding: 12px; border-radius: var(--radius-sm); font-size: 0.88rem; }
.action-feedback.good { background: #ECFDF5; color: #065F46; }
.action-feedback.info { background: var(--primary-bg); color: var(--primary-dark); }
.action-feedback.warn { background: var(--red-bg); color: #991B1B; }
/* RESULT OVERLAY */
.result-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 200; align-items: center; justify-content: center; }
.result-overlay.show { display: flex; }
.result-panel { background: #fff; border-radius: var(--radius); padding: 28px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.result-panel .big-score { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; }
.result-panel .big-label { font-size: 0.85rem; color: var(--slate-500); margin: 4px 0 16px; }
.result-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.88rem; border-bottom: 1px solid var(--slate-100); }
.result-row .rlabel { color: var(--slate-500); }
.result-row .rval { font-weight: 700; }
.score-bar { margin-top: 16px; }
.score-bar .bar-bg { height: 8px; background: var(--slate-100); border-radius: 4px; overflow: hidden; }
.score-bar .bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .5s ease; }
/* RESPONSIVE */
@media (max-width: 640px) {
  .topbar { padding: 10px 14px; }
  .stage-tab { font-size: 0.75rem; padding: 10px 6px; }
  .game-body { padding: 14px; }
  .puzzle-chip { font-size: 0.74rem; padding: 6px 10px; }
  .puzzle-slot .slot-label { min-width: 54px; font-size: 0.7rem; }
}
</style>
</head>

// ─── STATE ───
var curQ = 0, curStage = 1;
var completed = {};  // {qId: true}
var scores = { f:{}, c:{}, s:{} }; // {f: {qId: score}, ...}
var LS_KEY = 'pw_haina';

// Stage-specific
var formatPlacements = {};  // {slotIdx: chipText}
var selectedChipIdx = null;
var formatAttempts = {}; // {slotIdx: failCount}
var contentMarked = new Set();
var styleRatings = {};  // {cardIdx: 'low'|'mid'|'high'}
var styleSubmitted = false;
var stageDoneThisQ = {};

// ─── LOAD / SAVE ───
function loadState(){
  try {
    var d = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    completed = d.completed || {};
    scores = d.scores || {f:{},c:{},s:{}};
  } catch(e){}
}
function saveState(){
  try { localStorage.setItem(LS_KEY, JSON.stringify({completed:completed, scores:scores})); } catch(e){}
}
function resetStageState(){
  formatPlacements = {}; selectedChipIdx = null; formatAttempts = {};
  contentMarked = new Set();
  styleRatings = {}; styleSubmitted = false;
  stageDoneThisQ = {};
}

// ─── RENDER ───
function renderAll(){
  renderTabs();
  renderQSelector();
  renderGame();
  renderScoreboard();
}

function renderTabs(){
  var tabs = document.getElementById('stage-tabs');
  tabs.innerHTML = [1,2,3].map(function(s){
    var names = ['','🧩 第一關<br><span class="badge">格式拼圖 · 8分</span>','🎯 第二關<br><span class="badge">內容踩點 · 9分</span>','✍️ 第三關<br><span class="badge">行文診斷 · 3分</span>'];
    return '<button class="stage-tab'+(s===curStage?' active':'')+'" data-stage="'+s+'">'+names[s]+'</button>';
  }).join('');
}

function renderQSelector(){
  var qs = document.getElementById('q-selector');
  qs.innerHTML = Q.map(function(q,i){
    var cls = i===curQ ? 'active' : '';
    if (completed[i]) cls += ' done';
    return '<button class="q-btn '+cls+'" data-q="'+i+'">'+q.type.slice(0,2)+(i+1)+'</button>';
  }).join('');
}

function renderGame(){
  resetStageState();
  var q = Q[curQ];
  document.getElementById('game-header').innerHTML = '<h2>'+q.type+' <small style="font-weight:400;color:var(--slate-400);font-size:0.8em;">'+q.typeEn+'</small></h2><div class="meta">題 #'+(curQ+1)+'</div>';
  if (curStage===1) renderStage1(q);
  else if (curStage===2) renderStage2(q);
  else renderStage3(q);
  renderActionBar();
}

// ─── STAGE 1: Format Puzzle ───
function renderStage1(q){
  var body = document.getElementById('game-body');
  var pool = shuffle(q.formatAnswers.slice());
  var slotHTML = q.formatSlots.map(function(s,i){
    return '<div class="puzzle-slot" data-slot="'+i+'"><span class="slot-label">'+s.l+'</span><span class="slot-content" id="sc-'+i+'"></span><button class="slot-remove" id="sr-'+i+'" style="display:none">✕</button></div>';
  }).join('');
  var poolHTML = pool.map(function(p,i){ return '<div class="puzzle-chip" data-chip="'+i+'">'+p+'</div>'; }).join('');
  body.innerHTML = '<div class="puzzle-instruction">📋 點選下方元素，再點目標槽位放置。順序要正確！放錯有提示，3次後顯示答案。</div><div class="hint-box" id="hint-box" style="display:none;padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;font-size:.82rem;color:#92400E;margin-bottom:12px;"></div><div class="puzzle-workspace" id="pz-workspace">'+slotHTML+'</div><div class="puzzle-pool" id="pz-pool">'+poolHTML+'</div><div class="puzzle-feedback" id="pz-fb"></div>';
}

function renderStage2(q){
  var body = document.getElementById('game-body');
  // Sort points by length descending to avoid nested matching
  var pts = q.contentPoints.slice().sort(function(a,b){return b.length-a.length;});
  var escaped = pts.map(escRegex);
  var re = new RegExp('('+escaped.join('|')+')','g');
  var spanned = q.contentPassage.replace(re, function(m){ return '<span class="info-point" data-cp="'+escHtml(m)+'">'+m+'</span>'; });
  body.innerHTML = '<div class="puzzle-instruction">🎯 點選段落中<strong>你認為必須寫進文件的關鍵資訊</strong>。漏圈一個 = 內容分被扣。（共 '+q.contentPoints.length+' 個采分點）</div><div class="content-passage" id="cp-passage">'+spanned+'</div><div class="content-points-panel"><div class="cp-header">已標記：<span id="cp-count">0</span>/'+q.contentPoints.length+'</div><div class="found-points" id="cp-found"></div></div>';
}

function renderStage3(q){
  var body = document.getElementById('game-body');
  var shuffled = q.styleVersions.map(function(v,i){ return {text:v, orig:i}; });
  shuffle(shuffled);
  var cardsHTML = shuffled.map(function(v,i){
    return '<div class="style-card" data-card="'+i+'" data-orig="'+v.orig+'"><div class="style-text">'+escHtml(v.text)+'</div><div class="style-rank-select"><button class="rank-btn low" data-rating="low">⬇️ 下品（1分）</button><button class="rank-btn mid" data-rating="mid">➖ 中品（2分）</button><button class="rank-btn high" data-rating="high">⬆️ 上品（3分）</button></div></div>';
  }).join('');
  body.innerHTML = '<div class="puzzle-instruction">✍️ 以下三段是同一內容的不同寫法。請為每段評級：<strong>下品（口語/囉嗦） → 中品（正確但平淡） → 上品（精簡得體/書面語）</strong></div><div class="style-versions">'+cardsHTML+'</div>';
}

function renderActionBar(){
  var bar = document.getElementById('action-bar');
  if (curStage===1) bar.innerHTML = '<button class="btn btn-primary" id="btn-submit-f">✅ 提交格式拼圖</button><button class="btn btn-ghost" id="btn-skip-f">跳過（顯示答案）</button>';
  else if (curStage===2) bar.innerHTML = '<button class="btn btn-primary" id="btn-submit-c">✅ 提交內容踩點</button><button class="btn btn-ghost" id="btn-reveal-c">顯示所有采分點</button>';
  else bar.innerHTML = '<button class="btn btn-primary" id="btn-submit-s">✅ 提交行文評級</button>';
}

// ─── EVENT DELEGATION ───
document.addEventListener('click', function(e){
  var target = e.target;

  // Stage tabs
  if (target.closest('.stage-tab')) {
    curStage = parseInt(target.closest('.stage-tab').dataset.stage);
    renderAll();
    return;
  }

  // Question selector
  if (target.closest('.q-btn')) {
    curQ = parseInt(target.closest('.q-btn').dataset.q);
    resetStageState();
    renderAll();
    return;
  }

  // Stage 1: select chip
  if (target.classList.contains('puzzle-chip') && !target.classList.contains('used')) {
    document.querySelectorAll('.puzzle-chip').forEach(function(c){c.classList.remove('selected');});
    target.classList.add('selected');
    selectedChipIdx = parseInt(target.dataset.chip);
    return;
  }

  // Stage 1: place in slot
  if (target.closest('.puzzle-slot')) {
    var slotEl = target.closest('.puzzle-slot');
    var slotIdx = parseInt(slotEl.dataset.slot);
    if (selectedChipIdx !== null) {
      placeInSlot(slotIdx);
    }
    return;
  }

  // Stage 1: remove from slot
  if (target.classList.contains('slot-remove') || target.closest('.slot-remove')) {
    var rmBtn = target.classList.contains('slot-remove') ? target : target.closest('.slot-remove');
    var slotIdx = parseInt(rmBtn.parentElement.dataset.slot);
    removeFromSlot(slotIdx);
    e.stopPropagation();
    return;
  }

  // Stage 2: toggle content point
  if (target.classList.contains('info-point')) {
    toggleContentPoint(target);
    return;
  }

  // Stage 3: rate style
  if (target.classList.contains('rank-btn')) {
    if (styleSubmitted) return;
    var cardEl = target.closest('.style-card');
    var cardIdx = parseInt(cardEl.dataset.card);
    var rating = target.dataset.rating;
    rateStyle(cardIdx, rating);
    return;
  }

  // Action buttons
  if (target.id === 'btn-submit-f') { submitFormat(); return; }
  if (target.id === 'btn-skip-f') { skipFormat(); return; }
  if (target.id === 'btn-submit-c') { submitContent(); return; }
  if (target.id === 'btn-reveal-c') { revealContent(); return; }
  if (target.id === 'btn-submit-s') { submitStyle(); return; }

  // Result overlay close
  if (target.closest('.result-overlay') && !target.closest('.result-panel')) { closeResult(); return; }
});

// ─── STAGE 1 ACTIONS ───
function placeInSlot(slotIdx){
  var q = Q[curQ];
  var chips = document.querySelectorAll('.puzzle-chip');
  var chipEl = chips[selectedChipIdx];
  var chipText = chipEl.textContent;

  // Already placed elsewhere? Remove
  Object.keys(formatPlacements).forEach(function(k){
    if (formatPlacements[k]===chipText) {
      delete formatPlacements[k];
      document.getElementById('sc-'+k).textContent = '';
      document.getElementById('sr-'+k).style.display = 'none';
      document.getElementById(k).parentElement.classList.remove('filled','wrong');
    }
  });

  formatPlacements[slotIdx] = chipText;
  chipEl.classList.add('used');
  chipEl.classList.remove('selected');
  selectedChipIdx = null;

  // Update UI
  document.getElementById('sc-'+slotIdx).textContent = chipText;
  document.getElementById('sr-'+slotIdx).style.display = 'flex';
  document.querySelector('.puzzle-slot[data-slot="'+slotIdx+'"]').classList.add('filled');

  // Show hint
  var hintBox = document.getElementById('hint-box');
  hintBox.style.display = 'block';
  hintBox.textContent = '💡 '+q.formatSlots[slotIdx].h;
}

function removeFromSlot(slotIdx){
  var val = formatPlacements[slotIdx];
  delete formatPlacements[slotIdx];
  document.getElementById('sc-'+slotIdx).textContent = '';
  document.getElementById('sr-'+slotIdx).style.display = 'none';
  document.querySelector('.puzzle-slot[data-slot="'+slotIdx+'"]').classList.remove('filled','wrong');

  // Un-use the chip
  document.querySelectorAll('.puzzle-chip').forEach(function(c){
    if (c.textContent===val) c.classList.remove('used');
  });
}

function submitFormat(){
  var q = Q[curQ];
  var fb = document.getElementById('pz-fb');
  var allFilled = true, allCorrect = true;
  q.formatSlots.forEach(function(s,i){
    var slotEl = document.querySelector('.puzzle-slot[data-slot="'+i+'"]');
    slotEl.classList.remove('wrong');
    if (!formatPlacements[i]) { allFilled = false; allCorrect = false; slotEl.classList.add('wrong'); }
    else if (formatPlacements[i] !== q.formatAnswers[i]) {
      allCorrect = false; slotEl.classList.add('wrong');
      formatAttempts[i] = (formatAttempts[i]||0) + 1;
      if (formatAttempts[i] >= 3) {
        // Auto-fix after 3 attempts
        slotEl.classList.remove('wrong');
        slotEl.classList.add('filled');
        formatPlacements[i] = q.formatAnswers[i];
        document.getElementById('sc-'+i).textContent = q.formatAnswers[i];
        document.getElementById('sr-'+i).style.display = 'flex';
        document.querySelectorAll('.puzzle-chip').forEach(function(c){ if(c.textContent===q.formatAnswers[i]) c.classList.add('used'); });
      }
    }
  });
  if (!allFilled) { fb.className='puzzle-feedback show err'; fb.textContent='❌ 有空位未填，請完成所有槽位再提交。'; return; }
  if (!allCorrect) {
    fb.className='puzzle-feedback show err';
    var wrongLabels = q.formatSlots.filter(function(s,i){return formatPlacements[i]!==q.formatAnswers[i];}).map(function(s){return s.l;});
    fb.textContent = '❌ '+wrongLabels.length+' 個位置不正確：'+wrongLabels.join('、')+'。請調整後再試。';
    return;
  }
  fb.className='puzzle-feedback show ok';
  fb.textContent = '🎉 格式拼圖全對！8分滿分！得分關鍵：每個格式元素的標籤和位置都要精準。';
  scores.f[curQ] = 8;
  stageDoneThisQ[1] = true;
  saveState(); renderScoreboard(); renderQSelector();
  checkCompletion();
}

function skipFormat(){
  var q = Q[curQ];
  q.formatSlots.forEach(function(s,i){
    formatPlacements[i] = q.formatAnswers[i];
    document.getElementById('sc-'+i).textContent = q.formatAnswers[i];
    document.getElementById('sr-'+i).style.display = 'flex';
    document.querySelector('.puzzle-slot[data-slot="'+i+'"]').classList.add('filled');
  });
  document.querySelectorAll('.puzzle-chip').forEach(function(c){ c.classList.add('used'); });
  selectedChipIdx = null;
  document.getElementById('pz-fb').className = 'puzzle-feedback show ok';
  document.getElementById('pz-fb').textContent = '📖 已顯示正確答案，請對照學習。格式8分 = 每個元素的位置和措辭都要精準。';
}

// ─── STAGE 2 ACTIONS ───
function toggleContentPoint(el){
  var cp = el.dataset.cp;
  if (contentMarked.has(cp)) { contentMarked.delete(cp); el.classList.remove('marked'); }
  else { contentMarked.add(cp); el.classList.add('marked'); }
  document.getElementById('cp-count').textContent = contentMarked.size;
  var foundEl = document.getElementById('cp-found');
  foundEl.innerHTML = '';
  contentMarked.forEach(function(p){
    var tag = document.createElement('span');
    tag.className = 'found-point-tag';
    tag.textContent = p;
    foundEl.appendChild(tag);
  });
}

function submitContent(){
  var q = Q[curQ];
  var allSet = new Set(q.contentPoints);
  var hit = 0;
  allSet.forEach(function(p){ if (contentMarked.has(p)) hit++; });
  var score = Math.round(hit / allSet.size * 9);
  var missed = [];
  allSet.forEach(function(p){ if (!contentMarked.has(p)) missed.push(p); });

  // Reveal
  document.querySelectorAll('.info-point').forEach(function(el){
    el.classList.remove('marked');
    if (allSet.has(el.dataset.cp) && contentMarked.has(el.dataset.cp)) el.classList.add('reveal-correct');
    if (allSet.has(el.dataset.cp) && !contentMarked.has(el.dataset.cp)) el.classList.add('reveal-missed');
  });

  scores.c[curQ] = score;
  stageDoneThisQ[2] = true;
  saveState(); renderScoreboard(); renderQSelector();

  document.getElementById('action-bar').innerHTML = '<div class="action-feedback '+(score>=7?'good':'info')+'"><strong>內容得分：'+score+'/9</strong>（命中 '+hit+'/'+allSet.size+' 個采分點）<br>漏圈：'+ (missed.length?missed.join('、'):'無')+'<br><small>⚠️ 遺漏任何資訊點都會扣內容分——這就是「答不到點子上」。</small></div>';
  checkCompletion();
}

function revealContent(){
  var q = Q[curQ];
  var allSet = new Set(q.contentPoints);
  document.querySelectorAll('.info-point').forEach(function(el){
    if (allSet.has(el.dataset.cp)) el.classList.add('reveal-missed');
  });
  document.getElementById('action-bar').innerHTML = '<div class="action-feedback warn"><strong>📖 黃色標記 = 全部 '+allSet.size+' 個采分點。</strong><br><small>考試時，從題目情境中提取所有這些資訊點，一個都不能漏。</small></div>';
}

// ─── STAGE 3 ACTIONS ───
function rateStyle(cardIdx, rating){
  styleRatings[cardIdx] = rating;
  // Update UI
  var cardEl = document.querySelector('.style-card[data-card="'+cardIdx+'"]');
  cardEl.classList.remove('rated-low','rated-mid','rated-high');
  cardEl.classList.add('rated-'+(rating==='low'?'low':rating==='mid'?'mid':'high'));
  cardEl.querySelectorAll('.rank-btn').forEach(function(b){ b.classList.remove('active'); });
  cardEl.querySelector('.rank-btn.'+rating).classList.add('active');
}

function submitStyle(){
  var q = Q[curQ];
  var cards = document.querySelectorAll('.style-card');
  if (Object.keys(styleRatings).length < cards.length) { alert('請為每一段文字評級後再提交。'); return; }
  styleSubmitted = true;

  var correct = 0;
  cards.forEach(function(card){
    var cardIdx = parseInt(card.dataset.card);
    var origIdx = parseInt(card.dataset.orig);  // 0=下品, 1=中品, 2=上品
    var rating = styleRatings[cardIdx];
    var ratingNum = rating==='low'?0:rating==='mid'?1:2;
    if (ratingNum === origIdx) correct++;
  });

  var score = correct===3 ? 3 : correct===2 ? 2 : 1;
  var msg = correct===3 ? '🎉 三段全對！行文 3 分滿分！' : correct===2 ? '👍 對兩段。行文 2 分。再看上品的寫法。' : '📖 行文 1 分。關鍵：下品有口語詞，上品用正式書面語。';

  scores.s[curQ] = score;
  stageDoneThisQ[3] = true;
  saveState(); renderScoreboard(); renderQSelector();

  document.getElementById('action-bar').innerHTML = '<div class="action-feedback '+(score===3?'good':'info')+'"><strong>'+msg+'</strong><br><small>每段原始排序：A=下品(1分)、B=中品(2分)、C=上品(3分)。口語化（如「OK」「搞掂」「好正」）= 行文直接跌到下品。</small></div>';
  checkCompletion();
}

// ─── COMPLETION CHECK ───
function checkCompletion(){
  var allDone = scores.f[curQ]!=null && scores.c[curQ]!=null && scores.s[curQ]!=null;
  if (allDone && !completed[curQ]) {
    completed[curQ] = true;
    saveState();
    var total = scores.f[curQ] + scores.c[curQ] + scores.s[curQ];
    setTimeout(function(){ showResult(total); }, 500);
  }
}

function showResult(total){
  var panel = document.getElementById('result-panel');
  var maxTotal = 20;
  panel.innerHTML = '<div class="big-score">'+total+'</div><div class="big-label">/20 分</div>'+
    '<div class="result-row"><span class="rlabel">格式 Format</span><span class="rval">'+scores.f[curQ]+'/8</span></div>'+
    '<div class="result-row"><span class="rlabel">內容 Content</span><span class="rval">'+scores.c[curQ]+'/9</span></div>'+
    '<div class="result-row"><span class="rlabel">行文 Style</span><span class="rval">'+scores.s[curQ]+'/3</span></div>'+
    '<div class="score-bar"><div class="bar-bg"><div class="bar-fill" style="width:'+(total/maxTotal*100)+'%"></div></div></div>'+
    '<br><button class="btn btn-primary" onclick="closeResult()">👍 繼續練習</button>';
  document.getElementById('result-overlay').classList.add('show');
}
function closeResult(){ document.getElementById('result-overlay').classList.remove('show'); }

// ─── SCOREBOARD ───
function renderScoreboard(){
  document.getElementById('sc-f').textContent = scores.f[curQ]!=null ? scores.f[curQ] : '—';
  document.getElementById('sc-c').textContent = scores.c[curQ]!=null ? scores.c[curQ] : '—';
  document.getElementById('sc-s').textContent = scores.s[curQ]!=null ? scores.s[curQ] : '—';
  if (scores.f[curQ]!=null && scores.c[curQ]!=null && scores.s[curQ]!=null) {
    document.getElementById('sc-t').textContent = scores.f[curQ]+scores.c[curQ]+scores.s[curQ];
  } else {
    document.getElementById('sc-t').textContent = '—';
  }
}

// ─── HELPERS ───
function shuffle(arr){ for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }
function escRegex(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── INIT ───
loadState();
try { renderAll(); } catch(e) { document.getElementById('game-body').innerHTML = '<p style="color:red">載入失敗：'+e.message+'</p>'; console.error(e); }
})();
</script>
