<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中史人物配對 — 混淆陷阱特訓</title>
<style>
:root {
  --glass-bg: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.55);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-muted: #787878;
  --accent: #c41e3a;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --radius: 16px;
  --font: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: linear-gradient(135deg, #f5f0eb 0%, #e8e0d8 30%, #f0ece6 60%, #f8f5f0 100%);
  background-attachment: fixed;
  min-height: 100vh; min-height: 100dvh;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
body::before {
  content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(196,30,58,0.05) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(37,99,235,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
header { text-align: center; margin-bottom: 24px; }
header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
header p  { font-size: 0.9rem; color: var(--text-muted); }

.glass {
  background: var(--glass-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
}

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 18px; margin-bottom: 18px; flex-wrap: wrap;
}
.top-bar .round-info { font-size: 0.88rem; font-weight: 600; }
.top-bar .round-info span { color: var(--accent); }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
  border-radius: 99px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.6);
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  font-family: var(--font); color: var(--text);
}
.btn:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.green { background: var(--green); color: #fff; border-color: var(--green); }
.btn.small { padding: 6px 14px; font-size: 0.8rem; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

/* Instruction */
.instruction {
  padding: 12px 18px; margin-bottom: 16px; font-size: 0.85rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 10px;
}
.instruction .instr-icon { font-size: 1.2rem; flex-shrink: 0; }

/* ── Match area ── */
.match-area {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start;
}
@media (max-width: 600px) { .match-area { grid-template-columns: 1fr; } }

.match-col {
  padding: 14px; position: relative;
}
.match-col .col-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 2px solid rgba(0,0,0,0.06);
}
.match-col .col-header .col-icon { font-size: 1.2rem; }
.match-col .col-header .col-title { font-weight: 700; font-size: 0.9rem; flex: 1; }

/* ── Cards ── */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.match-card {
  display: flex; align-items: center; gap: 10px; padding: 11px 14px;
  border-radius: 12px; background: rgba(255,255,255,0.65);
  border: 1.5px solid rgba(0,0,0,0.08); cursor: pointer; transition: all 0.2s;
  user-select: none; -webkit-user-select: none;
}
.match-card:hover { border-color: rgba(0,0,0,0.18); background: rgba(255,255,255,0.85); }
.match-card:active { transform: scale(0.985); }
.match-card .card-dot {
  width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.12); flex-shrink: 0;
  transition: background 0.2s;
}
.match-card .card-text { flex: 1; font-size: 0.88rem; font-weight: 500; line-height: 1.4; }
.match-card .card-letter {
  font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
  width: 22px; text-align: center; flex-shrink: 0;
}

/* Selection states */
.match-card.person-selected { border-color: var(--accent); background: #fef0f2; box-shadow: 0 0 0 3px rgba(196,30,58,0.12); }
.match-card.person-selected .card-dot { background: var(--accent); transform: scale(1.4); }
.match-card.desc-selected { border-color: var(--blue); background: #f0f4ff; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.match-card.desc-selected .card-dot { background: var(--blue); transform: scale(1.4); }

/* Paired states — color by pair index */
.match-card.paired-0 { border-color: #3b82f6; background: #eff6ff; }
.match-card.paired-0 .card-dot { background: #3b82f6; }
.match-card.paired-1 { border-color: #8b5cf6; background: #f5f3ff; }
.match-card.paired-1 .card-dot { background: #8b5cf6; }
.match-card.paired-2 { border-color: #ec4899; background: #fdf2f8; }
.match-card.paired-2 .card-dot { background: #ec4899; }
.match-card.paired-3 { border-color: #f59e0b; background: #fffbeb; }
.match-card.paired-3 .card-dot { background: #f59e0b; }
.match-card.paired-4 { border-color: #10b981; background: #ecfdf5; }
.match-card.paired-4 .card-dot { background: #10b981; }
.match-card.paired-5 { border-color: #06b6d4; background: #ecfeff; }
.match-card.paired-5 .card-dot { background: #06b6d4; }
.match-card.paired-6 { border-color: #f43f5e; background: #fff1f2; }
.match-card.paired-6 .card-dot { background: #f43f5e; }
.match-card.paired-7 { border-color: #84cc16; background: #f7fee7; }
.match-card.paired-7 .card-dot { background: #84cc16; }
.match-card.paired-8 { border-color: #a855f7; background: #faf5ff; }
.match-card.paired-8 .card-dot { background: #a855f7; }
.match-card.paired-9 { border-color: #14b8a6; background: #f0fdfa; }
.match-card.paired-9 .card-dot { background: #14b8a6; }
.match-card.paired-10 { border-color: #fb923c; background: #fff7ed; }
.match-card.paired-10 .card-dot { background: #fb923c; }
.match-card.paired-11 { border-color: #6366f1; background: #eef2ff; }
.match-card.paired-11 .card-dot { background: #6366f1; }

/* Checked states */
.match-card.correct { border-color: #86efac; background: #f0fdf4; }
.match-card.correct .card-dot { background: var(--green); }
.match-card.wrong { border-color: #fca5a5; background: #fef2f2; }
.match-card.wrong .card-dot { background: var(--red); }
.match-card.unmatched-desc.correct { /* description that was correctly unmatched (distractor) */ }
.match-card.unmatched-person { border-color: #fca5a5; background: #fef2f2; }
.match-card.unmatched-desc.wrong { border-color: #fca5a5; background: #fef2f2; }

/* Check bar */
.check-bar { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.check-bar .btn { min-width: 120px; justify-content: center; }

/* Result */
.result-banner { display: none; text-align: center; padding: 16px; margin-top: 16px; border-radius: var(--radius); }
.result-banner.show { display: block; }
.result-banner.perfect { background: #f0fdf4; border: 1px solid #86efac; }
.result-banner.good { background: #fffbeb; border: 1px solid #fcd34d; }
.result-banner.poor { background: #fef2f2; border: 1px solid #fca5a5; }
.result-banner .rb-emoji { font-size: 2rem; margin-bottom: 4px; }
.result-banner .rb-text { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
.result-banner .rb-detail { font-size: 0.85rem; color: var(--text-muted); }

/* Trap hints */
.trap-hints { display: none; margin-top: 16px; }
.trap-hints.show { display: block; }
.trap-hints h4 { font-size: 0.9rem; margin-bottom: 8px; color: var(--accent); }
.trap-hint-item {
  padding: 10px 14px; background: #fffbeb; border: 1px solid #fcd34d;
  border-radius: 10px; margin-bottom: 6px; font-size: 0.85rem;
}

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px; padding: 40px 32px; text-align: center;
  max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-box .m-emoji { font-size: 3.5rem; margin-bottom: 12px; }
.modal-box h2 { font-size: 1.4rem; margin-bottom: 8px; }
.modal-box p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }

/* Desktop pair-count hint */
.pair-hint { text-align: center; font-size: 0.82rem; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>👥 中史人物配對</h1>
    <p>點擊左邊人物 → 點擊右邊描述 → 配對成功　·　混淆陷阱特訓</p>
  </header>

  <!-- Top bar -->
  <div class="top-bar glass" id="topBar">
    <div class="round-info">📋 第 <span id="roundNum">1</span>/<span id="roundTotal">4</span> 組</div>
    <button class="btn small" id="resetBtn" onclick="resetRound()">🔀 重新打亂</button>
    <button class="btn small" onclick="resetAll()">↺ 全部重置</button>
  </div>

  <!-- Instruction -->
  <div class="instruction glass">
    <span class="instr-icon">👆</span>
    <span><strong>步驟：</strong>點擊人物卡（紅框）→ 點擊描述卡（藍框）→ 配對形成（彩色）→ 全部配對後按「核對答案」<br><small>已配對的卡可再次點擊解除配對</small></span>
  </div>

  <!-- Match area -->
  <div class="match-area" id="matchArea"></div>
  <div class="pair-hint" id="pairHint"></div>

  <!-- Check bar -->
  <div class="check-bar" id="checkBar">
    <button class="btn accent" id="checkBtn" onclick="checkAnswers()">✅ 核對答案</button>
    <button class="btn green" id="nextBtn" onclick="nextRound()" style="display:none;">▶ 下一組</button>
  </div>

  <!-- Result -->
  <div class="result-banner" id="resultBanner"></div>

  <!-- Trap hints (shown after checking if wrong) -->
  <div class="trap-hints glass" id="trapHints"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="m-emoji" id="modalEmoji"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <button class="btn accent" onclick="closeModal()">繼續</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CHARACTER POOL
// ═══════════════════════════════════════
const PEOPLE = [
  { id: 'mao',    name: '毛澤東',   desc: '三面紅旗倡導者，中華人民共和國開國領袖', trap: null },
  { id: 'zhou',   name: '周恩來',   desc: '提出和平共處五項原則，於萬隆會議提出「求同存異」方針', trap: '注意：四個現代化由周恩來提出，但由鄧小平推動實行。考題常見混淆。' },
  { id: 'deng',   name: '鄧小平',   desc: '改革開放總設計師，推動家庭聯產承包責任制及設立經濟特區', trap: '注意：四個現代化由周恩來提出、鄧小平推行。勿將兩者「四個現代化」的功勞混淆。' },
  { id: 'lin',    name: '林彪',     desc: '文化大革命初期毛澤東的接班人，1971年策劃政變失敗（九一三事件）而身亡', trap: '⚠️ 高頻陷阱：林彪不是四人幫成員！林彪是毛的接班人，四人幫以江青為首。二者不可混淆。' },
  { id: 'jiang',  name: '江青',     desc: '四人幫之首，毛澤東妻子，1974年發起「批林批孔」運動', trap: '注意：江青是四人幫之首（非林彪），批林批孔由江青發起（非姚文元一人）。' },
  { id: 'liu',    name: '劉少奇',   desc: '原任中華人民共和國主席，文革中被誣蔑為「走資派」遭批鬥並開除出黨', trap: '⚠️ 高頻陷阱：劉少奇和鄧小平同被批為「走資派」，但劉少奇是國家主席、鄧小平是總書記。考題常混淆二人。' },
  { id: 'hua',    name: '華國鋒',   desc: '毛澤東逝世後出任中共中央主席，逮捕四人幫，後被鄧小平取代', trap: '⚠️ 高頻陷阱：華國鋒是抓捕四人幫的人，不是四人幫成員！考題常將華國鋒與四人幫混淆。' },
  { id: 'nixon',  name: '尼克遜',   desc: '1972年首位訪華的美國總統，中美發表《上海公報》，兩國關係開始正常化', trap: '注意：尼克遜是1972年訪華總統，卡特是1979年中美建交時的總統。勿混淆！' },
  { id: 'kiss',   name: '基辛格',   desc: '美國國家安全顧問，1971年秘密訪華為尼克遜訪華鋪路', trap: '注意：基辛格是國安顧問（非總統），1971年秘密訪華為尼克遜1972年訪華做準備。' },
  { id: 'tanaka', name: '田中角榮', desc: '1972年訪華的日本首相，簽署中日《聯合聲明》，實現中日邦交正常化', trap: null },
  { id: 'marshall', name: '馬歇爾', desc: '1946年美國特使來華調停國共衝突，促成雙方簽署《停戰協定》', trap: '⚠️ 高頻陷阱：馬歇爾（1946年特使，促成《停戰協定》）≠ 赫爾利（1945年大使，參與重慶談判）。二人極易混淆！' },
  { id: 'hurley', name: '赫爾利',   desc: '1945年美國駐華大使，參與國共重慶談判的調停工作', trap: '⚠️ 高頻陷阱：赫爾利（1945年大使，重慶談判）≠ 馬歇爾（1946年特使，《停戰協定》）。記住時間和職務！' },
  { id: 'wu',     name: '吳晗',     desc: '北京市副市長，編寫歷史劇《海瑞罷官》，該劇成為引發文化大革命序幕的導火線', trap: '⚠️ 高頻陷阱：吳晗是《海瑞罷官》的<strong>作者</strong>，姚文元是<strong>批判者</strong>。考題常將二人反轉！' },
  { id: 'yao',    name: '姚文元',   desc: '四人幫成員之一，1965年發表〈評新編歷史劇《海瑞罷官》〉，批判吳晗', trap: '⚠️ 高頻陷阱：姚文元批判《海瑞罷官》（作者是吳晗），姚是批判者非作者。同時姚是四人幫之一，勿與張春橋、王洪文混淆。' },
  { id: 'zhang',  name: '張春橋',   desc: '四人幫成員之一，曾任國務院副總理，文革後被逮捕審判', trap: '注意：張春橋是四人幫之一，勿與姚文元、王洪文混淆（同為四人幫成員）。' },
  { id: 'wang',   name: '王洪文',   desc: '四人幫成員之一，曾任中共中央副主席，文革後被逮捕審判', trap: '注意：王洪文是四人幫之一，勿與張春橋、姚文元混淆（同為四人幫成員）。' },
  { id: 'peng',   name: '彭德懷',   desc: '中國人民志願軍司令員，指揮抗美援朝戰爭，1959年廬山會議上書批評大躍進遭免職', trap: '注意：彭德懷指揮的是抗美援朝（1950-53），與林彪（指揮遼瀋/平津戰役）不同時期。廬山會議上書批評大躍進也是彭德懷。' },
];

// ═══════════════════════════════════════
// ROUNDS — 4 rounds with increasing difficulty
// ═══════════════════════════════════════
const ROUNDS = [
  {
    label: '基礎配對',
    peopleIds: ['mao','zhou','deng','lin','jiang','liu','nixon','tanaka'],
    extraDescs: [
      '1979年中美正式建交時的美國總統（此人非尼克遜）',
      '四人幫成員之一，曾任中共中央副主席（此人非本輪任何人物）',
    ],
  },
  {
    label: '混淆陷阱專攻',
    peopleIds: ['marshall','hurley','wu','yao','zhang','wang','kiss','hua'],
    extraDescs: [
      '美國外交官，1940年代曾參與國共調停（提示：注意區分1945年大使與1946年特使！）',
      '以筆桿子批判歷史劇《海瑞罷官》的文革人物（提示：區分作者與批判者！）',
    ],
  },
  {
    label: '考試模式（11對）',
    peopleIds: ['mao','zhou','deng','lin','jiang','liu','nixon','tanaka','kiss','wu','peng'],
    extraDescs: [
      '四人幫成員之一，發表〈評新編歷史劇《海瑞罷官》〉',
      '1979年中美建交時的美國總統',
      '1946年美國特使，促成國共《停戰協定》',
    ],
  },
  {
    label: '終極測試（13對）',
    peopleIds: ['mao','zhou','deng','lin','jiang','liu','nixon','tanaka','marshall','wu','yao','hua','peng'],
    extraDescs: [
      '四人幫成員之一，曾任國務院副總理',
      '四人幫成員之一，曾任中共中央副主席',
      '1945年美國駐華大使，參與國共重慶談判調停',
      '1979年中美正式建交時的美國總統',
    ],
  },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentRound = 0;
let checked = false;
let selectedPersonIdx = -1; // index in currentPeople
let pairs = {}; // { personIdx: descIdx }
let currentPeople = []; // [{id, name, desc, trap}]
let currentDescs = [];  // [{text, isExtra, sourcePersonId}]

function getPerson(id) { return PEOPLE.find(p => p.id === id); }

function buildRound(rIdx) {
  const r = ROUNDS[rIdx];
  currentPeople = r.peopleIds.map(id => getPerson(id));
  // Build desc pool: correct descs + extra distractors
  currentDescs = currentPeople.map(p => ({ text: p.desc, isExtra: false, sourcePersonId: p.id }));
  if (r.extraDescs) {
    r.extraDescs.forEach(t => currentDescs.push({ text: t, isExtra: true, sourcePersonId: null }));
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initRound() {
  buildRound(currentRound);
  // Shuffle descs (people stay in fixed order for clarity)
  currentDescs = shuffle(currentDescs);
  checked = false;
  selectedPersonIdx = -1;
  pairs = {};
  document.getElementById('trapHints').classList.remove('show');
  document.getElementById('resultBanner').classList.remove('show', 'perfect', 'good', 'poor');
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('resetBtn').disabled = false;
  renderAll();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderAll() {
  document.getElementById('roundNum').textContent = currentRound + 1;
  document.getElementById('roundTotal').textContent = ROUNDS.length;

  const area = document.getElementById('matchArea');

  // Left column: people
  let leftHtml = '';
  for (let i = 0; i < currentPeople.length; i++) {
    const p = currentPeople[i];
    const pairedIdx = pairs[i];
    let cls = 'match-card';
    if (selectedPersonIdx === i) cls += ' person-selected';
    if (pairedIdx !== undefined) cls += ' paired-' + (i % 12); // color by person index
    if (checked) {
      if (pairedIdx !== undefined) {
        const desc = currentDescs[pairedIdx];
        if (!desc.isExtra && desc.sourcePersonId === p.id) cls += ' correct';
        else cls += ' wrong';
      } else {
        cls += ' unmatched-person';
      }
    }
    leftHtml += `<div class="${cls}" onclick="selectPerson(${i})" data-col="person" data-idx="${i}">
      <div class="card-dot"></div>
      <div class="card-text">${p.name}</div>
      <div class="card-letter">${String.fromCharCode(65 + i)}</div>
    </div>`;
  }

  // Right column: descriptions
  let rightHtml = '';
  for (let j = 0; j < currentDescs.length; j++) {
    const d = currentDescs[j];
    // Find if this desc is paired to someone
    let pairedToPerson = null;
    for (const [pIdx, dIdx] of Object.entries(pairs)) {
      if (dIdx === j) { pairedToPerson = parseInt(pIdx); break; }
    }
    let cls = 'match-card';
    if (pairedToPerson !== null) cls += ' paired-' + (pairedToPerson % 12);
    if (checked) {
      if (pairedToPerson !== null) {
        const person = currentPeople[pairedToPerson];
        if (!d.isExtra && d.sourcePersonId === person.id) cls += ' correct';
        else cls += ' wrong';
      } else if (d.isExtra) {
        cls += ' correct'; // extra desc correctly unmatched
      } else {
        cls += ' unmatched-desc wrong'; // should have been matched but wasn't
      }
    }
    rightHtml += `<div class="${cls}" onclick="selectDesc(${j})" data-col="desc" data-idx="${j}">
      <div class="card-dot"></div>
      <div class="card-text">${d.text}</div>
      <div class="card-letter">${String.fromCharCode(65 + j)}</div>
    </div>`;
  }

  area.innerHTML = `
    <div class="match-col glass">
      <div class="col-header"><span class="col-icon">👤</span><span class="col-title">人物</span></div>
      <div class="card-list">${leftHtml}</div>
    </div>
    <div class="match-col glass">
      <div class="col-header"><span class="col-icon">📝</span><span class="col-title">描述</span></div>
      <div class="card-list">${rightHtml}</div>
    </div>`;

  // Pair count hint
  const paired = Object.keys(pairs).length;
  const total = currentPeople.length;
  document.getElementById('pairHint').textContent = `已配對：${paired}/${total}`;
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
function selectPerson(i) {
  if (checked) return;
  // If this person is already paired, un-pair
  if (pairs[i] !== undefined) {
    delete pairs[i];
    selectedPersonIdx = -1;
    renderAll();
    return;
  }
  // Select to pair
  selectedPersonIdx = i;
  renderAll();
}

function selectDesc(j) {
  if (checked) return;
  // If this desc is already paired to someone, un-pair
  let pairedTo = null;
  for (const [pIdx, dIdx] of Object.entries(pairs)) {
    if (dIdx === j) { pairedTo = parseInt(pIdx); break; }
  }
  if (pairedTo !== null) {
    delete pairs[pairedTo];
    selectedPersonIdx = -1;
    renderAll();
    return;
  }
  // If no person selected, do nothing
  if (selectedPersonIdx === -1) return;
  // Pair them
  pairs[selectedPersonIdx] = j;
  selectedPersonIdx = -1;
  renderAll();
}

// ═══════════════════════════════════════
// CHECK
// ═══════════════════════════════════════
function checkAnswers() {
  checked = true;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('resetBtn').disabled = true;

  // Calculate score
  let correctPairs = 0;
  const totalPairs = currentPeople.length;
  const wrongPairs = [];

  for (let i = 0; i < currentPeople.length; i++) {
    const person = currentPeople[i];
    const pairedIdx = pairs[i];
    if (pairedIdx !== undefined) {
      const desc = currentDescs[pairedIdx];
      if (!desc.isExtra && desc.sourcePersonId === person.id) {
        correctPairs++;
      } else {
        wrongPairs.push({ person, desc, personIdx: i });
      }
    } else {
      wrongPairs.push({ person, desc: null, personIdx: i });
    }
  }

  renderAll();

  // Result banner
  const banner = document.getElementById('resultBanner');
  banner.classList.add('show');
  if (correctPairs === totalPairs) {
    banner.className = 'result-banner show perfect';
    banner.innerHTML = `<div class="rb-emoji">🎯</div><div class="rb-text">全部正確！(${correctPairs}/${totalPairs})</div><div class="rb-detail">人物配對已掌握，考試穩拿8-9分</div>`;
  } else if (correctPairs >= totalPairs - 2) {
    banner.className = 'result-banner show good';
    banner.innerHTML = `<div class="rb-emoji">👍</div><div class="rb-text">接近滿分 (${correctPairs}/${totalPairs})</div><div class="rb-detail">紅色配對有誤，查看下方混淆提示後再練</div>`;
  } else {
    banner.className = 'result-banner show poor';
    banner.innerHTML = `<div class="rb-emoji">📚</div><div class="rb-text">需加強練習 (${correctPairs}/${totalPairs})</div><div class="rb-detail">紅色配對有誤，重點記憶下方混淆陷阱</div>`;
  }

  // Trap hints
  if (wrongPairs.length > 0) {
    const hintsDiv = document.getElementById('trapHints');
    let hintsHtml = '<h4>⚠️ 常見混淆陷阱對照</h4>';
    const shownTraps = new Set();
    for (const wp of wrongPairs) {
      if (wp.person.trap && !shownTraps.has(wp.person.id)) {
        shownTraps.add(wp.person.id);
        hintsHtml += `<div class="trap-hint-item"><strong>${wp.person.name}</strong>：${wp.person.trap}</div>`;
      }
    }
    hintsDiv.innerHTML = hintsHtml;
    hintsDiv.classList.add('show');
  }

  banner.scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function resetRound() {
  initRound();
}

function nextRound() {
  if (currentRound < ROUNDS.length - 1) {
    currentRound++;
    initRound();
  } else {
    showModal('🏆', '全部4組完成！', '人物配對已反覆練習。考試配對題穩拿！');
    currentRound = 0;
    initRound();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  if (confirm('確定要重置全部進度？將回到第1組，所有配對重新打亂。')) {
    currentRound = 0;
    initRound();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function showModal(emoji, title, desc) {
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !checked) { e.preventDefault(); checkAnswers(); }
  if (e.key === 'ArrowRight' && checked) { e.preventDefault(); nextRound(); }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
initRound();
</script>
</body>
</html>
