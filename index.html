<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
header{text-align:center;padding:40px 20px 20px;}
header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;}
header p{color:var(--muted);font-size:1rem;}
.kid-tabs{display:flex;justify-content:center;gap:12px;margin:30px 0 20px;flex-wrap:wrap;}
.kid-tab{padding:12px 28px;border-radius:999px;border:none;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.06);color:var(--muted);}
.kid-tab:hover{transform:translateY(-2px);}
.kid-tab.active{color:#fff;box-shadow:var(--shadow);}
.kid-tab[data-kid="haina"]{border:2px solid #3b82f6;}
.kid-tab[data-kid="haina"].active{background:#3b82f6;}
.kid-tab[data-kid="yourong"]{border:2px solid #16a34a;}
.kid-tab[data-kid="yourong"].active{background:#16a34a;}
.kid-tab[data-kid="duoduo"]{border:2px solid #f97316;}
.kid-tab[data-kid="duoduo"].active{background:#f97316;}
.subjects{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding:0 4px;}
.subj-chip{padding:8px 16px;border-radius:999px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);}
.subj-chip:hover{background:rgba(255,255,255,.05);}
.subj-chip.active{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.tool-card{background:var(--card);border-radius:var(--radius);padding:20px;transition:all .2s;cursor:pointer;border:1px solid rgba(255,255,255,.05);text-decoration:none;color:inherit;display:block;}
.tool-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:rgba(255,255,255,.15);}
.tool-card .icon{font-size:2rem;margin-bottom:12px;display:block;}
.tool-card h3{font-size:1.1rem;font-weight:600;margin-bottom:6px;}
.tool-card .desc{font-size:.85rem;color:var(--muted);}
.tool-card .subj-tag{display:inline-block;margin-top:12px;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.06);color:var(--muted);}
.subject-group{margin-bottom:36px;}
.subject-group h2{font-size:1.25rem;font-weight:700;margin-bottom:16px;padding-left:8px;border-left:3px solid;display:flex;align-items:center;gap:8px;}
.subject-group h2 .icon{font-size:1.4rem;}
.kid-section{display:none;animation:fadeIn .3s ease;}
.kid-section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:640px){.container{padding:12px;}header h1{font-size:1.6rem;}.tools-grid{grid-template-columns:1fr;}}
</style>
</head>

let currentKid = 'haina';
let currentSubject = 'all';

function switchKid(kid) {
  currentKid = kid;
  currentSubject = 'all';
  document.querySelectorAll('.kid-tab').forEach(t => t.classList.toggle('active', t.dataset.kid === kid));
  render();
}

function switchSubject(subj) {
  currentSubject = subj;
  render();
}

function render() {
  const container = document.getElementById('content');
  const subjects = KIDS[currentKid];
  
  // Subject chips
  const subjNames = subjects.map(s => s.label);
  const uniqueSubjs = [...new Set(subjNames)];
  
  let chipsHtml = `<div class="subjects">`;
  chipsHtml += `<button class="subj-chip ${'active':currentSubject==='all'}" onclick="switchSubject('all')">全部</button>`;
  subjects.forEach(s => {
    const isActive = currentSubject === s.label;
    chipsHtml += `<button class="subj-chip ${'active':isActive}" style="${isActive ? 'background:'+s.color+';color:#fff;':''}" onclick="switchSubject('${s.label}')">${s.icon} ${s.label}</button>`;
  });
  chipsHtml += `</div>`;
  
  // Tools grid by subject
  let toolsHtml = '';
  subjects.forEach(subj => {
    if (currentSubject !== 'all' && currentSubject !== subj.label) return;
    const tools = subj.tools;
    if (tools.length === 0) return;
    
    toolsHtml += `<div class="subject-group">
      <h2 style="border-color:${subj.color};color:${subj.color}">
        <span class="icon">${subj.icon}</span>${subj.label}
        <span style="margin-left:auto;font-size:.85rem;color:var(--muted);font-weight:400;">${tools.length} tools</span>
      </h2>
      <div class="tools-grid">`;
    
    tools.forEach(t => {
      toolsHtml += `<a href="${t.file}" class="tool-card">
        <span class="icon">${t.icon}</span>
        <h3>${t.name}</h3>
        <p class="desc">${t.desc}</p>
      </a>`;
    });
    
    toolsHtml += `</div></div>`;
  });
  
  container.innerHTML = chipsHtml + toolsHtml;
}

render();
</script>
