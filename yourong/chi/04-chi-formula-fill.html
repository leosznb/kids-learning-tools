<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>閱讀答題公式填空器 — 三步鷹架訓練</title>
<style>
:root {
  --bg: #fafaf9; --text: #1c1c1c; --muted: #777;
  --accent: #c0392b; --accent-soft: #fef0f0;
  --border: #e0e0dc; --card-bg: #fff;
  --correct: #1a7a2e; --correct-bg: #e8f5e9;
  --miss: #c0392b; --miss-bg: #fef0f0;
  --input-bg: #fffef5; --input-border: #d4c88c;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
  padding: 20px 16px 60px; max-width: 760px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}
h1 { font-size: 1.4em; font-weight: 800; margin: 0 0 2px; }
.subtitle { color: var(--muted); font-size: 0.88em; margin: 0 0 18px; }

/* Type tabs */
.type-tabs { display: flex; gap: 6px; margin: 0 0 16px; flex-wrap: wrap; }
.type-tab {
  padding: 10px 16px; border: 1px solid var(--border); border-radius: 20px;
  background: #fff; font-size: 0.86em; cursor: pointer; user-select: none;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.type-tab:active { background: #e8e8e4; }
.type-tab.active { background: #1c1c1c; color: #fff; border-color: #1c1c1c; }
.type-tab.done { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }

/* Level indicator */
.level-bar {
  display: flex; align-items: center; gap: 8px; margin: 0 0 16px;
  padding: 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 0.88em;
}
.level-dots { display: flex; gap: 6px; flex: 1; }
.level-dot {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7em; font-weight: 700; background: #fff; transition: all 0.3s;
}
.level-dot.past { background: var(--correct); border-color: var(--correct); color: #fff; }
.level-dot.current { border-color: var(--accent); background: #fff; color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.level-dot.future { opacity: 0.5; }
.level-label { font-weight: 700; color: var(--accent); min-width: 120px; text-align: right; }

/* Card */
.card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin: 0 0 14px;
}
.card h3 { font-size: 0.95em; font-weight: 700; margin: 0 0 8px; }
.hint-box {
  font-size: 0.82em; color: var(--muted); background: #fefefb;
  padding: 8px 12px; border-radius: var(--radius); margin: 0 0 12px;
  border-left: 3px solid var(--input-border);
}
.hint-box strong { color: #b85c00; }

/* Fill area */
.fill-line {
  font-size: 1em; line-height: 2.6; padding: 12px 16px;
  background: #fefefb; border: 1px dashed var(--border); border-radius: var(--radius);
  margin: 0 0 10px;
}
.fill-input {
  display: inline-block; vertical-align: middle;
  min-width: 70px; max-width: 220px; height: 42px;
  border: none; border-bottom: 2px solid var(--input-border);
  background: var(--input-bg); font-size: 0.92em;
  padding: 4px 8px; margin: 0 2px; text-align: center;
  font-family: inherit; outline: none; border-radius: 0;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.fill-input:focus {
  border-bottom-color: var(--accent); background: #fffef0;
  box-shadow: 0 1px 0 var(--accent);
}
.fill-input.correct {
  border-bottom-color: var(--correct); background: var(--correct-bg); font-weight: 700;
}
.fill-input.wrong {
  border-bottom-color: var(--miss); background: var(--miss-bg);
}

.textarea-wrap { margin: 10px 0; }
.textarea-wrap textarea {
  width: 100%; min-height: 120px; padding: 14px; font-size: 0.95em;
  font-family: inherit; line-height: 1.8; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--input-bg); outline: none;
  resize: vertical; -webkit-appearance: none;
}
.textarea-wrap textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

.actions { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
.btn {
  padding: 14px 24px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; font-size: 0.95em; cursor: pointer; user-select: none;
  font-weight: 600; font-family: inherit; min-height: 44px;
  -webkit-tap-highlight-color: transparent; transition: all 0.15s;
}
.btn:active { background: #e8e8e4; }
.btn.submit { background: #1c1c1c; color: #fff; border-color: #1c1c1c; }
.btn.submit:active { opacity: 0.8; }
.btn.next { display: none; background: var(--correct); color: #fff; border-color: var(--correct); }

/* Comparison */
.comparison { display: none; margin: 14px 0; }
.comparison.show { display: block; }
.comp-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 8px 0;
}
@media (max-width: 600px) { .comp-row { grid-template-columns: 1fr; } }
.comp-box {
  padding: 12px 14px; border-radius: var(--radius); font-size: 0.9em; line-height: 1.7;
}
.comp-box.yours { background: #fffbe6; border: 1px solid #e6c940; }
.comp-box.model { background: var(--correct-bg); border: 1px solid var(--correct); }

.score-hit {
  background: var(--correct-bg); border-bottom: 2px solid var(--correct);
  padding: 1px 3px; border-radius: 2px; cursor: pointer; font-weight: 600;
  display: inline-block; user-select: none; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.score-hit .tip-bubble {
  display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%); z-index: 100;
  background: #1c1c1c; color: #fff; font-size: 0.8em; font-weight: 400;
  padding: 6px 14px; border-radius: 6px; white-space: nowrap; pointer-events: none;
}
.score-hit .tip-bubble::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: #1c1c1c;
}
.score-hit.show-tip .tip-bubble { display: block; }
@media (hover: hover) {
  .score-hit:hover .tip-bubble { display: block; }
}
.score-miss {
  background: var(--miss-bg); border-bottom: 2px dashed var(--miss);
  padding: 1px 3px; border-radius: 2px; display: inline-block; font-weight: 600;
}

.feedback { font-size: 0.92em; padding: 12px; border-radius: var(--radius); margin: 10px 0; display: none; }
.feedback.show { display: block; }
.feedback.good { background: var(--correct-bg); color: var(--correct); }
.feedback.ok { background: #fffbe6; color: #b85c00; }

.footnote {
  font-size: 0.78em; color: var(--muted); margin: 28px 0 0;
  padding: 14px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
}

@media print {
  body { padding: 0; font-size: 11pt; }
  .type-tabs, .level-bar, .actions, .btn { display: none; }
  .comparison { display: block !important; }
  .card { break-inside: avoid; }
}
</style>
</head>
<body>

<h1>📝 閱讀答題公式填空器</h1>
<p class="subtitle">L1關鍵詞 → L2句子 → L3自由寫 | 三步學會「把話說到計分點」</p>

<div class="type-tabs" id="typeTabs"></div>
<div class="level-bar" id="levelBar"></div>
<div id="questionArea"></div>
<div class="feedback" id="feedback"></div>
<div class="comparison" id="comparison"></div>
<div class="actions">
  <button class="btn submit" id="submitBtn" onclick="submitAnswer()">✓ 提交答案</button>
  <button class="btn" id="retryBtn" onclick="retryLevel()" style="display:none;">↺ 重做</button>
  <button class="btn next" id="nextBtn" onclick="advanceLevel()">→ 下一級別</button>
</div>

<div class="footnote">
  <strong>💡 使用方式</strong><br>
  同一題型做三遍，每遍鷹架遞減、難度遞增。<br>
  <strong>Lv1</strong>：只填關鍵詞，有提示 → 建立公式意識<br>
  <strong>Lv2</strong>：填完整短句，提示減少 → 練習完整表達<br>
  <strong>Lv3</strong>：空白答題框，只有題目 → 模擬真實考試
</div>

}

function renderTypeTabs() {
  document.getElementById('typeTabs').innerHTML = TYPE_DATA.map((t, i) => {
    let cls = 'type-tab';
    if (i === typeIdx) cls += ' active';
    if (levelDone[i] && levelDone[i].every(d => d)) cls += ' done';
    return `<span class="${cls}" onclick="selectType(${i})" role="button">${t.title}</span>`;
  }).join('');
}

function renderLevelBar() {
  const t = TYPE_DATA[typeIdx];
  let html = '<div class="level-dots">';
  for (let i = 0; i < 3; i++) {
    let cls = 'level-dot';
    if (levelDone[typeIdx][i]) cls += ' past';
    else if (i === levelIdx) cls += ' current';
    else cls += ' future';
    html += `<span class="${cls}">${i+1}</span>`;
  }
  html += `</div><span class="level-label">${t.levels[levelIdx].label}</span>`;
  document.getElementById('levelBar').innerHTML = html;
}

function renderQuestion() {
  submitted = false;
  const t = TYPE_DATA[typeIdx];
  const lv = t.levels[levelIdx];
  let html = `<div class="card">
    <h3>${t.title} — ${lv.label}</h3>
    <div class="hint-box">💬 <strong>提示：</strong>${lv.hint}</div>
    <p style="margin:0 0 10px;"><strong>📝 ${lv.question}</strong></p>`;

  if (lv.type === 'fill') {
    html += `<div class="fill-line" id="fillLine">`;
    let parts = lv.template.split('&lb;');
    html += parts[0];
    for (let i = 1; i < parts.length; i++) {
      const endIdx = parts[i].indexOf('&rb;');
      const after = parts[i].substring(endIdx + 4);
      html += `<input type="text" class="fill-input" id="f${i-1}"
        placeholder="⋯"
        aria-label="填空 ${i}"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        autocomplete="off" inputmode="text">${after}`;
    }
    html += `</div>`;
  } else {
    html += `<div class="textarea-wrap">
      <textarea id="freeText" placeholder="在這裡寫下你的答案⋯" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('questionArea').innerHTML = html;
  document.getElementById('comparison').className = 'comparison';
  document.getElementById('comparison').innerHTML = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('submitBtn').style.display = 'inline-block';
  document.getElementById('retryBtn').style.display = 'inline-block';
  document.getElementById('nextBtn').style.display = 'none';

  renderLevelBar();
  renderTypeTabs();

  // Auto-focus
  setTimeout(() => {
    if (lv.type === 'fill') {
      const el = document.getElementById('f0');
      if (el) el.focus();
    } else {
      const el = document.getElementById('freeText');
      if (el) el.focus();
    }
  }, 150);
}

function submitAnswer() {
  if (submitted) return;
  submitted = true;
  const t = TYPE_DATA[typeIdx];
  const lv = t.levels[levelIdx];
  let correctCount = 0;
  let totalScore = 0;
  let userAnswerText = '';

  if (lv.type === 'fill') {
    lv.blanks.forEach(b => {
      const el = document.getElementById('f'+b.id);
      if (!el) return;
      const ua = el.value.trim().replace(/\s+/g, '');
      const match = ua === b.ans || (b.score >= 1 && ua.length >= b.ans.length - 1 && b.ans.includes(ua));
      el.disabled = true;
      if (match) {
        el.classList.add('correct');
        correctCount++;
        totalScore += b.score;
      } else {
        el.classList.add('wrong');
        if (!ua) el.value = '（漏填）';
        setTimeout(() => { el.value = el.classList.contains('wrong') ? b.ans : el.value; }, 800);
      }
    });
    // Build user answer from inputs
    let uText = lv.template;
    lv.blanks.forEach(b => {
      const el = document.getElementById('f'+b.id);
      uText = uText.replace('&lb;'+lv.blanks.find(x=>x.id===b.id).ans+'&rb;', el ? (el.classList.contains('correct') ? `<span class="score-hit">${el.value}</span>` : `<span class="score-miss">${el.value||'（漏填）'}</span>`) : '___');
    });
    userAnswerText = uText;
  } else {
    const el = document.getElementById('freeText');
    userAnswerText = el ? el.value : '';
    if (el) el.disabled = true;
    // Lv3: no auto-scoring. Learning happens in comparison view.
    correctCount = 0; totalScore = 0;
  }

  // Build model answer
  let modelHtml = lv.modelPieces.map((m, i) => {
    return `<span class="score-hit" onclick="toggleScoreTip(event)" role="button">${m.t}<span class="tip-bubble">${m.tip}</span></span>`;
  }).join(' → ');

  // Show comparison
  document.getElementById('comparison').className = 'comparison show';
  document.getElementById('comparison').innerHTML = `
    <div class="comp-row">
      <div>
        <div style="font-size:0.8em;font-weight:700;color:var(--muted);margin:0 0 4px;">✏️ 你的答案</div>
        <div class="comp-box yours">${lv.type==='fill' ? userAnswerText : (userAnswerText || '<em style="color:#999;">（未作答）</em>')}</div>
      </div>
      <div>
        <div style="font-size:0.8em;font-weight:700;color:var(--correct);margin:0 0 4px;">✅ 滿分答案（點擊底線看計分點）</div>
        <div class="comp-box model">${modelHtml}</div>
      </div>
    </div>`;

  const maxScore = lv.type === 'fill' ? lv.blanks.reduce((s,b)=>s+b.score, 0) : 0;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show';
  if (lv.type === 'free') {
    fb.classList.add('ok');
    fb.innerHTML = `📝 Lv3 是自由寫作，沒有自動計分。<br><small>請仔細對比右邊的滿分答案，檢查自己漏了哪些計分點，然後點「重做」再試一次。</small>`;
  } else if (totalScore / maxScore >= 0.7) {
    fb.classList.add('good');
    fb.innerHTML = `✅ 得分：${totalScore.toFixed(1)}/${maxScore} — 很好！你的答案踩到了大部分計分點。`;
  } else {
    fb.classList.add('ok');
    fb.innerHTML = `⚠️ 得分：${totalScore.toFixed(1)}/${maxScore} — 注意對比滿分答案，看看漏了哪些計分點。`;
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';

  // Mark level done
  levelDone[typeIdx][levelIdx] = true;
  renderTypeTabs();
}

function advanceLevel() {
  if (levelIdx < 2) {
    levelIdx++;
  } else {
    // Done with this type, move to next type
    levelIdx = 0;
    typeIdx = (typeIdx + 1) % TYPE_DATA.length;
  }
  renderQuestion();
}

function retryLevel() {
  levelDone[typeIdx][levelIdx] = false;
  renderQuestion();
  renderTypeTabs();
}

function selectType(i) {
  typeIdx = i;
  levelIdx = 0;
  renderQuestion();
}

function toggleScoreTip(e) {
  e.stopPropagation();
  e.preventDefault();
  const el = e.currentTarget;
  el.classList.toggle('show-tip');
  if (el.classList.contains('show-tip') && 'ontouchstart' in window) {
    setTimeout(() => el.classList.remove('show-tip'), 3000);
  }
}
document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('score-hit')) {
    document.querySelectorAll('.show-tip').forEach(el => el.classList.remove('show-tip'));
  }
});

init();
</script>
</body>
</html>
