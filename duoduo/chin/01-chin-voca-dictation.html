<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>多多呈分試 · 中文科全詞彙｜粵語跟讀+聽寫</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#f97316;--orange-dark:#ea580c;--orange-light:#fff7ed;
    --bg:#fff7ed;--card:#ffffff;--text:#431407;--text-light:#9a3412;
    --border:#fed7aa;--success:#16a34a;--shadow:0 4px 16px rgba(249,115,22,0.12);
    --radius:12px;--font:'Noto Sans HK',-apple-system,sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);padding:0;-webkit-font-smoothing:antialiased;font-size:18px}
  .header{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;padding:20px 16px 16px;text-align:center}
  .header h1{font-size:1.3rem;font-weight:700;letter-spacing:0.3px}
  .header .sub{font-size:0.78rem;opacity:0.85;margin-top:3px}
  .container{max-width:640px;margin:0 auto;padding:12px 12px 80px}
  
  /* Mode Tabs */
  .mode-tabs{display:flex;gap:8px;margin-bottom:12px}
  .mode-tab{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;
    border:2px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .mode-tab.active{border-color:var(--orange);background:var(--orange);color:#fff}
  .mode-tab:active{transform:scale(0.97)}

  /* Lesson Tabs */
  .lesson-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .lesson-tab{padding:8px 14px;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .lesson-tab.active{border-color:var(--orange);background:var(--orange-light);color:var(--orange-dark)}

  /* Category Tags */
  .cat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .cat-tag{padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:600;cursor:pointer;
    border:1px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .cat-tag.active{border-color:var(--orange);background:var(--orange);color:#fff}
  .cat-tag .count{font-size:0.6rem;opacity:0.7;margin-left:2px}

  /* Controls */
  .controls{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .controls .label{font-size:0.7rem;color:var(--text-light);font-weight:600}
  .speed-btn{padding:4px 10px;border-radius:12px;font-size:0.72rem;font-weight:600;cursor:pointer;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .speed-btn.active{border-color:var(--orange);background:var(--orange);color:#fff}
  .auto-btn{padding:4px 12px;border-radius:12px;font-size:0.72rem;font-weight:600;cursor:pointer;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .auto-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}

  /* Word Card - Read-along */
  .word-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;text-align:center;margin-bottom:14px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .word-card .word{font-size:3.5rem;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3;letter-spacing:2px}
  .word-card .word.phrase{font-size:2.8rem}
  .word-card .pinyin{font-size:1.1rem;color:var(--orange-dark);margin-bottom:4px;letter-spacing:1px}
  .word-card .meaning{font-size:1rem;color:var(--text-light);margin-bottom:6px;line-height:1.5}
  .word-card .warning{font-size:0.82rem;color:#dc2626;background:#fef2f2;padding:4px 12px;border-radius:6px;margin-top:4px}

  .word-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px}
  .word-nav .nav-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--card);
    font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .word-nav .nav-btn:active{background:var(--orange-light);border-color:var(--orange)}
  .word-nav .counter{font-size:0.85rem;color:var(--text-light);font-weight:600;min-width:60px;text-align:center}

  .play-btn{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#f97316,#ea580c);
    color:#fff;font-size:1.6rem;cursor:pointer;margin:8px 0;transition:all 0.15s;box-shadow:0 4px 12px rgba(249,115,22,0.3)}
  .play-btn:active{transform:scale(0.92)}

  /* Dictation Mode */
  .dict-hidden{opacity:0;transition:opacity 0.3s;pointer-events:none}
  .dict-show{opacity:1;transition:opacity 0.5s}
  .reveal-after{background:#fefce8;border-radius:8px;padding:12px 16px;margin-top:10px;display:none}
  .reveal-after.show{display:block;animation:fadeIn 0.3s}
  .reveal-after .r-word{font-size:2rem;font-weight:700;color:var(--text)}
  .reveal-after .r-info{font-size:0.88rem;color:var(--text-light);margin-top:4px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .dict-actions{display:flex;gap:8px;margin-top:12px;justify-content:center}
  .dict-actions button{padding:8px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
  .dict-actions button:active{transform:scale(0.95)}
  .btn-reveal{background:var(--orange);color:#fff}
  .btn-next{background:var(--card);color:var(--text);border:1.5px solid var(--border)!important}

  /* Progress */
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0 14px;overflow:hidden}
  .progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-dark));border-radius:2px;width:0%;transition:width 0.3s}

  /* Status */
  .status{font-size:0.78rem;color:var(--text-light);text-align:center;margin-bottom:8px}

  /* Count badges */
  .stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .stat-item{flex:1;min-width:60px;background:var(--card);border-radius:8px;padding:8px;text-align:center;
    border:1px solid var(--border);font-size:0.7rem;color:var(--text-light)}
  .stat-item .num{font-size:1.1rem;font-weight:700;color:var(--orange-dark);display:block}

  @media(max-width:480px){
    body{font-size:16px}
    .word-card .word{font-size:3rem}
    .word-card .word.phrase{font-size:2.4rem}
  }
</style>
</head>
<body>

<div class="header">
  <h1>🦊 多多·中文科全詞彙</h1>
  <div class="sub">第5·7·11·12課｜粵語跟讀 + 聽寫</div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item"><span class="num" id="totalCount">0</span>詞彙總數</div>
    <div class="stat-item"><span class="num" id="lessonCount">0</span>當前分組</div>
    <div class="stat-item"><span class="num" id="progressCount">0%</span>完成進度</div>
  </div>

  <!-- Mode -->
  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="read" onclick="switchMode('read')">📖 跟讀</div>
    <div class="mode-tab" data-mode="dictate" onclick="switchMode('dictate')">✍️ 聽寫</div>
  </div>

  <!-- Lesson -->
  <div class="lesson-tabs" id="lessonTabs"></div>

  <!-- Category -->
  <div class="cat-tags" id="catTags"></div>

  <!-- Controls -->
  <div class="controls">
    <span class="label">語速</span>
    <button class="speed-btn" data-speed="0.8" onclick="setSpeed(this,0.8)">0.8×</button>
    <button class="speed-btn active" data-speed="1.0" onclick="setSpeed(this,1.0)">1.0×</button>
    <button class="speed-btn" data-speed="1.2" onclick="setSpeed(this,1.2)">1.2×</button>
    <span class="label" style="margin-left:8px">自動</span>
    <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">關</button>
  </div>

  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

  <!-- Word Display -->
  <div class="word-card" id="wordCard">
    <div class="word" id="wordDisplay">準備好了</div>
    <div class="pinyin" id="pinyinDisplay"></div>
    <div class="meaning" id="meaningDisplay"></div>
    <div class="warning" id="warningDisplay" style="display:none"></div>
    <button class="play-btn" id="playBtn" onclick="playCurrent()">▶</button>
    <!-- Dictation reveal -->
    <div class="reveal-after" id="revealAfter"></div>
  </div>

  <div class="word-nav">
    <button class="nav-btn" onclick="prevWord()">‹</button>
    <span class="counter" id="wordCounter">0/0</span>
    <button class="nav-btn" onclick="nextWord()">›</button>
  </div>

  <div class="dict-actions" style="display:none" id="dictActions">
    <button class="btn-reveal" onclick="revealAnswer()">👀 睇答案</button>
    <button class="btn-next" onclick="nextWord()">➡️ 下一個</button>
  </div>

  <div class="status" id="statusMsg">就緒</div>
</div>

// ===================== STATE =====================
const CAT_NAMES = {A:'A類·必默', B:'B類·必認', C:'C類·成語', D:'D類·文言'};
const CAT_ORDER = ['A','B','C','D'];
let state = {
  mode: 'read',
  lesson: 5,
  cats: ['A','B','C','D'],
  speed: 1.0,
  autoPlay: false,
  currIdx: 0,
  filtered: [],
  isPlaying: false,
  audioCtx: null
};

// ===================== INIT =====================
function init() {
  // Lesson tabs
  const lessons = [5,7,11,12];
  const lessonNames = {5:'第5課·堅持與成功',7:'第7課·香椿魚',11:'第11課·鷸蚌相爭',12:'第12課·自相矛盾'};
  const lt = document.getElementById('lessonTabs');
  lt.innerHTML = lessons.map(l =>
    `<div class="lesson-tab${l===5?' active':''}" onclick="switchLesson(${l})">${lessonNames[l]}</div>`
  ).join('');

  // Cat tags
  updateCatTags();
  applyFilter();
  updateUI();
  document.getElementById('totalCount').textContent = VOCAB.length;

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft') prevWord();
    if(e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextWord(); }
    if(e.key==='Enter'&&state.mode==='dictate') revealAnswer();
    if(e.key==='p'||e.key==='P') playCurrent();
  });
}

// ===================== FILTER =====================
function applyFilter() {
  state.filtered = VOCAB.filter(v =>
    v.lesson === state.lesson && state.cats.includes(v.cat)
  );
  if(state.currIdx >= state.filtered.length) state.currIdx = 0;
  updateUI();
  updateStats();
}

function updateCatTags() {
  const ct = document.getElementById('catTags');
  ct.innerHTML = CAT_ORDER.map(c => {
    const count = VOCAB.filter(v=>v.lesson===state.lesson&&v.cat===c).length;
    if(count===0) return '';
    return `<div class="cat-tag${state.cats.includes(c)?' active':''}" onclick="toggleCat('${c}')">${CAT_NAMES[c]} <span class="count">${count}</span></div>`;
  }).filter(Boolean).join('');
}

function toggleCat(c) {
  const idx = state.cats.indexOf(c);
  if(idx===-1) state.cats.push(c); else state.cats.splice(idx,1);
  if(state.cats.length===0) state.cats = [c]; // at least one
  state.currIdx = 0;
  updateCatTags();
  applyFilter();
}

function switchLesson(l) {
  state.lesson = l;
  state.currIdx = 0;
  state.cats = ['A','B','C','D'];
  document.querySelectorAll('.lesson-tab').forEach((t,i)=>t.classList.toggle('active',[5,7,11,12][i]===l));
  updateCatTags();
  applyFilter();
  // Redraw cat tag active states
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.remove('active'));
  state.cats.forEach(c=>{
    document.querySelectorAll('.cat-tag').forEach(t=>{
      if(t.textContent.trim().startsWith(CAT_NAMES[c].replace('類·',''))) t.classList.add('active');
    });
  });
}

// ===================== MODE =====================
function switchMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.getElementById('dictActions').style.display = m==='dictate'?'flex':'none';
  document.getElementById('revealAfter').classList.remove('show');
  updateUI();
}

// ===================== NAV =====================
function prevWord() { if(state.currIdx>0){state.currIdx--;updateUI();} }
function nextWord() {
  if(state.currIdx<state.filtered.length-1){state.currIdx++;updateUI();}
  if(state.autoPlay && state.currIdx<state.filtered.length-1){
    setTimeout(()=>playCurrent(),500);
  }
}

function updateUI() {
  const w = state.filtered[state.currIdx];
  const wd = document.getElementById('wordDisplay');
  const pd = document.getElementById('pinyinDisplay');
  const md = document.getElementById('meaningDisplay');
  const wad = document.getElementById('warningDisplay');
  const ra = document.getElementById('revealAfter');

  if(!w) {
    wd.textContent = '🎉 全部完成！'; wd.className='word';
    pd.textContent=''; md.textContent=''; wad.style.display='none';
    ra.classList.remove('show');
    document.getElementById('wordCounter').textContent='0/0';
    document.getElementById('playBtn').style.display='none';
    return;
  }

  document.getElementById('playBtn').style.display='block';
  wd.textContent = w.word;
  wd.className = w.phrase ? 'word phrase' : 'word';
  pd.textContent = w.pinyin;
  md.textContent = w.meaning;
  
  // Category badge
  const catInfo = CAT_NAMES[w.cat]||w.cat;
  pd.textContent = `${w.pinyin}  |  ${catInfo}`;

  if(w.warning) { wad.textContent = '⚠️ '+w.warning; wad.style.display='block'; }
  else wad.style.display='none';

  document.getElementById('wordCounter').textContent = `${state.currIdx+1}/${state.filtered.length}`;

  // Dictation mode: hide word initially
  ra.classList.remove('show');
  if(state.mode==='dictate') {
    wd.style.opacity='0.3'; wd.style.filter='blur(6px)';
  } else {
    wd.style.opacity='1'; wd.style.filter='none';
  }
}

function updateStats() {
  document.getElementById('lessonCount').textContent = state.filtered.length;
  const done = state.currIdx;
  const total = state.filtered.length||1;
  document.getElementById('progressCount').textContent = Math.round((state.currIdx/total)*100)+'%';
  document.getElementById('progressFill').style.width = Math.round((state.currIdx/total)*100)+'%';
}

// ===================== PLAYBACK =====================
function setSpeed(btn, s) {
  state.speed = s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

let autoOn = false;
function toggleAuto() {
  autoOn = !autoOn; state.autoPlay = autoOn;
  document.getElementById('autoBtn').textContent = autoOn ? '開' : '關';
  document.getElementById('autoBtn').classList.toggle('active', autoOn);
}

function speakAzure(text, rate) {
  const key = 'YOUR_AZURE_SPEECH_KEY';  // 🔑 留空則自動使用瀏覽器 TTS
  const region = 'eastasia';
  if(key==='YOUR_AZURE_SPEECH_KEY'){speakBrowser(text);return;}

  // First get token
  return fetch(`https://${region}.api.cognitive.microsoft.com/sts/v1.0/issueToken`, {
    method: 'POST', headers: {'Ocp-Apim-Subscription-Key': key}
  })
  .then(r => r.text())
  .then(token => {
    const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='zh-HK'>
      <voice name='zh-HK-HiuMaanNeural'>
        <prosody rate='${Math.round((rate-1)*100)}%'>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</prosody>
      </voice>
    </speak>`;
    return fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/ssml+xml',
        'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3'
      },
      body: ssml
    });
  })
  .then(r => r.blob())
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); playCount++; tryPlayNext(); };
    audio.play();
    return new Promise(r => { audio.onended = ()=>{r();URL.revokeObjectURL(url);playCount++;tryPlayNext();}; audio.play(); });
  })
  .catch(e => {
    console.warn('Azure TTS failed, using browser TTS:', e);
    speakBrowser(text);
  });
}

function speakBrowser(text) {
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-HK';
  u.rate = state.speed * 0.9;
  // Try to find Cantonese voice
  const voices = speechSynthesis.getVoices();
  const cantonese = voices.find(v=>v.lang==='zh-HK'||v.lang==='yue'||v.lang.includes('HK'));
  if(cantonese) u.voice = cantonese;
  u.onend = () => { playCount++; tryPlayNext(); };
  speechSynthesis.speak(u);
}

let playCount = 0;
function playCurrent() {
  const w = state.filtered[state.currIdx];
  if(!w) return;
  playCount = 0;
  const text = w.word;
  
  if(state.mode==='dictate') {
    // In dictate mode, hide the reveal
    document.getElementById('revealAfter').classList.remove('show');
    document.getElementById('playBtn').textContent = '🔊';
    document.getElementById('statusMsg').textContent = '🔊 播放中… 請在紙上默寫';
    speakTwice(text);
  } else {
    document.getElementById('playBtn').textContent = '🔊';
    speakTwice(text);
  }
}

function speakTwice(text) {
  playCount = 0;
  const next = () => {
    if(playCount < 2) {
      speakAzure(text, state.speed);
    } else {
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('statusMsg').textContent = '就緒';
      if(state.mode==='dictate') {
        document.getElementById('statusMsg').textContent = '🔇 播放完畢 · 按「睇答案」核對';
      }
      // Auto-advance: 播放完兩次後自動跳到下一個詞
      if(state.autoPlay && state.currIdx < state.filtered.length - 1) {
        setTimeout(() => nextWord(), 1200);
      }
    }
  };
  window._speakNext = next;
  next();
}

function tryPlayNext() {
  if(window._speakNext) window._speakNext();
}

function revealAnswer() {
  const w = state.filtered[state.currIdx];
  if(!w) return;
  const ra = document.getElementById('revealAfter');
  ra.innerHTML = `<div class="r-word">${w.word}</div>
    <div class="r-info">${w.pinyin}  ·  ${w.meaning}</div>
    ${w.warning ? `<div class="r-info" style="color:#dc2626;font-size:0.82rem">⚠️ ${w.warning}</div>` : ''}`;
  ra.classList.add('show');
  document.getElementById('statusMsg').textContent = '✅ 已顯示答案';
}

// ===================== START =====================
document.addEventListener('DOMContentLoaded', init);
// Preload browser voices
if(window.speechSynthesis) speechSynthesis.getVoices();
</script>
