<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>多多 English Vocabulary｜Read-along + Dictation</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#f97316;--orange-dark:#ea580c;--orange-light:#fff7ed;
    --bg:#fff7ed;--card:#ffffff;--text:#431407;--text-light:#9a3412;
    --border:#fed7aa;--success:#16a34a;--shadow:0 4px 16px rgba(249,115,22,0.12);
    --radius:12px;--font:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);padding:0;-webkit-font-smoothing:antialiased;font-size:18px}
  .header{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff;padding:20px 16px 16px;text-align:center}
  .header h1{font-size:1.3rem;font-weight:700;letter-spacing:0.3px}
  .header .sub{font-size:0.78rem;opacity:0.85;margin-top:3px}
  .container{max-width:640px;margin:0 auto;padding:12px 12px 80px}

  .mode-tabs{display:flex;gap:8px;margin-bottom:12px}
  .mode-tab{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;
    border:2px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .mode-tab.active{border-color:var(--orange);background:var(--orange);color:#fff}

  .unit-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .unit-tab{padding:8px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .unit-tab.active{border-color:var(--orange);background:var(--orange-light);color:var(--orange-dark)}

  .controls{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .controls .label{font-size:0.7rem;color:var(--text-light);font-weight:600}
  .speed-btn{padding:4px 10px;border-radius:12px;font-size:0.72rem;font-weight:600;cursor:pointer;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .speed-btn.active{border-color:var(--orange);background:var(--orange);color:#fff}
  .auto-btn{padding:4px 12px;border-radius:12px;font-size:0.72rem;font-weight:600;cursor:pointer;
    border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all 0.2s}
  .auto-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}

  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0 14px;overflow:hidden}
  .progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-dark));border-radius:2px;width:0%;transition:width 0.3s}

  .word-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;text-align:center;margin-bottom:14px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .word-card .word{font-size:3.5rem;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.3;letter-spacing:1px;word-break:break-word}
  .word-card .word.phrase{font-size:2.4rem;line-height:1.4}
  .word-card .meaning{font-size:1.1rem;color:var(--text-light);margin-bottom:6px;min-height:1.5em}
  .word-card .unit-label{font-size:0.72rem;color:var(--orange-dark);background:var(--orange-light);padding:2px 10px;border-radius:10px;margin-bottom:8px}

  .play-btn{width:68px;height:68px;border-radius:50%;border:none;background:linear-gradient(135deg,#f97316,#ea580c);
    color:#fff;font-size:1.6rem;cursor:pointer;margin:8px 0;transition:all 0.15s;box-shadow:0 4px 14px rgba(249,115,22,0.3)}
  .play-btn:active{transform:scale(0.92)}

  .word-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px}
  .word-nav .nav-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--card);
    font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .word-nav .nav-btn:active{background:var(--orange-light);border-color:var(--orange)}
  .word-nav .counter{font-size:0.85rem;color:var(--text-light);font-weight:600;min-width:60px;text-align:center}

  .reveal-after{background:#fefce8;border-radius:8px;padding:12px 16px;margin-top:10px;display:none}
  .reveal-after.show{display:block;animation:fadeIn 0.3s}
  .reveal-after .r-word{font-size:2rem;font-weight:700;color:var(--text)}
  .reveal-after .r-info{font-size:0.88rem;color:var(--text-light);margin-top:4px}

  .dict-actions{display:flex;gap:8px;margin-top:12px;justify-content:center}
  .dict-actions button{padding:8px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
  .dict-actions button:active{transform:scale(0.95)}
  .btn-reveal{background:var(--orange);color:#fff}
  .btn-next{background:var(--card);color:var(--text);border:1.5px solid var(--border)!important}

  .stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .stat-item{flex:1;min-width:60px;background:var(--card);border-radius:8px;padding:8px;text-align:center;
    border:1px solid var(--border);font-size:0.7rem;color:var(--text-light)}
  .stat-item .num{font-size:1.1rem;font-weight:700;color:var(--orange-dark);display:block}

  .status{font-size:0.78rem;color:var(--text-light);text-align:center;margin-bottom:8px}
  .note-box{background:#fefce8;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:0.78rem;color:var(--text-light);border-left:3px solid #facc15}

  @media(max-width:480px){
    body{font-size:16px}
    .word-card .word{font-size:3rem}
    .word-card .word.phrase{font-size:2rem}
    .word-card{padding:20px 16px;min-height:200px}
  }

  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1>📝 多多英文詞彙 </h1>
  <div class="sub">播放讀音 → 紙上聽寫 → 自己核對 → 錯詞收集</div>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-item"><span class="num" id="totalCount">0</span>詞彙總數</div>
    <div class="stat-item"><span class="num" id="unitCount">0</span>當前單元</div>
    <div class="stat-item"><span class="num" id="progressCount">0%</span>完成</div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="read" onclick="switchMode('read')">📖 跟讀</div>
    <div class="mode-tab" data-mode="dictate" onclick="switchMode('dictate')">✍️ 聽寫</div>
  </div>

  <div class="unit-tabs" id="unitTabs"></div>

  <div class="controls">
    <span class="label">語速</span>
    <button class="speed-btn" data-speed="0.8" onclick="setSpeed(this,0.8)">0.8×</button>
    <button class="speed-btn active" data-speed="1.0" onclick="setSpeed(this,1.0)">1.0×</button>
    <button class="speed-btn" data-speed="1.2" onclick="setSpeed(this,1.2)">1.2×</button>
    <span class="label" style="margin-left:8px">自動</span>
    <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">關</button>
  </div>

  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

  <div class="word-card" id="wordCard">
    <div class="unit-label" id="unitLabel"></div>
    <div class="word" id="wordDisplay">Ready</div>
    <div class="meaning" id="meaningDisplay"></div>
    <button class="play-btn" id="playBtn" onclick="playCurrent()">▶</button>
    <div class="reveal-after" id="revealAfter"></div>
  </div>

  <div class="word-nav">
    <button class="nav-btn" onclick="prevWord()">‹</button>
    <span class="counter" id="wordCounter">0/0</span>
    <button class="nav-btn" onclick="nextWord()">›</button>
  </div>

  <div class="dict-actions" style="display:none" id="dictActions">
    <button class="btn-reveal" onclick="revealAnswer()">👀 睇答案</button>
    <button class="btn-next" onclick="nextWord()">➡️ 下一個</button>
  </div>

  <div class="status" id="statusMsg">Ready</div>
  <div class="note-box">💡 Azure TTS (British Sonia) · 語速可調 · 自動播放可開關 · 跟讀模式顯示中文</div>
</div>

<script>
// ===================== VOCABULARY =====================
// Organized by Rondy Student's Book 5B Units
const ALL_WORDS = [
  // Unit 3 — I want to be (Jobs)
  {word:'actor', meaning:'男演員', unit:3, phrase:false},
  {word:'actress', meaning:'女演員', unit:3, phrase:false},
  {word:'athlete', meaning:'運動員', unit:3, phrase:false},
  {word:'lawyer', meaning:'律師', unit:3, phrase:false},
  {word:'pilot', meaning:'飛機師', unit:3, phrase:false},
  {word:'flight attendant', meaning:'空中服務員', unit:3, phrase:true},
  {word:'chef', meaning:'廚師', unit:3, phrase:false},
  {word:'lifeguard', meaning:'救生員', unit:3, phrase:false},
  {word:'photographer', meaning:'攝影師', unit:3, phrase:false},
  {word:'waiter', meaning:'男侍應', unit:3, phrase:false},
  {word:'waitress', meaning:'女侍應', unit:3, phrase:false},
  {word:'singer', meaning:'歌手', unit:3, phrase:false},
  {word:'magician', meaning:'魔術師', unit:3, phrase:false},
  {word:'clown', meaning:'小丑', unit:3, phrase:false},
  {word:'tour guide', meaning:'導遊', unit:3, phrase:true},
  {word:'travel agent', meaning:'旅行社職員', unit:3, phrase:true},
  {word:'writer', meaning:'作家', unit:3, phrase:false},
  {word:'gardener', meaning:'園丁', unit:3, phrase:false},
  {word:'parade dancer', meaning:'巡遊舞蹈員', unit:3, phrase:true},
  {word:'camera', meaning:'相機', unit:3, phrase:false},
  {word:'uniform', meaning:'制服', unit:3, phrase:false},
  {word:'stadium', meaning:'體育場', unit:3, phrase:false},
  {word:'perform a short play', meaning:'表演短劇', unit:3, phrase:true},

  // Unit 4 — The person I admire (Personality)
  {word:'humble', meaning:'謙虛的', unit:4, phrase:false},
  {word:'creative', meaning:'有創意的', unit:4, phrase:false},
  {word:'generous', meaning:'慷慨的', unit:4, phrase:false},
  {word:'gentle', meaning:'溫柔的', unit:4, phrase:false},
  {word:'responsible', meaning:'有責任感的', unit:4, phrase:false},
  {word:'hard-working', meaning:'勤奮的', unit:4, phrase:true},
  {word:'naughty', meaning:'頑皮的', unit:4, phrase:false},
  {word:'humorous', meaning:'幽默的', unit:4, phrase:false},
  {word:'patient', meaning:'有耐性的', unit:4, phrase:false},
  {word:'cheerful', meaning:'開朗的', unit:4, phrase:false},
  {word:'helpful', meaning:'樂於助人的', unit:4, phrase:false},
  {word:'caring', meaning:'關懷的', unit:4, phrase:false},
  {word:'useful', meaning:'有用的', unit:4, phrase:false},

  // Unit 5 — An unforgettable experience (Feelings)
  {word:'bored', meaning:'沉悶的、感到無聊', unit:5, phrase:false},
  {word:'worried', meaning:'擔心的', unit:5, phrase:false},
  {word:'frightened', meaning:'受驚的、害怕的', unit:5, phrase:false},
  {word:'disappointed', meaning:'失望的', unit:5, phrase:false},
  {word:'shocked', meaning:'震驚的', unit:5, phrase:false},
  {word:'interested', meaning:'感興趣的', unit:5, phrase:false},
  {word:'excited', meaning:'興奮的', unit:5, phrase:false},
  {word:'tired', meaning:'疲倦的', unit:5, phrase:false},
  {word:'surprised', meaning:'驚訝的', unit:5, phrase:false},
  {word:'touched', meaning:'受感動的', unit:5, phrase:false},
  {word:'frustrated', meaning:'沮喪的', unit:5, phrase:false},
  {word:'stressed', meaning:'有壓力的', unit:5, phrase:false},

  // Unit 6 — Be considerate (Public Transport)
  {word:'queue', meaning:'排隊', unit:6, phrase:false},
  {word:'jump the queue', meaning:'插隊', unit:6, phrase:true},
  {word:'block the doors', meaning:'堵塞門口', unit:6, phrase:true},
  {word:'give your seat to people in need', meaning:'讓座給有需要的人', unit:6, phrase:true},
  {word:'let passengers exit first', meaning:'讓乘客先下車', unit:6, phrase:true},
  {word:'hold the handrail', meaning:'握緊扶手', unit:6, phrase:true},
  {word:'queue up', meaning:'排隊', unit:6, phrase:true},
  {word:'disturb others', meaning:'打擾別人', unit:6, phrase:true},
  {word:'take up extra seats', meaning:'佔用額外座位', unit:6, phrase:true},
  {word:'lean against the grab poles', meaning:'靠在扶手上', unit:6, phrase:true},
  {word:'put your feet on the seats', meaning:'把腳放在座位上', unit:6, phrase:true}
];

const UNIT_LABELS = {3:'Unit 3 · I want to be…',4:'Unit 4 · The person I admire',5:'Unit 5 · An unforgettable experience',6:'Unit 6 · Be considerate'};
const UNIT_SHORT = {3:'Jobs',4:'Personality',5:'Feelings',6:'Public Transport'};
const ALL_UNITS = [3,4,5,6];

// ===================== STATE =====================
let state = {
  mode: 'read',
  unit: 3,
  speed: 1.0,
  autoPlay: false,
  currIdx: 0,
  filtered: [],
  isPlaying: false
};
let playCount = 0;

// ===================== INIT =====================
function init() {
  // Unit tabs
  const ut = document.getElementById('unitTabs');
  ut.innerHTML = ALL_UNITS.map(u =>
    `<div class="unit-tab${u===3?' active':''}" onclick="switchUnit(${u})">${UNIT_SHORT[u]}</div>`
  ).join('');

  applyFilter();
  updateUI();
  document.getElementById('totalCount').textContent = ALL_WORDS.length;

  // Keyboard
  document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft') prevWord();
    if(e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextWord(); }
    if(e.key==='Enter'&&state.mode==='dictate') revealAnswer();
    if(e.key==='p'||e.key==='P') playCurrent();
  });
}

// ===================== FILTER =====================
function applyFilter() {
  state.filtered = ALL_WORDS.filter(w => w.unit === state.unit);
  if(state.currIdx >= state.filtered.length) state.currIdx = 0;
  updateUI();
  updateStats();
}

function switchUnit(u) {
  state.unit = u;
  state.currIdx = 0;
  document.querySelectorAll('.unit-tab').forEach((t,i)=>t.classList.toggle('active',ALL_UNITS[i]===u));
  applyFilter();
  document.getElementById('revealAfter').classList.remove('show');
  updateUI();
}

// ===================== MODE =====================
function switchMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.getElementById('dictActions').style.display = m==='dictate'?'flex':'none';
  document.getElementById('revealAfter').classList.remove('show');
  updateUI();
}

// ===================== NAV =====================
function prevWord() { if(state.currIdx>0){state.currIdx--;updateUI();} }
function nextWord() {
  if(state.currIdx<state.filtered.length-1){state.currIdx++;updateUI();}
  if(state.autoPlay && state.currIdx<state.filtered.length-1){
    setTimeout(()=>playCurrent(),500);
  }
  document.getElementById('revealAfter').classList.remove('show');
}

function updateUI() {
  const w = state.filtered[state.currIdx];
  const wd = document.getElementById('wordDisplay');
  const md = document.getElementById('meaningDisplay');
  const ul = document.getElementById('unitLabel');
  const ra = document.getElementById('revealAfter');

  if(!w) {
    wd.textContent = '🎉 All done!'; wd.className='word';
    md.textContent=''; ul.textContent=''; ra.classList.remove('show');
    document.getElementById('wordCounter').textContent='0/0';
    document.getElementById('playBtn').style.display='none';
    return;
  }

  document.getElementById('playBtn').style.display='block';
  wd.textContent = w.word;
  wd.className = w.phrase ? 'word phrase' : 'word';
  md.textContent = w.meaning;
  ul.textContent = `${UNIT_LABELS[w.unit]} · ${state.currIdx+1}/${state.filtered.length}`;
  document.getElementById('wordCounter').textContent = `${state.currIdx+1}/${state.filtered.length}`;

  ra.classList.remove('show');
  if(state.mode==='dictate') {
    wd.style.opacity='0.25'; wd.style.filter='blur(8px)';
    md.style.opacity='0.25'; md.style.filter='blur(8px)';
    document.getElementById('statusMsg').textContent = '🔊 播放後在紙上默寫…';
  } else {
    wd.style.opacity='1'; wd.style.filter='none';
    md.style.opacity='1'; md.style.filter='none';
    document.getElementById('statusMsg').textContent = '就緒';
  }
}

function updateStats() {
  document.getElementById('unitCount').textContent = state.filtered.length;
  const total = state.filtered.length||1;
  document.getElementById('progressCount').textContent = Math.round((state.currIdx/total)*100)+'%';
  document.getElementById('progressFill').style.width = Math.round((state.currIdx/total)*100)+'%';
}

// ===================== SPEED & AUTO =====================
function setSpeed(btn, s) {
  state.speed = s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleAuto() {
  state.autoPlay = !state.autoPlay;
  document.getElementById('autoBtn').textContent = state.autoPlay ? '開' : '關';
  document.getElementById('autoBtn').classList.toggle('active', state.autoPlay);
}

// ===================== AZURE TTS =====================
function speakAzure(text, rate) {
  const key = 'YOUR_AZURE_SPEECH_KEY';  // 🔑 留空則自動使用瀏覽器 TTS
  const region = 'eastasia';
  if(key==='YOUR_AZURE_SPEECH_KEY'){fallbackBrowser(text);return;}

  return fetch(`https://${region}.api.cognitive.microsoft.com/sts/v1.0/issueToken`, {
    method: 'POST', headers: {'Ocp-Apim-Subscription-Key': key}
  })
  .then(r => r.text())
  .then(token => {
    const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-GB'>
      <voice name='en-GB-SoniaNeural'>
        <prosody rate='${Math.round((rate-1)*100)}%'>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</prosody>
      </voice>
    </speak>`;
    return fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/ssml+xml',
        'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3'
      },
      body: ssml
    });
  })
  .then(r => r.blob())
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); onPlayEnd(); };
    return audio.play().catch(() => fallbackBrowser(text));
  })
  .catch(e => { console.warn('Azure fail, fallback:', e); fallbackBrowser(text); });
}

function fallbackBrowser(text) {
  if(!window.speechSynthesis) { onPlayEnd(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB';
  u.rate = state.speed * 0.9;
  const voices = speechSynthesis.getVoices();
  const gb = voices.find(v=>v.lang.startsWith('en-GB'));
  if(gb) u.voice = gb;
  u.onend = () => onPlayEnd();
  speechSynthesis.speak(u);
}

function onPlayEnd() {
  playCount++;
  if(playCount < 2) {
    // Play second time
    const w = state.filtered[state.currIdx];
    if(w) speakAzure(w.word, state.speed);
  } else {
    // Both plays done
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('statusMsg').textContent = '就緒';
    // Show status based on mode
    if(state.mode==='dictate') {
      document.getElementById('statusMsg').textContent = '🎯 聽寫完畢 · 按「睇答案」核對';
    }
    // Auto-advance
    if(state.autoPlay && state.currIdx < state.filtered.length - 1) {
      setTimeout(() => nextWord(), 1500);
    }
  }
}

function playCurrent() {
  const w = state.filtered[state.currIdx];
  if(!w) return;
  playCount = 0;
  document.getElementById('playBtn').textContent = '🔊';
  document.getElementById('statusMsg').textContent = '🔊 播放中…';
  document.getElementById('revealAfter').classList.remove('show');
  speakAzure(w.word, state.speed);
}

function revealAnswer() {
  const w = state.filtered[state.currIdx];
  if(!w) return;
  const ra = document.getElementById('revealAfter');
  ra.innerHTML = `<div class="r-word">${w.word}</div>
    <div class="r-info">${w.meaning}  ·  ${w.phrase?'Phrase':'Word'}  ·  ${UNIT_LABELS[w.unit]}</div>`;
  ra.classList.add('show');
  // Unblur
  document.getElementById('wordDisplay').style.opacity='1'; document.getElementById('wordDisplay').style.filter='none';
  document.getElementById('meaningDisplay').style.opacity='1'; document.getElementById('meaningDisplay').style.filter='none';
  document.getElementById('statusMsg').textContent = '✅ 已顯示答案';
}

// ===================== START =====================
document.addEventListener('DOMContentLoaded', init);
if(window.speechSynthesis) speechSynthesis.getVoices();
</script>
</body>
</html>
