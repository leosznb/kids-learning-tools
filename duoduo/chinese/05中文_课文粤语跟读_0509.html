*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.75}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:1.1rem 0.8rem 0.5rem;text-align:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}

.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem;margin-bottom:0.85rem;box-shadow:var(--sh)}

.voice-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--r);padding:0.5rem 0.8rem;margin-bottom:0.8rem;font-size:0.78rem}

/* ═══ PLAYBACK BAR ═══ */
.pbar{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.6rem;padding:0.5rem 0.8rem;background:#f8fafc;border:1px solid var(--border);border-radius:var(--r)}
.pbar button{font-family:var(--font);font-size:0.8rem;font-weight:600;padding:0.4rem 0.9rem;border:1px solid var(--border);background:var(--card);border-radius:999px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.pbar button:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.pbar button.playing{background:#fef2f2;border-color:#dc2626;color:#dc2626;animation:pulse 1s infinite}
.pbar .sg{display:flex;align-items:center;gap:0.2rem;margin-left:auto}
.pbar .sg label{font-size:0.75rem;font-weight:600;color:var(--t2)}
.pbar .sg input[type=range]{width:4.5rem}
.pbar .sg .sv{font-size:0.75rem;font-weight:700;min-width:2.3rem;text-align:center}
.pbar .prog{font-size:0.75rem;color:var(--t2);white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ═══ TEXT ═══ */
.tb{font-size:1.15rem;line-height:2.2;padding:0.5rem 0}
.tb .s{transition:background 0.2s;padding:0.15rem 0.3rem;border-radius:4px;cursor:pointer}
.tb .s:hover{background:#fefce8}
.tb .s.active{background:#fef08a;font-weight:700}
.tb .s.played{color:var(--t2)}
.tb.poem .s{display:block;margin-bottom:0.2rem}
.footer{text-align:center;color:#999;font-size:0.7rem;padding:2rem 0 1rem}
@media print{.header{position:static;border-bottom:2px solid #000}.utabs,.pbar,.voice-note{display:none}.page{display:block!important;page-break-before:always}.page:first-of-type{page-break-before:avoid}body{background:#fff;font-size:10pt}.container{max-width:100%;padding:0}.tb .s.active{background:none;font-weight:400}}
@media(max-width:600px){.header{padding:0.7rem 0.4rem 0.4rem}.header h1{font-size:1rem}.tb{font-size:1rem;line-height:2}.pbar{gap:0.3rem;padding:0.4rem 0.5rem}.pbar button{font-size:0.72rem;padding:0.3rem 0.5rem}}
</style>

// ═══ BUILD ═══
function buildAll() {
  for (var k in TEXTS) {
    var el = document.getElementById('text-' + k);
    if (!el) continue;
    var h = '';
    TEXTS[k].forEach(function(s, i) {
      h += '<span class="s" id="s-' + k + '-' + i + '" onclick="jumpTo(\'' + k + '\',' + i + ')">' + s + '</span> ';
    });
    el.innerHTML = h;
  }
}

// ═══ TTS ═══
var synth = window.speechSynthesis, spk = false, cl = null, ci = 0;
function gv() {
  var v = synth.getVoices();
  var hk = v.filter(function(x){return x.lang==='zh-HK';});
  return hk.length ? hk[0] : (v.filter(function(x){return x.lang.startsWith('zh-');})[0]||null);
}
function speakLesson(k) {
  stopSpeak();
  if(!synth){alert('請用 Safari 開啟。');return;}
  var voice = gv();
  if(!voice){alert('找不到粵語語音。請用 Safari。');return;}
  var s = TEXTS[k];
  if(!s) return;
  spk = true; cl = k; ci = 0;
  var btn = document.getElementById('btn-'+k);
  var prog = document.getElementById('prog-'+k);
  var speed = parseFloat(document.getElementById('spd-'+k).value);
  if(btn) btn.classList.add('playing');
  document.querySelectorAll('#text-'+k+' .s').forEach(function(x){x.classList.remove('active','played');});
  (function nxt() {
    if(!spk || ci >= s.length) {
      spk = false; if(btn) btn.classList.remove('playing');
      if(prog) prog.textContent = '✅ 完成'; cl = null; return;
    }
    if(prog) prog.textContent = (ci+1) + '/' + s.length;
    var pv = document.getElementById('s-'+k+'-'+(ci-1));
    if(pv){pv.classList.remove('active');pv.classList.add('played');}
    var cu = document.getElementById('s-'+k+'-'+ci);
    if(cu){cu.classList.add('active');cu.scrollIntoView({behavior:'smooth',block:'center'});}
    var u = new SpeechSynthesisUtterance(s[ci]);
    u.lang = 'zh-HK'; u.voice = voice; u.rate = speed;
    u.onend = function() { ci++; setTimeout(nxt, 400); };
    u.onerror = function() { spk = false; if(btn) btn.classList.remove('playing'); };
    synth.speak(u);
  })();
}
function stopSpeak() {
  if(synth) synth.cancel();
  spk = false; cl = null;
  document.querySelectorAll('.pbar button.playing').forEach(function(b){b.classList.remove('playing');});
  document.querySelectorAll('.prog').forEach(function(p){p.textContent='';});
}
function jumpTo(k, idx) {
  stopSpeak();
  ci = idx;
  var s = TEXTS[k]; if(!s) return;
  var voice = gv(); if(!voice) return;
  spk = true; cl = k;
  var btn = document.getElementById('btn-'+k);
  var prog = document.getElementById('prog-'+k);
  var speed = parseFloat(document.getElementById('spd-'+k).value);
  if(btn) btn.classList.add('playing');
  document.querySelectorAll('#text-'+k+' .s').forEach(function(x){x.classList.remove('active','played');});
  (function nxt() {
    if(!spk || ci >= s.length) {
      spk = false; if(btn) btn.classList.remove('playing');
      if(prog) prog.textContent = '✅ 完成'; cl = null; return;
    }
    if(prog) prog.textContent = (ci+1) + '/' + s.length;
    var pv = document.getElementById('s-'+k+'-'+(ci-1));
    if(pv){pv.classList.remove('active');pv.classList.add('played');}
    var cu = document.getElementById('s-'+k+'-'+ci);
    if(cu){cu.classList.add('active');cu.scrollIntoView({behavior:'smooth',block:'center'});}
    var u = new SpeechSynthesisUtterance(s[ci]);
    u.lang = 'zh-HK'; u.voice = voice; u.rate = speed;
    u.onend = function() { ci++; setTimeout(nxt, 400); };
    u.onerror = function() { spk = false; if(btn) btn.classList.remove('playing'); };
    synth.speak(u);
  })();
}
function switchPage(name, btn) {
  stopSpeak();
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.utabs button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
window.addEventListener('DOMContentLoaded', function() {
  buildAll();
  if(synth) synth.getVoices();
});
</script>
