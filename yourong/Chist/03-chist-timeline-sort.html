<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中史時間線排序 — 雙軌練習</title>
<style>
:root {
  --glass-bg: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.55);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-muted: #787878;
  --accent: #c41e3a;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --radius: 16px;
  --font: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: linear-gradient(135deg, #f5f0eb 0%, #e8e0d8 30%, #f0ece6 60%, #f8f5f0 100%);
  background-attachment: fixed;
  min-height: 100vh; min-height: 100dvh;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
body::before {
  content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(196,30,58,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(37,99,235,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 24px 16px 80px; }
header { text-align: center; margin-bottom: 24px; }
header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
header p  { font-size: 0.9rem; color: var(--text-muted); }

.glass {
  background: var(--glass-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
}

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 18px; margin-bottom: 20px; flex-wrap: wrap;
}
.top-bar .round-info { font-size: 0.88rem; font-weight: 600; }
.top-bar .round-info span { color: var(--accent); }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
  border-radius: 99px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.6);
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  font-family: var(--font); color: var(--text);
}
.btn:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.green { background: var(--green); color: #fff; border-color: var(--green); }
.btn.small { padding: 6px 14px; font-size: 0.8rem; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

/* ── Two-column timeline layout ── */
.timelines { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .timelines { grid-template-columns: 1fr; } }

.timeline-col {
  padding: 16px; position: relative;
}
.timeline-col .col-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid rgba(0,0,0,0.06);
}
.timeline-col .col-header .col-icon { font-size: 1.3rem; }
.timeline-col .col-header .col-title { font-weight: 700; font-size: 0.95rem; flex: 1; }
.timeline-col .col-header .col-badge {
  font-size: 0.72rem; font-weight: 600; padding: 2px 10px; border-radius: 99px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
}

/* ── Event chips ── */
.event-list { display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
.event-chip {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  border-radius: 12px; background: rgba(255,255,255,0.65);
  border: 1.5px solid rgba(0,0,0,0.08); cursor: pointer; transition: all 0.2s;
  user-select: none; -webkit-user-select: none;
  position: relative;
}
.event-chip:hover { border-color: rgba(0,0,0,0.18); background: rgba(255,255,255,0.85); }
.event-chip:active { transform: scale(0.985); }
.event-chip .chip-letter {
  width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-weight: 800; font-size: 0.82rem;
  background: rgba(0,0,0,0.05); color: var(--text-muted); flex-shrink: 0;
}
.event-chip .chip-text { flex: 1; font-size: 0.9rem; font-weight: 500; line-height: 1.4; }
.event-chip .chip-year { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; min-width: 56px; text-align: right; }

/* Selected state */
.event-chip.selected { border-color: var(--accent); background: #fef0f2; box-shadow: 0 0 0 3px rgba(196,30,58,0.12); }
.event-chip.selected .chip-letter { background: var(--accent); color: #fff; }

/* Swap animation */
.event-chip.swapping { animation: swapPulse 0.35s ease; }
@keyframes swapPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); background: #fef0f2; }
}

/* Checked states */
.event-chip.correct { border-color: #86efac; background: #f0fdf4; }
.event-chip.correct .chip-year { color: var(--green); font-weight: 700; }
.event-chip.wrong { border-color: #fca5a5; background: #fef2f2; }
.event-chip.wrong .chip-year { color: var(--red); font-weight: 700; }

/* Hints */
.hint-text { font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-top: 10px; }

/* Check bar */
.check-bar { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.check-bar .btn { min-width: 120px; justify-content: center; }

/* Result banner */
.result-banner { display: none; text-align: center; padding: 16px; margin-top: 16px; border-radius: var(--radius); }
.result-banner.show { display: block; }
.result-banner.perfect { background: #f0fdf4; border: 1px solid #86efac; }
.result-banner.good { background: #fffbeb; border: 1px solid #fcd34d; }
.result-banner.poor { background: #fef2f2; border: 1px solid #fca5a5; }
.result-banner .rb-emoji { font-size: 2rem; margin-bottom: 4px; }
.result-banner .rb-text { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
.result-banner .rb-detail { font-size: 0.85rem; color: var(--text-muted); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px; padding: 40px 32px; text-align: center;
  max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-box .m-emoji { font-size: 3.5rem; margin-bottom: 12px; }
.modal-box h2 { font-size: 1.4rem; margin-bottom: 8px; }
.modal-box p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }

/* Instruction box */
.instruction {
  padding: 14px 18px; margin-bottom: 18px; font-size: 0.85rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 10px;
}
.instruction .instr-icon { font-size: 1.2rem; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>⏱️ 中史時間線排序</h1>
    <p>雙軌練習：國內政治線 + 外交線　·　點擊兩張卡交換位置</p>
  </header>

  <!-- Top bar -->
  <div class="top-bar glass" id="topBar">
    <div class="round-info">📋 第 <span id="roundNum">1</span>/<span id="roundTotal">5</span> 組</div>
    <button class="btn small" id="shuffleBtn" onclick="shuffleAll()">🔀 重新打亂</button>
    <button class="btn small" onclick="resetAllRounds()">↺ 全部重置</button>
  </div>

  <!-- Instruction -->
  <div class="instruction glass">
    <span class="instr-icon">👆</span>
    <span><strong>點擊</strong>第一張卡選中 → 再<strong>點擊</strong>第二張卡交換位置 → 排好後按「核對答案」</span>
  </div>

  <!-- Timelines -->
  <div class="timelines" id="timelines"></div>

  <!-- Check bar -->
  <div class="check-bar" id="checkBar">
    <button class="btn accent" id="checkBtn" onclick="checkAnswers()">✅ 核對答案</button>
    <button class="btn green" id="nextBtn" onclick="nextRound()" style="display:none;">▶ 下一組</button>
  </div>

  <!-- Result -->
  <div class="result-banner" id="resultBanner"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="m-emoji" id="modalEmoji"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <button class="btn accent" onclick="closeModal()">繼續</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// EVENT POOL
// ═══════════════════════════════════════

// 國內政治線 (chronological order)
const DOMESTIC_POOL = [
  { text: '土地改革運動', year: '1950' },
  { text: '鎮壓反革命運動', year: '1950-51' },
  { text: '三反五反運動', year: '1951-52' },
  { text: '第一個五年計劃（一五計劃）', year: '1953-57' },
  { text: '三大改造', year: '1953-56' },
  { text: '整風鳴放運動', year: '1957' },
  { text: '反右運動', year: '1957-58' },
  { text: '社會主義建設總路線（三面紅旗）', year: '1958' },
  { text: '大躍進運動', year: '1958-62' },
  { text: '人民公社化運動', year: '1958' },
  { text: '廬山會議（彭德懷上書）', year: '1959' },
  { text: '三年經濟困難', year: '1959-61' },
  { text: '文化大革命', year: '1966-76' },
  { text: '四五運動（天安門事件）', year: '1976' },
];

// 外交線 (chronological order)
const DIPLO_POOL = [
  { text: '中蘇簽訂《中蘇友好同盟互助條約》', year: '1950' },
  { text: '抗美援朝戰爭（中國志願軍入朝）', year: '1950-53' },
  { text: '周恩來提出和平共處五項原則', year: '1953' },
  { text: '萬隆會議（亞非會議）', year: '1955' },
  { text: '中蘇交惡', year: '1960s' },
  { text: '珍寶島事件（中蘇邊境衝突）', year: '1969' },
  { text: '乒乓外交', year: '1971' },
  { text: '恢復聯合國合法席位', year: '1971' },
  { text: '尼克遜訪華（中美《上海公報》）', year: '1972' },
  { text: '中日建交（田中角榮訪華）', year: '1972' },
  { text: '中美正式建交', year: '1979' },
];

// ═══════════════════════════════════════
// ROUNDS — 5 pre-set rounds, each with domestic + diplo sets
// ═══════════════════════════════════════
const ROUNDS = [
  {
    label: '基礎練習',
    domestic: [1,2,6,8],      // 鎮壓反革命→三反五反→反右→大躍進
    diplo:    [0,5,8,10],     // 中蘇結盟→珍寶島→尼克遜訪華→中美建交
  },
  {
    label: '2425真題模式',
    domestic: [2,6,8,12],      // 三反五反→反右→大躍進→文革
    diplo:    [0,7,9,10],     // 中蘇結盟→聯合國席位→中日建交→中美建交
  },
  {
    label: '進階練習',
    domestic: [0,3,5,10],      // 土地改革→一五計劃→鳴放運動→廬山會議
    diplo:    [2,3,6,8],     // 和平共處五項→萬隆會議→乒乓外交→尼克遜訪華
  },
  {
    label: '高難度',
    domestic: [2,4,6,9],       // 三反五反→三大改造→反右→人民公社化
    diplo:    [0,4,6,9],     // 中蘇結盟→中蘇交惡→乒乓外交→中日建交
  },
  {
    label: '綜合測驗',
    domestic: [1,3,10,13],     // 鎮壓反革命→一五計劃→廬山會議→四五運動
    diplo:    [3,5,7,10],    // 萬隆會議→珍寶島→聯合國席位→中美建交
  },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentRound = 0;
let checked = false;

// Each timeline: { title, icon, items: [{text,year,letter,poolIdx}] }
let timelineState = []; // [domesticItems, diploItems]

function buildRound(rIdx) {
  const r = ROUNDS[rIdx];
  const dom = r.domestic.map((poolIdx, i) => ({
    ...DOMESTIC_POOL[poolIdx],
    letter: String.fromCharCode(65 + i),
    poolIdx,
  }));
  const dip = r.diplo.map((poolIdx, i) => ({
    ...DIPLO_POOL[poolIdx],
    letter: String.fromCharCode(65 + i),
    poolIdx,
  }));
  return [dom, dip];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  // Ensure it's not accidentally in correct order
  if (arraysEqual(a, arr)) return shuffle(arr);
  return a;
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((x, i) => x.poolIdx === b[i].poolIdx);
}

let selectedTimeline = -1; // -1=none, 0=domestic, 1=diplo
let selectedChipIdx = -1;

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function initRound() {
  const [domOrdered, dipOrdered] = buildRound(currentRound);
  timelineState = [shuffle(domOrdered), shuffle(dipOrdered)];
  checked = false;
  selectedTimeline = -1;
  selectedChipIdx = -1;
  renderAll();
}

function renderAll() {
  const container = document.getElementById('timelines');
  const r = ROUNDS[currentRound];

  const cols = [
    { title: '國內政治線', icon: '🏛️', ti: 0, state: timelineState[0] },
    { title: '外交線', icon: '🌏', ti: 1, state: timelineState[1] },
  ];

  let html = '';
  for (const col of cols) {
    html += `<div class="timeline-col glass">
      <div class="col-header">
        <span class="col-icon">${col.icon}</span>
        <span class="col-title">${col.title}</span>
        <span class="col-badge">${col.state.length} 事件</span>
      </div>
      <div class="event-list" id="eventList${col.ti}">`;
    for (let i = 0; i < col.state.length; i++) {
      const ev = col.state[i];
      let cls = 'event-chip';
      if (selectedTimeline === col.ti && selectedChipIdx === i) cls += ' selected';
      if (checked) {
        const correctIdx = getCorrectIndex(col.ti, ev.poolIdx);
        if (i === correctIdx) cls += ' correct';
        else cls += ' wrong';
      }
      html += `<div class="${cls}" onclick="chipClick(${col.ti}, ${i})" data-ti="${col.ti}" data-idx="${i}">
        <div class="chip-letter">${ev.letter}</div>
        <div class="chip-text">${ev.text}</div>
        <div class="chip-year">${checked ? ev.year : '????'}</div>
      </div>`;
    }
    html += `</div>
      <div class="hint-text">${checked ? '' : '按正確時間先後排序（最早在上）'}</div>
    </div>`;
  }
  container.innerHTML = html;

  // Update round info
  document.getElementById('roundNum').textContent = currentRound + 1;
  document.getElementById('roundTotal').textContent = ROUNDS.length;

  // Buttons
  document.getElementById('checkBtn').style.display = checked ? 'none' : '';
  document.getElementById('nextBtn').style.display = checked ? '' : 'none';
  document.getElementById('shuffleBtn').disabled = checked;
  document.getElementById('resultBanner').classList.remove('show', 'perfect', 'good', 'poor');
}

function getCorrectIndex(ti, poolIdx) {
  const r = ROUNDS[currentRound];
  const poolIndices = ti === 0 ? r.domestic : r.diplo;
  return poolIndices.indexOf(poolIdx);
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
function chipClick(ti, idx) {
  if (checked) return; // locked after checking

  if (selectedTimeline === -1) {
    // First selection
    selectedTimeline = ti;
    selectedChipIdx = idx;
  } else if (selectedTimeline === ti && selectedChipIdx === idx) {
    // Deselect
    selectedTimeline = -1;
    selectedChipIdx = -1;
  } else if (selectedTimeline === ti) {
    // Swap within same timeline
    const arr = timelineState[ti];
    [arr[selectedChipIdx], arr[idx]] = [arr[idx], arr[selectedChipIdx]];
    // Animate
    animateSwap(ti, selectedChipIdx, idx);
    selectedTimeline = -1;
    selectedChipIdx = -1;
  } else {
    // Cross-timeline selection — change selection to new timeline
    selectedTimeline = ti;
    selectedChipIdx = idx;
  }
  renderAll();
}

function animateSwap(ti, i, j) {
  setTimeout(() => {
    const list = document.getElementById('eventList' + ti);
    if (!list) return;
    const chips = list.querySelectorAll('.event-chip');
    if (chips[i]) chips[i].classList.add('swapping');
    if (chips[j]) chips[j].classList.add('swapping');
    setTimeout(() => {
      if (chips[i]) chips[i].classList.remove('swapping');
      if (chips[j]) chips[j].classList.remove('swapping');
    }, 400);
  }, 50);
}

// ═══════════════════════════════════════
// CHECK
// ═══════════════════════════════════════
function checkAnswers() {
  checked = true;
  selectedTimeline = -1;
  selectedChipIdx = -1;

  // Score
  let correctCount = 0;
  let totalCount = 0;
  const r = ROUNDS[currentRound];
  for (let ti = 0; ti < 2; ti++) {
    const poolIndices = ti === 0 ? r.domestic : r.diplo;
    const items = timelineState[ti];
    for (let i = 0; i < items.length; i++) {
      totalCount++;
      if (items[i].poolIdx === poolIndices[i]) correctCount++;
    }
  }

  renderAll();

  // Show result
  const banner = document.getElementById('resultBanner');
  banner.classList.add('show');
  if (correctCount === totalCount) {
    banner.className = 'result-banner show perfect';
    banner.innerHTML = `<div class="rb-emoji">🎯</div><div class="rb-text">全部正確！（${correctCount}/${totalCount}）</div><div class="rb-detail">時間線排序已掌握，考試穩拿8-10分</div>`;
  } else if (correctCount >= totalCount - 2) {
    banner.className = 'result-banner show good';
    banner.innerHTML = `<div class="rb-emoji">👍</div><div class="rb-text">接近滿分（${correctCount}/${totalCount}）</div><div class="rb-detail">檢查紅色卡片：年份標記揭示了正確位置，記住後再練一次</div>`;
  } else {
    banner.className = 'result-banner show poor';
    banner.innerHTML = `<div class="rb-emoji">📚</div><div class="rb-text">還需練習（${correctCount}/${totalCount}）</div><div class="rb-detail">紅色卡片位置不對——看年份標記找出正確順序，按「重新打亂」再試</div>`;
  }

  // Update buttons
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('shuffleBtn').disabled = false;

  banner.scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function shuffleAll() {
  initRound();
}

function nextRound() {
  if (currentRound < ROUNDS.length - 1) {
    currentRound++;
    initRound();
  } else {
    showModal('🏆', '全部5組完成！', '兩條時間線已反覆練習。考試排序題穩拿！');
    currentRound = 0;
    initRound();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAllRounds() {
  if (confirm('確定要重置全部進度？將回到第1組，所有排序重新打亂。')) {
    currentRound = 0;
    initRound();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function showModal(emoji, title, desc) {
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !checked) {
    e.preventDefault(); checkAnswers();
  }
  if (e.key === 'ArrowRight' && checked) {
    e.preventDefault(); nextRound();
  }
  if (e.key === 'r' && e.ctrlKey) {
    e.preventDefault(); shuffleAll();
  }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
initRound();
</script>
</body>
</html>
