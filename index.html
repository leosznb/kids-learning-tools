<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Microsoft YaHei",sans-serif;
  min-height:100vh;color:#fff;
  background:linear-gradient(160deg,#0f0c29 0%,#1a1a3e 30%,#16213e 60%,#0f3460 100%);
  -webkit-font-smoothing:antialiased;
}
/* 星空粒子背景 */
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:
    radial-gradient(2px 2px at 20px 30px,#eee,transparent),
    radial-gradient(2px 2px at 40px 70px,rgba(255,255,255,.8),transparent),
    radial-gradient(2px 2px at 50px 160px,#ddd,transparent),
    radial-gradient(2px 2px at 90px 40px,#fff,transparent),
    radial-gradient(2px 2px at 130px 80px,rgba(255,255,255,.9),transparent),
    radial-gradient(2px 2px at 160px 120px,#ddd,transparent),
    radial-gradient(1px 1px at 200px 50px,#fff,transparent),
    radial-gradient(1px 1px at 250px 90px,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 300px 30px,#eee,transparent),
    radial-gradient(1px 1px at 350px 110px,#fff,transparent),
    radial-gradient(2px 2px at 400px 60px,rgba(255,255,255,.8),transparent),
    radial-gradient(1px 1px at 430px 150px,#ddd,transparent);
  pointer-events:none;z-index:0;
}
.app{max-width:480px;margin:0 auto;padding:24px 16px 40px;position:relative;z-index:1}

/* 头部 */
.hero{text-align:center;padding:32px 0 28px}
.hero .icon{font-size:3em;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.hero h1{font-size:1.8em;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero .tagline{font-size:0.85em;color:#8892b0;margin-top:8px;letter-spacing:1px}
.hero .divider{width:40px;height:3px;background:linear-gradient(90deg,#a78bfa,#34d399);margin:16px auto 0;border-radius:2px}

/* 卡片容器 */
.kid-list{display:flex;flex-direction:column;gap:20px}

/* 孩子卡片 */
.kid-card{
  position:relative;border-radius:24px;padding:28px 24px;
  cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  text-decoration:none;display:block;
  border:1px solid transparent;
}
.kid-card::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:radial-gradient(ellipse at top left,var(--glow),transparent 70%);
  opacity:0;transition:opacity .4s;
}
.kid-card:active::before{opacity:1}
.kid-card:active{transform:scale(0.97)}
.kid-card .card-bg{
  position:absolute;inset:0;border-radius:24px;
}
.kid-card .card-content{position:relative;z-index:1;display:flex;align-items:center;gap:18px}
.kid-card .kid-avatar{
  width:64px;height:64px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.2em;flex-shrink:0;
  box-shadow:0 8px 30px var(--shadow);
}
.kid-card .kid-info{flex:1}
.kid-card .kid-name{font-size:1.35em;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.kid-card .kid-grade{font-size:0.8em;opacity:0.7;margin-bottom:8px}
.kid-card .kid-meta{display:flex;gap:10px;flex-wrap:wrap}
.kid-card .kid-meta span{
  font-size:0.72em;padding:3px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  white-space:nowrap;
}
.kid-card .arrow{
  font-size:1.3em;opacity:0.5;transition:all .3s;flex-shrink:0;
  width:30px;text-align:center;
}
.kid-card:active .arrow{transform:translateX(4px);opacity:1}

/* 有容 - 绿色 Nature Organic */
.kid-card.yr{
  background:linear-gradient(135deg,rgba(22,53,30,.85),rgba(15,38,20,.9));
  border-color:rgba(52,211,153,.2);
  box-shadow:0 4px 30px rgba(52,211,153,.08);
}
.kid-card.yr .kid-avatar{
  background:linear-gradient(135deg,#34d399,#059669);
  box-shadow:0 8px 30px rgba(52,211,153,.35);
}
.kid-card.yr{--glow:rgba(52,211,153,.15);}
.kid-card.yr .kid-avatar{--shadow:rgba(52,211,153,.35);}

/* 海納 - 蓝色 Ocean Tech */
.kid-card.hn{
  background:linear-gradient(135deg,rgba(15,23,42,.85),rgba(12,18,34,.9));
  border-color:rgba(96,165,250,.2);
  box-shadow:0 4px 30px rgba(96,165,250,.08);
}
.kid-card.hn .kid-avatar{
  background:linear-gradient(135deg,#60a5fa,#2563eb);
  box-shadow:0 8px 30px rgba(96,165,250,.35);
}
.kid-card.hn{--glow:rgba(96,165,250,.15);}
.kid-card.hn .kid-avatar{--shadow:rgba(96,165,250,.35);}

/* 多多 - 金色 Warm Sun */
.kid-card.dd{
  background:linear-gradient(135deg,rgba(40,30,10,.85),rgba(30,20,8,.9));
  border-color:rgba(251,191,36,.2);
  box-shadow:0 4px 30px rgba(251,191,36,.08);
}
.kid-card.dd .kid-avatar{
  background:linear-gradient(135deg,#fbbf24,#d97706);
  box-shadow:0 8px 30px rgba(251,191,36,.35);
}
.kid-card.dd{--glow:rgba(251,191,36,.15);}
.kid-card.dd .kid-avatar{--shadow:rgba(251,191,36,.35);}

/* 動畫 */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* 底部 */
.footer{
  text-align:center;margin-top:32px;
  font-size:0.7em;color:#64748b;letter-spacing:1px;
  opacity:0.6;
}

/* 子頁面返回按鈕 */
.back-btn{
  display:none;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#cbd5e1;font-size:0.85em;cursor:pointer;padding:8px 14px;
  border-radius:20px;margin-bottom:12px;transition:all .2s;
}
.back-btn.show{display:inline-flex}
.back-btn:active{background:rgba(255,255,255,.12)}

/* 頁面切換 */
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* 科目頁 */
.subj-header{text-align:center;padding:20px 0 24px}
.subj-header .emoji-lg{font-size:3.5em;display:block;margin-bottom:8px}
.subj-header h2{font-size:1.6em;font-weight:700}
.subj-header .sub{font-size:0.85em;color:#8892b0;margin-top:4px}
.subject-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.subject-card{
  border-radius:18px;padding:18px 14px;cursor:pointer;
  transition:all .25s;display:flex;flex-direction:column;gap:8px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.subject-card::after{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:var(--accent);border-radius:4px 0 0 4px;opacity:.6;
}
.subject-card:active{transform:scale(.96);background:rgba(255,255,255,.08)}
.subject-card .s-emoji{font-size:1.8em}
.subject-card .s-name{font-size:0.95em;font-weight:600}
.subject-card .s-meta{font-size:0.72em;color:#94a3b8;display:flex;align-items:center;gap:5px}
.subject-card .s-dot{width:6px;height:6px;border-radius:3px}
.subject-card .s-dot.on{background:#34d399}
.subject-card .s-dot.off{background:#475569}

/* 工具頁 */
.tool-header{text-align:center;padding:16px 0 20px}
.tool-header .emoji-lg{font-size:3em;display:block;margin-bottom:8px}
.tool-header h2{font-size:1.4em;font-weight:700}
.tool-header .sub{font-size:0.8em;color:#8892b0;margin-top:4px}
.tool-list{display:flex;flex-direction:column;gap:10px}
.tool-item{
  border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
}
.tool-item:active{transform:scale(.98);background:rgba(255,255,255,.08)}
.tool-item .t-icon{font-size:1.6em;flex-shrink:0}
.tool-item .t-info{flex:1}
.tool-item .t-name{font-size:0.95em;font-weight:600;margin-bottom:2px}
.tool-item .t-desc{font-size:0.72em;color:#8892b0}
.tool-item .t-arrow{color:#64748b;font-size:1.1em}
.tool-item.coming{opacity:.45}
.tool-item.coming .t-arrow{color:#475569}

/* 空狀態 */
.empty-state{text-align:center;padding:40px 20px;color:#64748b}
.empty-state .e-icon{font-size:3em;opacity:.4;margin-bottom:12px}
</style>

    }
  }
];

let historyStack = ['home'];
let currentKid = null;
let currentSubject = null;

// ============================================================
// 渲染
// ============================================================
function renderHome(){
  const grid = document.getElementById('kidGrid');
  grid.innerHTML = '';
  KIDS.forEach(kid => {
    const totalTools = Object.values(kid.subjects)
      .reduce((sum,s)=>sum + s.tools.filter(t=>!t.coming).length, 0);
    const card = document.createElement('div');
    card.className = `kid-card ${kid.css}`;
    card.innerHTML = `
      <div class="card-content">
        <div class="kid-avatar">${kid.emoji}</div>
        <div class="kid-info">
          <div class="kid-name">${kid.name}</div>
          <div class="kid-grade">${kid.note}</div>
          <div class="kid-meta">
            <span>${kid.grade}</span>
            <span>${totalTools} 工具</span>
            <span>${Object.keys(kid.subjects).length} 科</span>
          </div>
        </div>
        <span class="arrow">→</span>
      </div>
    `;
    card.onclick = ()=>{navigateToSubjects(kid);};
    grid.appendChild(card);
  });
}

function renderSubjects(kid, noPush){
  const h = document.getElementById('subjHeader');
  h.innerHTML = `
    <div class="emoji-lg">${kid.emoji}</div>
    <h2>${kid.name} 的科目</h2>
    <div class="sub">${kid.note}</div>
  `;
  const grid = document.getElementById('subjGrid');
  grid.innerHTML = '';
  for(const [skey,subj] of Object.entries(kid.subjects)){
    const toolCount = subj.tools.filter(t=>!t.coming).length;
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.setProperty('--accent', SUBJECT_COLORS[skey]||'#64748b');
    card.innerHTML = `
      <div class="s-emoji">${ICONS[skey]||'📁'}</div>
      <div class="s-name">${SUBJECT_NAMES[skey]||skey}</div>
      <div class="s-meta">
        <span class="s-dot ${toolCount>0?'on':'off'}"></span>
        ${toolCount>0 ? `${toolCount} 個工具` : '暫無'}
      </div>
    `;
    card.onclick = ()=>{navigateToTools(kid,skey);};
    grid.appendChild(card);
  }
  showPage('subjects');
  document.getElementById('backBtn').classList.add('show');
  if(!noPush) historyStack.push('subjects');
}

function renderTools(kid,subjKey, noPush){
  const subj = kid.subjects[subjKey];
  const h = document.getElementById('toolHeader');
  h.innerHTML = `
    <div class="emoji-lg">${ICONS[subjKey]||'📁'}</div>
    <h2>${SUBJECT_NAMES[subjKey]||subjKey}</h2>
    <div class="sub">${kid.name} · ${kid.grade}</div>
  `;
  const list = document.getElementById('toolList');
  list.innerHTML = '';
  if(!subj.tools.length){
    list.innerHTML = '<div class="empty-state"><div class="e-icon">🔧</div>暫無工具，敬請期待</div>';
  } else {
    subj.tools.forEach(t=>{
      const item = document.createElement('div');
      item.className = `tool-item${t.coming?' coming':''}`;
      item.innerHTML = `
        <span class="t-icon">${t.icon}</span>
        <div class="t-info">
          <div class="t-name">${t.name}</div>
          <div class="t-desc">${t.desc}</div>
        </div>
        <span class="t-arrow">${t.coming?'':'→'}</span>
      `;
      if(!t.coming){
        item.onclick = ()=>{ window.open(t.file||'index.html','_blank'); };
      }
      list.appendChild(item);
    });
  }
  showPage('tools');
  if(!noPush) historyStack.push('tools');
}

// ============================================================
// 導航
// ============================================================
function navigateToSubjects(kid){
  currentKid = kid;
  renderSubjects(kid);
}

function navigateToTools(kid,subjKey){
  currentKid = kid;
  currentSubject = subjKey;
  renderTools(kid,subjKey);
}

function goBack(){
  if(historyStack.length<=1) return;
  historyStack.pop();
  const prev = historyStack[historyStack.length-1];
  if(prev==='home'){
    showPage('home');
    document.getElementById('backBtn').classList.remove('show');
  } else if(prev==='subjects'){
    renderSubjects(currentKid, true);
  } else if(prev==='tools'){
    renderTools(currentKid,currentSubject, true);
  }
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

// ============================================================
// 初始化
// ============================================================
renderHome();
</script>
</body>
</html>
