<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards: Cations & Anions — 有容</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background:linear-gradient(160deg,#e8f5e9,#c8e6c9);
    min-height:100vh; display:flex; justify-content:center; padding:20px;
  }
  .app { max-width:700px; width:100%; }
  h1 { text-align:center; font-size:24px; color:#1b5e20; margin-bottom:2px; letter-spacing:2px; }
  .user-badge { text-align:center; margin-bottom:14px; }
  .user-badge span { display:inline-block; background:#2e7d32; color:#fff; padding:4px 16px; border-radius:20px; font-size:13px; font-weight:700; }
  .stats { display:flex; gap:10px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
  .stat { background:#fff; border-radius:8px; padding:8px 14px; text-align:center; font-size:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .stat .n { font-size:22px; font-weight:700; }
  .stat .n.green { color:#2e7d32; }
  .stat .n.red { color:#c62828; }
  .stat .n.gray { color:#666; }
  .controls { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .controls button, .controls select {
    padding:7px 14px; border-radius:6px; border:1.5px solid #ccc;
    background:#fff; font-size:13px; cursor:pointer; font-weight:600;
  }
  .controls button.active { background:#2e7d32; color:#fff; border-color:#2e7d32; }
  .controls select { min-width:120px; }

  .flashcard-container {
    perspective:1000px; width:100%; height:260px;
    margin:10px 0; cursor:pointer; position:relative;
  }
  .flashcard {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform .5s ease;
  }
  .flashcard.flipped { transform:rotateY(180deg); }
  .card-face {
    position:absolute; width:100%; height:100%; backface-visibility:hidden;
    border-radius:16px; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    box-shadow:0 4px 20px rgba(0,0,0,.10);
  }
  .card-front {
    background:linear-gradient(135deg,#fff,#f5f5f5);
    border:3px solid #2e7d32;
  }
  .card-front .formula { font-size:64px; font-weight:700; color:#1b5e20; letter-spacing:3px; }
  .card-front .hint { font-size:13px; color:#999; margin-top:6px; }
  .card-back {
    background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
    border:3px solid #388e3c; transform:rotateY(180deg);
  }
  .card-back .name { font-size:28px; font-weight:700; color:#1b5e20; }
  .card-back .detail { font-size:16px; color:#555; margin-top:4px; }
  .card-back .charge-badge {
    display:inline-block; margin-top:8px; padding:6px 18px;
    border-radius:20px; font-size:20px; font-weight:700;
  }
  .charge-pos { background:#e8f5e9; color:#2e7d32; }
  .charge-neg { background:#fdecea; color:#c62828; }

  .nav-btns { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
  .nav-btns button {
    padding:10px 22px; border-radius:8px; border:none;
    font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-got { background:#c8e6c9; color:#2e7d32; }
  .btn-got:hover { background:#a5d6a7; }
  .btn-later { background:#ffe0b2; color:#e65100; }
  .btn-later:hover { background:#ffcc80; }
  .btn-skip { background:#f5f5f5; color:#666; }
  .btn-skip:hover { background:#e0e0e0; }
  .btn-direction { background:#e8f5e9; color:#2e7d32; font-size:12px; }

  .progress-bar { width:100%; height:6px; background:#e0e0e0; border-radius:3px; margin:10px 0; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#4caf50,#8bc34a); border-radius:3px; transition:width .3s; }

  .mode-indicator { text-align:center; font-size:12px; color:#888; margin-bottom:6px; }
  .counter { text-align:center; font-size:13px; color:#555; margin-top:4px; }

  .empty { text-align:center; padding:40px; color:#999; font-size:16px; }
  .empty .trophy { font-size:48px; }
</style>
</head>
<body>
<div class="app">
  <h1>Cations &amp; Anions Flashcards</h1>
  <div class="user-badge"><span>👤 有容 &nbsp;|&nbsp; EMI Bilingual</span></div>

  <div class="stats" id="stats">
    <div class="stat">✅ <span class="n green" id="got">0</span><br>Mastered</div>
    <div class="stat">🔄 <span class="n red" id="later">0</span><br>Review later</div>
    <div class="stat">📦 <span class="n gray" id="remain">44</span><br>Remaining</div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>

  <div class="controls">
    <select id="filter" onchange="applyFilter()">
      <option value="all">All ions</option>
      <option value="cation">Cations only</option>
      <option value="anion">Anions only</option>
      <option value="tricky">⚠ Tricky only (Cu,Fe,Hg,Ag,Zn,NH₄)</option>
    </select>
    <button id="dirBtn" onclick="toggleDirection()">🔄 Formula → Name</button>
    <button onclick="shuffleDeck()">🔀 Shuffle</button>
    <button onclick="resetDeck()">🔁 Reset All</button>
  </div>
  <div class="mode-indicator" id="modeHint">Card shows <strong>formula</strong> — guess the <strong>name</strong></div>

  <div class="flashcard-container" id="cardContainer" onclick="flipCard()">
    <div class="flashcard" id="flashcard">
      <div class="card-face card-front">
        <div class="formula" id="frontText">Na⁺</div>
        <div class="hint">Tap to reveal</div>
      </div>
      <div class="card-face card-back">
        <div class="name" id="backName">sodium ion</div>
        <div class="detail" id="backCN">鈉離子</div>
        <div class="charge-badge charge-pos" id="backCharge">1+</div>
      </div>
    </div>
  </div>
  <div class="counter" id="counter">Card 1 / 44</div>

  <div class="nav-btns">
    <button class="btn-got" onclick="markGotIt()">✅ Got it!</button>
    <button class="btn-later" onclick="markLater()">🔄 Not yet</button>
    <button class="btn-skip" onclick="nextCard()">⏭ Skip</button>
  </div>
</div>

<script>
const allIons = [
  {formula:"Na⁺",name:"sodium ion",cn:"鈉離子",charge:"1+",chargeSign:"pos",cat:"cation"},
  {formula:"K⁺",name:"potassium ion",cn:"鉀離子",charge:"1+",chargeSign:"pos",cat:"cation"},
  {formula:"Cu⁺",name:"copper(I) ion",cn:"銅(I)離子",charge:"1+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Ag⁺",name:"silver ion",cn:"銀離子",charge:"1+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Hg⁺",name:"mercury(I) ion",cn:"汞(I)離子",charge:"1+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"H⁺",name:"hydrogen ion",cn:"氫離子",charge:"1+",chargeSign:"pos",cat:"cation"},
  {formula:"NH₄⁺",name:"ammonium ion",cn:"銨離子",charge:"1+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Mg²⁺",name:"magnesium ion",cn:"鎂離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Ca²⁺",name:"calcium ion",cn:"鈣離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Ba²⁺",name:"barium ion",cn:"鋇離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Pb²⁺",name:"lead(II) ion",cn:"鉛(II)離子",charge:"2+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Fe²⁺",name:"iron(II) ion",cn:"鐵(II)離子",charge:"2+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Co²⁺",name:"cobalt(II) ion",cn:"鈷(II)離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Ni²⁺",name:"nickel(II) ion",cn:"鎳(II)離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Mn²⁺",name:"manganese(II) ion",cn:"錳(II)離子",charge:"2+",chargeSign:"pos",cat:"cation"},
  {formula:"Cu²⁺",name:"copper(II) ion",cn:"銅(II)離子",charge:"2+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Zn²⁺",name:"zinc ion",cn:"鋅離子",charge:"2+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Hg²⁺",name:"mercury(II) ion",cn:"汞(II)離子",charge:"2+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Al³⁺",name:"aluminium ion",cn:"鋁離子",charge:"3+",chargeSign:"pos",cat:"cation"},
  {formula:"Fe³⁺",name:"iron(III) ion",cn:"鐵(III)離子",charge:"3+",chargeSign:"pos",cat:"cation",tricky:true},
  {formula:"Cr³⁺",name:"chromium(III) ion",cn:"鉻(III)離子",charge:"3+",chargeSign:"pos",cat:"cation"},
  {formula:"H⁻",name:"hydride ion",cn:"氫負離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"Cl⁻",name:"chloride ion",cn:"氯離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"Br⁻",name:"bromide ion",cn:"溴離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"I⁻",name:"iodide ion",cn:"碘離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"OH⁻",name:"hydroxide ion",cn:"氫氧根離子",charge:"1−",chargeSign:"neg",cat:"anion",tricky:true},
  {formula:"NO₃⁻",name:"nitrate ion",cn:"硝酸根離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"NO₂⁻",name:"nitrite ion",cn:"亞硝酸根離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"HCO₃⁻",name:"hydrogencarbonate ion",cn:"碳酸氫根離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"HSO₄⁻",name:"hydrogensulphate ion",cn:"硫酸氫根離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"CN⁻",name:"cyanide ion",cn:"氰離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"MnO₄⁻",name:"permanganate ion",cn:"高錳酸根離子",charge:"1−",chargeSign:"neg",cat:"anion",tricky:true},
  {formula:"ClO₃⁻",name:"chlorate ion",cn:"氯酸根離子",charge:"1−",chargeSign:"neg",cat:"anion"},
  {formula:"ClO⁻",name:"hypochlorite ion",cn:"次氯酸根離子",charge:"1−",chargeSign:"neg",cat:"anion",tricky:true},
  {formula:"O²⁻",name:"oxide ion",cn:"氧離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"S²⁻",name:"sulphide ion",cn:"硫離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"SO₄²⁻",name:"sulphate ion",cn:"硫酸根離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"SO₃²⁻",name:"sulphite ion",cn:"亞硫酸根離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"SiO₃²⁻",name:"silicate ion",cn:"矽酸根離子",charge:"2−",chargeSign:"neg",cat:"anion",tricky:true},
  {formula:"CO₃²⁻",name:"carbonate ion",cn:"碳酸根離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"CrO₄²⁻",name:"chromate ion",cn:"鉻酸根離子",charge:"2−",chargeSign:"neg",cat:"anion"},
  {formula:"Cr₂O₇²⁻",name:"dichromate ion",cn:"重鉻酸根離子",charge:"2−",chargeSign:"neg",cat:"anion",tricky:true},
  {formula:"N³⁻",name:"nitride ion",cn:"氮離子",charge:"3−",chargeSign:"neg",cat:"anion"},
  {formula:"P³⁻",name:"phosphide ion",cn:"磷離子",charge:"3−",chargeSign:"neg",cat:"anion"},
  {formula:"PO₄³⁻",name:"phosphate ion",cn:"磷酸根離子",charge:"3−",chargeSign:"neg",cat:"anion"},
];

let deck = [];
let currentIdx = 0;
let gotSet = new Set();
let laterSet = new Set();
let showFormulaFirst = true;

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function buildDeck() {
  const filter = document.getElementById('filter').value;
  let pool = [...allIons];
  if (filter==='cation') pool = pool.filter(i=>i.cat==='cation');
  if (filter==='anion') pool = pool.filter(i=>i.cat==='anion');
  if (filter==='tricky') pool = pool.filter(i=>i.tricky);
  const remaining = pool.filter(i=>!gotSet.has(i.formula) && !laterSet.has(i.formula));
  const review = pool.filter(i=>laterSet.has(i.formula));
  deck = shuffle([...shuffle(review), ...shuffle(remaining)]);
  currentIdx = 0;
  if (deck.length===0) {
    document.getElementById('cardContainer').innerHTML = '<div class="empty"><div class="trophy">🏆</div>All done! You\'ve mastered this set.<br><span class="cn">全部完成！你已經掌握了這組離子。</span></div>';
    document.getElementById('flashcard') && updateCard();
  } else {
    updateCard();
  }
  updateStats();
}

function updateCard() {
  if (deck.length===0) return;
  const ion = deck[currentIdx];
  const fc = document.getElementById('flashcard');
  if (fc) fc.classList.remove('flipped');
  if (showFormulaFirst) {
    document.getElementById('frontText').textContent = ion.formula;
    document.getElementById('backName').textContent = ion.name;
    document.getElementById('backCN').textContent = ion.cn;
    const badge = document.getElementById('backCharge');
    badge.textContent = ion.charge;
    badge.className = 'charge-badge ' + (ion.chargeSign==='pos'?'charge-pos':'charge-neg');
  } else {
    document.getElementById('frontText').textContent = ion.name;
    document.getElementById('backName').textContent = ion.formula;
    document.getElementById('backCN').textContent = ion.cn;
    const badge = document.getElementById('backCharge');
    badge.textContent = ion.charge;
    badge.className = 'charge-badge ' + (ion.chargeSign==='pos'?'charge-pos':'charge-neg');
  }
  document.getElementById('counter').textContent = `Card ${currentIdx+1} / ${deck.length}`;
}

function flipCard() {
  const fc = document.getElementById('flashcard');
  if (!fc || deck.length===0) return;
  fc.classList.toggle('flipped');
}

function nextCard() {
  const fc = document.getElementById('flashcard');
  if (fc) fc.classList.remove('flipped');
  currentIdx = (currentIdx + 1) % deck.length;
  updateCard();
}

function markGotIt() {
  if (deck.length===0) return;
  const ion = deck[currentIdx];
  gotSet.add(ion.formula);
  laterSet.delete(ion.formula);
  deck.splice(currentIdx,1);
  if (deck.length===0) { buildDeck(); return; }
  if (currentIdx >= deck.length) currentIdx = 0;
  updateCard();
  updateStats();
}

function markLater() {
  if (deck.length===0) return;
  const ion = deck[currentIdx];
  laterSet.add(ion.formula);
  gotSet.delete(ion.formula);
  nextCard();
  updateStats();
}

function updateStats() {
  const total = allIons.length;
  const g = gotSet.size;
  const l = laterSet.size;
  const r = total - g - l;
  document.getElementById('got').textContent = g;
  document.getElementById('later').textContent = l;
  document.getElementById('remain').textContent = Math.max(0,r);
  document.getElementById('pbar').style.width = (g/total*100)+'%';
}

function toggleDirection() {
  showFormulaFirst = !showFormulaFirst;
  document.getElementById('dirBtn').textContent = showFormulaFirst ? '🔄 Formula → Name' : '🔄 Name → Formula';
  document.getElementById('modeHint').innerHTML = showFormulaFirst
    ? 'Card shows <strong>formula</strong> — guess the <strong>name</strong>'
    : 'Card shows <strong>name</strong> — guess the <strong>formula</strong>';
  updateCard();
}

function applyFilter() { buildDeck(); }
function shuffleDeck() { buildDeck(); }
function resetDeck() {
  gotSet.clear(); laterSet.clear();
  buildDeck();
}

buildDeck();
</script>
</body>
</html>
