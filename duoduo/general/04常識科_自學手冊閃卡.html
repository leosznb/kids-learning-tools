<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>多多常識科 — 自學手冊閃卡</title>
<style>
:root {
  --bg:#e8ecf1; --text:#2d3436; --sub:#636e72;
  --green:#3a7d44; --blue:#2c3e80;
  --font:'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--font); color:var(--text);
  min-height:100vh;
  background: linear-gradient(135deg, #e0e7f0 0%, #dce3e8 30%, #e8ecf1 60%, #dfe6ed 100%);
  background-attachment:fixed; padding:16px;
}
body::before{
  content:''; position:fixed; top:-30%; left:-20%; width:60%; height:60%;
  background: radial-gradient(circle, rgba(58,125,68,0.08) 0%, transparent 70%);
  border-radius:50%; pointer-events:none; z-index:0;
}
body::after{
  content:''; position:fixed; bottom:-20%; right:-15%; width:50%; height:50%;
  background: radial-gradient(circle, rgba(44,62,128,0.07) 0%, transparent 70%);
  border-radius:50%; pointer-events:none; z-index:0;
}
.container{max-width:720px; margin:0 auto; position:relative; z-index:1;}

h1{font-size:1.35em; text-align:center; margin-bottom:2px; color:var(--text);}
.subtitle{text-align:center; color:var(--sub); font-size:0.8em; margin-bottom:12px;}

.glass{
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
}

.top-bar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px 14px; margin-bottom:10px;}
.top-bar select{
  padding:6px 12px; border:1px solid rgba(0,0,0,0.12); border-radius:20px;
  font-size:0.85em; font-family:var(--font); background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px); cursor:pointer;
}
.top-bar .btn{
  padding:6px 14px; border:1px solid rgba(0,0,0,0.12); border-radius:20px;
  font-size:0.8em; font-weight:600; cursor:pointer; font-family:var(--font);
  background:rgba(255,255,255,0.6); backdrop-filter:blur(8px); transition:all 0.15s; white-space:nowrap;
}
.top-bar .btn:hover{background:rgba(255,255,255,0.85);}
.top-bar .btn.active{background:var(--green); color:#fff; border-color:var(--green);}
.top-bar .count{font-size:0.78em; color:var(--sub); margin-left:auto;}

/* Card */
.card-container{display:flex; flex-direction:column; align-items:center; padding:6px 0;}
.card-wrap{width:100%; max-width:480px; height:360px; perspective:1000px; cursor:pointer;}
.card-inner{width:100%; height:100%; position:relative; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}

.card-face{
  position:absolute; width:100%; height:100%; backface-visibility:hidden;
  border-radius:20px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:24px 22px; text-align:center;
  border:1px solid rgba(255,255,255,0.6);
  box-shadow: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  overflow-y:auto;
}
.card-front{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.card-back{
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transform:rotateY(180deg);
}

.card-front .label{font-size:0.75em; color:var(--sub); letter-spacing:2px; margin-bottom:8px;}
.card-front .term{font-size:1.45em; font-weight:700; line-height:1.5;}
.card-front .term.medium{font-size:1.2em;}
.card-front .term.small{font-size:1.05em;}
.card-front .hint{font-size:0.78em; color:var(--sub); margin-top:8px;}

.card-back .back-label{font-size:0.8em; color:var(--green); letter-spacing:2px; margin-bottom:8px;}
.card-back .definition{font-size:1.25em; line-height:1.85; color:var(--text); font-weight:500;}
.card-back .extra{font-size:0.95em; color:var(--sub); margin-top:12px; padding-top:10px; border-top:1px solid rgba(0,0,0,0.08);}

/* Keyword highlight */
.card-back .kw{
  font-weight:700; color:#b85c00;
  background: linear-gradient(180deg, transparent 60%, rgba(255,180,60,0.35) 60%);
  padding:0 2px; border-radius:2px;
}

/* Summary card */
.card-back .summary-title{font-size:0.85em; color:var(--blue); font-weight:700; margin-bottom:10px; letter-spacing:1px;}
.card-back .summary-points{text-align:left; font-size:1.1em; line-height:1.9;}
.card-back .summary-points li{margin-bottom:5px;}
.card-back .summary-points li::marker{color:var(--green); font-weight:700;}

.progress-row{display:flex; align-items:center; gap:10px; width:100%; max-width:480px; margin:10px auto; padding:0 4px;}
.progress-bar{flex:1; height:4px; background:rgba(0,0,0,0.08); border-radius:2px; overflow:hidden;}
.progress-fill{height:100%; background:var(--green); border-radius:2px; transition:width 0.3s;}
.progress-text{font-size:0.8em; color:var(--sub); white-space:nowrap;}

.nav-btns{display:flex; gap:10px; justify-content:center; align-items:center; width:100%; max-width:480px; margin:0 auto;}
.nav-btn{
  padding:10px 20px; border:1px solid rgba(0,0,0,0.12); border-radius:24px;
  font-size:0.9em; font-weight:600; cursor:pointer; font-family:var(--font);
  background:rgba(255,255,255,0.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  transition:all 0.15s;
}
.nav-btn:hover{background:rgba(255,255,255,0.8);}
.nav-btn:disabled{opacity:0.3; cursor:default;}

.click-hint{font-size:0.75em; color:var(--sub); text-align:center; margin-top:4px; opacity:0.6;}
.kb-hint{text-align:center; font-size:0.7em; color:var(--sub); margin-top:8px; opacity:0.6;}

@media(max-width:600px){
  body{padding:6px;}
  .card-wrap{height:320px;}
  .card-face{padding:18px 16px;}
  .card-front .term{font-size:1.2em;}
  .card-back .definition{font-size:1.1em;}
  .card-back .summary-points{font-size:1em;}
}
</style>
</head>
<body>
<div class="container">

<h1>🃏 多多常識呈分試 — 自學手冊閃卡</h1>
<p class="subtitle">第4冊第1-4課 + 第6冊第1-3課　｜　問答原文 + 本課總結　｜　點擊翻轉</p>

<div class="top-bar glass">
  <select id="lessonFilter" onchange="filterCards()">
    <option value="all">📚 全部（7課）</option>
    <option value="b4-1">B4-1 神經系統</option>
    <option value="b4-2">B4-2 泌尿系統</option>
    <option value="b4-3">B4-3 拒絕吸煙</option>
    <option value="b4-4">B4-4 不要喝酒</option>
    <option value="b6-1">B6-1 轉動的地球</option>
    <option value="b6-2">B6-2 月球的秘密</option>
    <option value="b6-3">B6-3 飛越太陽系</option>
  </select>
  <button class="btn" id="shuffleBtn" onclick="toggleShuffle()">🔀 隨機</button>
  <select id="typeFilter" onchange="filterCards()" style="font-size:0.8em;">
    <option value="all">全部類型</option>
    <option value="qa">📖 自學手冊問答</option>
    <option value="summary">📝 本課總結</option>
  </select>
  <span class="count" id="cardCount">0 張</span>
</div>

<div class="card-container glass" style="background:transparent; box-shadow:none; border:none;">
  <div class="card-wrap" id="cardWrap" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="click-hint">👆 點擊卡片翻轉看答案　<span style="color:#b85c00;">橙色底線</span> = 關鍵詞</div>
</div>

<div class="progress-row">
  <span style="font-size:0.85em;">📊</span>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <span class="progress-text" id="progText">0/0</span>
</div>

<div class="nav-btns">
  <button class="nav-btn" onclick="prevCard()" id="prevBtn">◀ 上一張</button>
  <span style="font-size:0.82em;color:var(--sub);" id="posText"></span>
  <button class="nav-btn" onclick="nextCard()" id="nextBtn">下一張 ▶</button>
</div>
<div class="kb-hint">⌨ 鍵盤：← → 翻頁　空白鍵 翻轉卡片</div>

</div>

<script>
// kw = wrap text in <span class="kw">
function kw(t){ return '<span class="kw">'+t+'</span>'; }

const allCards = [
  // ===== B4-1 神经系统 =====
  {L:'b4-1', type:'qa', t:'我們的身體是怎樣運作的？', d:'我們的身體是由'+kw('呼吸系統')+'、'+kw('循環系統')+'、'+kw('消化系統')+'、'+kw('神經系統')+'、'+kw('泌尿系統')+'、'+kw('骨骼')+'等系統和組織組成，它們'+kw('互相配合')+'，維持人體的'+kw('正常運作')+'。', e:'課本P.4-5'},
  {L:'b4-1', type:'qa', t:'人體的指揮中心在哪裏？', d:kw('神經系統')+'負責指揮人體的各個器官，由'+kw('腦')+'負責發出指令，'+kw('脊髓')+'和'+kw('神經')+'負責傳遞信息。', e:'課本P.6'},
  {L:'b4-1', type:'qa', t:'神經系統有甚麼功能？', d:'神經系統有'+kw('記憶')+'、'+kw('思考')+'、'+kw('協調動作')+'等功能。', e:'課本P.7'},
  {L:'b4-1', type:'qa', t:'神經系統怎樣協調身體各個部分？', d:kw('腦')+'接收來自'+kw('神經')+'的信息，經過'+kw('思考')+'，發出'+kw('指令')+'，'+kw('脊髓')+'和神經傳遞信息，指示相關的身體部分做出各種動作和行為。', e:'課本P.8'},
  {L:'b4-1', type:'qa', t:'甚麼是反射動作？', d:kw('反射動作')+'是當身體遇上某些突然的'+kw('刺激')+'，便會'+kw('不經思考')+'，作出即時及'+kw('快速')+'的反應，避免受傷。例子：碰到燙手的物件，我們會立即縮手。', e:'課本P.9'},
  {L:'b4-1', type:'qa', t:'怎樣保護神經系統？', d:'我們要保持正確的'+kw('姿勢')+'，以保護'+kw('脊柱')+'；踏單車時，可以戴上'+kw('頭盔')+'，保護'+kw('頭部')+'。我們還要養成良好的習慣，保護神經系統。', e:'課本P.10-11'},
  {L:'b4-1', type:'summary', t:'【本課總結】神經系統', d:'<div class="summary-points"><ol><li>人體內有不同的系統和組織，負責不同的工作，這些系統'+kw('互相配合')+'，維持人體的'+kw('正常運作')+'。</li><li>'+kw('神經系統')+'由'+kw('腦')+'、'+kw('脊髓')+'和'+kw('神經')+'組成，負責協調各個系統。</li><li>遇到突然的刺激，身體會不經思考，作出即時及快速的'+kw('反射動作')+'，避免受傷。</li><li>我們應小心保護'+kw('頭部')+'和'+kw('脊柱')+'，保持正確'+kw('姿勢')+'、減少碰撞。</li></ol></div>', e:''},

  // ===== B4-2 泌尿系统 =====
  {L:'b4-2', type:'qa', t:'為甚麼水對人體十分重要？', d:kw('水')+'是構成人體的'+kw('重要部分')+'。人體需要'+kw('水分')+'來維持身體'+kw('正常運作')+'，身體要平衡水分的吸收和排出。', e:'課本P.12-13'},
  {L:'b4-2', type:'qa', t:'泌尿系統是怎樣運作的？', d:kw('腎')+'：'+kw('過濾')+'血液中的廢物和多餘的水分。'+kw('輸尿管')+'：從腎輸送尿液到'+kw('膀胱')+'。膀胱：'+kw('儲存')+'尿液。'+kw('尿道')+'：輸送尿液，排出體外。', e:'課本P.14'},
  {L:'b4-2', type:'qa', t:'怎樣保護泌尿系統？', d:'每天喝'+kw('適量')+'的水、按需要上廁所、不'+kw('強忍小便')+'和少吃高'+kw('鹽分')+'的食物等，都有助保護泌尿系統。', e:'課本P.15-16'},
  {L:'b4-2', type:'summary', t:'【本課總結】泌尿系統', d:'<div class="summary-points"><ol><li>'+kw('水')+'是構成人體的重要成分。身體需要水來維持'+kw('正常運作')+'，例如幫助運送養分，透過排汗調節體溫。</li><li>排汗、排尿和呼氣時身體會流失水分，每天應喝'+kw('適量')+'的開水。</li><li>'+kw('腎')+'過濾 → '+kw('輸尿管')+' → '+kw('膀胱')+'暫存 → '+kw('尿道')+'排出。</li><li>每天喝適量的水、少吃高'+kw('鹽分')+'食物、不強忍小便。</li></ol></div>', e:''},

  // ===== B4-3 拒绝吸烟 =====
  {L:'b4-3', type:'qa', t:'你對吸煙有甚麼看法？', d:'很多人對吸煙存有誤解。例如有人以為吸食'+kw('電子煙')+'對健康沒有影響，但電子煙同樣含有'+kw('致癌物')+'，危害健康。', e:'課本P.20'},
  {L:'b4-3', type:'qa', t:'吸煙對身體有甚麼影響？', d:kw('焦油')+'含有'+kw('致癌')+'物質、刺激呼吸道、令牙齒和指甲變黃。'+kw('尼古丁')+'令人'+kw('上癮')+'，使血管收窄和血壓上升。'+kw('一氧化碳')+'降低人體血液的'+kw('帶氧能力')+'、令人加速衰老。吸煙者較易患上：'+kw('癌症')+'、肺炎、'+kw('心臟病')+'、腦血管病、哮喘等。', e:'課本P.21-22'},
  {L:'b4-3', type:'qa', t:'吸煙怎樣影響別人？', d:kw('二手煙')+'：吸煙者呼出的煙霧和煙草燃燒時產生的煙霧，危害別人的健康，孕婦吸入更會影響胎兒生長。'+kw('三手煙')+'：吸煙後殘留在衣服、頭髮或家具上的煙草殘餘化學物質，尤其對'+kw('幼兒')+'造成很大的傷害。', e:'課本P.23'},
  {L:'b4-3', type:'qa', t:'政府推行甚麼控煙措施？', d:'立法設定'+kw('禁煙區')+'、規管煙盒包裝要有'+kw('警告字句和圖片')+'、禁止煙草廣告和促銷活動、增加'+kw('煙草稅')+'等措施。', e:'課本P.24-25'},
  {L:'b4-3', type:'summary', t:'【本課總結】拒絕吸煙', d:'<div class="summary-points"><ol><li>很多人對吸煙存有誤解。'+kw('電子煙')+'同樣含有'+kw('致癌物')+'——吸煙損害健康，令人'+kw('上癮')+'。</li><li>煙草釋出'+kw('焦油')+'、'+kw('尼古丁')+'和'+kw('一氧化碳')+'等有害物質，引致'+kw('癌症')+'、心臟病等。'+kw('二手煙')+'和'+kw('三手煙')+'同樣危害他人。</li><li>政府實施'+kw('控煙條例')+'：設定'+kw('禁煙區')+'、規管煙草銷售。我們要堅決'+kw('拒絕吸煙')+'。</li></ol></div>', e:''},

  // ===== B4-4 不要喝酒 =====
  {L:'b4-4', type:'qa', t:'人們對喝酒有甚麼誤解？', d:'很多人對喝酒存有誤解。例如有人以為'+kw('喝酒')+'能使人忘卻煩憂，但其實喝酒'+kw('並不能真正解決問題')+'。', e:'課本P.26'},
  {L:'b4-4', type:'qa', t:'喝酒對健康有甚麼害處？', d:'即時的害處：'+kw('反應遲緩')+'、嘔吐、昏睡、呼吸困難、'+kw('判斷力降低')+'、'+kw('宿醉')+'等，暴飲甚至會昏迷、'+kw('急性酒精中毒')+'，引致死亡。長期過量喝酒的害處：患上'+kw('肝癌')+'、大腸癌和心臟病，'+kw('記憶力衰退')+'。', e:'課本P.27'},
  {L:'b4-4', type:'qa', t:'酗酒對個人、家庭和社會帶來甚麼禍害？', d:'影響人的'+kw('判斷能力')+'、令人無法'+kw('自制')+'、令家庭'+kw('不和諧')+'、容易做出'+kw('不理智的行為')+'等。', e:'課本P.28'},
  {L:'b4-4', type:'qa', t:'怎樣跟酒精說「不」？', d:kw('拒絕喝酒')+'，並鼓勵別人'+kw('戒酒')+'。', e:'課本P.29'},
  {L:'b4-4', type:'summary', t:'【本課總結】不要喝酒', d:'<div class="summary-points"><ol><li>所有酒類都含有'+kw('酒精')+'，酒精有'+kw('麻醉')+'作用，降低'+kw('判斷')+'和'+kw('自制')+'能力。</li><li>長期'+kw('酗酒')+'傷害身體，導致記憶力衰退，引致'+kw('肝癌')+'、心臟病等。</li><li>酗酒影響個人、家庭和社會：令人無法自制、家庭'+kw('不和睦')+'、做出不理智行為。</li><li>喝酒'+kw('不能真正解決問題')+'。我們在任何情況下都應該'+kw('拒絕喝酒')+'。</li></ol></div>', e:''},

  // ===== B6-1 转动的地球 =====
  {L:'b6-1', type:'qa', t:'為甚麼會有白天和黑夜？', d:'地球會不停繞着'+kw('地軸')+'自轉，所以出現'+kw('晝夜交替')+'循環的現象。地球'+kw('自轉')+'一周是一日，約需'+kw('二十四小時')+'。', e:'課本P.4'},
  {L:'b6-1', type:'qa', t:'為甚麼不同地區會有不同的時間？', d:'因為地球不停地'+kw('自轉')+'，各地受'+kw('太陽照射')+'的時間不同。各地為了方便人們作息，按需要制定'+kw('時區')+'。不同地區的時間差異稱為'+kw('時差')+'。', e:'課本P.5-6'},
  {L:'b6-1', type:'qa', t:'為甚麼不同的地區有不同的溫度？', d:'地球表面是彎曲的，不同地區受太陽光照射的角度不同。太陽光'+kw('直射')+'的地區所受的光比較集中，溫度普遍較高。太陽光'+kw('斜射')+'的地區所受的光比較分散，溫度普遍較低。', e:'課本P.7'},
  {L:'b6-1', type:'qa', t:'為甚麼會有季節變化？', d:'地球圍繞太陽'+kw('公轉')+'一周，需時一年。由於'+kw('地軸是傾斜的')+'，太陽光在不同日子'+kw('直射')+'地球的不同地方，形成'+kw('季節變化')+'。', e:'課本P.8-9'},

];

// ============ STATE ============
let filteredCards = [...allCards];
let cardIdx = 0;
let isFlipped = false;
let isShuffled = false;

function filterCards(){
  const lesson = document.getElementById('lessonFilter').value;
  const type = document.getElementById('typeFilter').value;
  isFlipped = false;
  let pool = allCards;
  if(lesson !== 'all') pool = pool.filter(c=>c.L===lesson);
  if(type !== 'all') pool = pool.filter(c=>c.type===type);
  filteredCards = [...pool];
  if(isShuffled) shuffleArray(filteredCards);
  cardIdx = 0;
  document.getElementById('cardInner').classList.remove('flipped');
  updateCardCount();
  renderCard();
}

function toggleShuffle(){
  isShuffled = !isShuffled;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffled);
  filterCards();
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function flipCard(){
  if(filteredCards.length===0) return;
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

function nextCard(){
  if(filteredCards.length===0) return;
  isFlipped=false; cardIdx=(cardIdx+1)%filteredCards.length;
  document.getElementById('cardInner').classList.remove('flipped');
  renderCard();
}
function prevCard(){
  if(filteredCards.length===0) return;
  isFlipped=false; cardIdx=(cardIdx-1+filteredCards.length)%filteredCards.length;
  document.getElementById('cardInner').classList.remove('flipped');
  renderCard();
}

function renderCard(){
  if(filteredCards.length===0){
    document.getElementById('cardFront').innerHTML='<div class="label">沒有卡片</div><div class="term" style="font-size:1em;">請選擇課次或類型</div>';
    document.getElementById('cardBack').innerHTML='';
    document.getElementById('progText').textContent='0/0';
    document.getElementById('progFill').style.width='0%';
    document.getElementById('posText').textContent='';
    document.getElementById('prevBtn').disabled=true;
    document.getElementById('nextBtn').disabled=true;
    return;
  }
  const c = filteredCards[cardIdx];
  const LN = {'b4-1':'B4-1 神經系統','b4-2':'B4-2 泌尿系統','b4-3':'B4-3 拒絕吸煙','b4-4':'B4-4 不要喝酒','b6-1':'B6-1 轉動的地球','b6-2':'B6-2 月球的秘密','b6-3':'B6-3 飛越太陽系'};

  let cls = ''; if(c.t.length>50) cls='small'; else if(c.t.length>30) cls='medium';
  document.getElementById('cardFront').innerHTML =
    `<div class="label">${LN[c.L]}　·　${c.type==='qa'?'📖 自學手冊問答':'📝 本課總結'}</div>`+
    `<div class="term ${cls}">${c.t}</div>`+
    `<div class="hint">點擊翻轉看答案</div>`;

  document.getElementById('cardBack').innerHTML =
    `<div class="back-label">${c.type==='qa'?'📖 自學手冊原文':'📝 本課總結'}</div>`+
    `<div class="definition">${c.d}</div>`+
    (c.e?`<div class="extra">📍 ${c.e}</div>`:'');

  document.getElementById('progText').textContent = `${cardIdx+1}/${filteredCards.length}`;
  document.getElementById('progFill').style.width = ((cardIdx+1)/filteredCards.length*100)+'%';
  document.getElementById('posText').textContent = `第 ${cardIdx+1} 張`;
  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = false;
}

function updateCardCount(){
  document.getElementById('cardCount').textContent = filteredCards.length + ' 張';
}

document.addEventListener('keydown',(e)=>{
  if(e.key===' '||e.code==='Space'){ e.preventDefault(); flipCard(); }
  if(e.key==='ArrowRight'){ e.preventDefault(); nextCard(); }
  if(e.key==='ArrowLeft'){ e.preventDefault(); prevCard(); }
});

updateCardCount();
renderCard();
</script>
