<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PEEL Paragraph Architect · Geography Essay Trainer</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#2d6a4f;--green-mid:#40916c;--green-light:#d8f3dc;
  --earth:#e07a5f;--earth-light:#ffe8d6;
  --cream:#fefae0;--sand:#faedcd;--bark:#582f0e;
  --text:#1b1b1b;--text2:#6b705c;--text3:#a5a58d;
  --white:#fffef7;--card-bg:rgba(255,254,247,.92);
  --radius:16px;--radius-sm:10px;
  --font-body:system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-heading:'Georgia','Times New Roman',serif;
  --shadow:0 2px 12px rgba(88,47,14,.06);
  --shadow-lg:0 6px 28px rgba(88,47,14,.1);
}

/* ── Layout ── */
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);background:linear-gradient(175deg,var(--cream) 0%,var(--sand) 50%,#e9edc9 100%);
  color:var(--text);min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  overscroll-behavior:none;-webkit-touch-callout:none;
}
.container{max-width:720px;margin:0 auto;padding:.75rem 1rem 6rem}

/* ── Header ── */
.header{text-align:center;padding:1.25rem 0 .5rem}
.header h1{
  font-family:var(--font-heading);font-size:1.5rem;color:var(--green-dark);
  letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.header h1 span{font-size:1.6rem}
.header .sub{font-size:.78rem;color:var(--text2);margin-top:.2rem}

/* ── Unit Tabs ── */
.unit-tabs{display:flex;gap:.4rem;margin:1rem 0;flex-wrap:wrap;justify-content:center}
.unit-tab{
  padding:.45rem 1rem;border-radius:20px;font-size:.8rem;font-weight:500;
  border:1.5px solid var(--green-mid);color:var(--green-mid);background:transparent;
  cursor:pointer;transition:.2s;font-family:var(--font-body);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.unit-tab.active{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.unit-tab.rainforest{border-color:#2d6a4f;color:#2d6a4f}
.unit-tab.rainforest.active{background:#2d6a4f;color:#fff}
.unit-tab.tourism{border-color:#40916c;color:#40916c}
.unit-tab.tourism.active{background:#40916c;color:#fff}
.unit-tab.geology{border-color:#52796f;color:#52796f}
.unit-tab.geology.active{background:#52796f;color:#fff}

/* ── Question Card ── */
.q-card{
  background:var(--card-bg);border-radius:var(--radius);padding:1.25rem;
  box-shadow:var(--shadow);margin-bottom:1rem;
  border-left:4px solid var(--green-dark);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.q-meta{display:flex;gap:.6rem;margin-bottom:.5rem;flex-wrap:wrap;align-items:center}
.q-badge{
  font-size:.65rem;padding:.15rem .55rem;border-radius:10px;
  font-weight:600;text-transform:uppercase;letter-spacing:.03em;
}
.q-badge-type{background:var(--green-light);color:var(--green-dark)}
.q-badge-marks{background:var(--earth-light);color:var(--earth)}
.q-badge-source{background:var(--sand);color:var(--text2)}
.q-type-hint{
  font-size:.7rem;color:var(--text3);font-style:italic;
  background:var(--green-light);display:inline-block;padding:.15rem .6rem;border-radius:8px;
}
.q-title{font-size:1.05rem;font-weight:600;line-height:1.55;color:var(--bark);margin-top:.4rem}

/* ── PEEL Stepper ── */
.peel-stepper{display:flex;gap:.3rem;margin:1rem 0 .75rem;justify-content:center}
.stepper-dot{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.8rem;border:2px solid var(--text3);color:var(--text3);
  transition:.25s;background:var(--white);
}
.stepper-dot.active{border-color:var(--green-dark);color:var(--green-dark);background:var(--green-light)}
.stepper-dot.done{border-color:var(--green-mid);color:var(--green-mid);background:var(--green-light)}
.stepper-line{
  width:20px;height:2px;background:var(--text3);align-self:center;transition:.25s;
}
.stepper-line.done{background:var(--green-mid)}

/* ── Step Card ── */
.step-card{
  background:var(--card-bg);border-radius:var(--radius);padding:1.25rem;
  box-shadow:var(--shadow);margin-bottom:.75rem;transition:.3s;
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border:1.5px solid transparent;
}
.step-card.active{border-color:var(--green-mid);box-shadow:var(--shadow-lg)}
.step-card.done{border-color:var(--green-light)}
.step-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.step-letter{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1rem;flex-shrink:0;
}
.step-letter.p{background:var(--green-dark);color:#fff}
.step-letter.e{background:var(--earth);color:#fff}
.step-letter.l{background:var(--bark);color:#fff}
.step-label{font-weight:600;font-size:.88rem;color:var(--text)}
.step-desc{font-size:.72rem;color:var(--text2)}

/* ── Option List ── */
.option-list{display:flex;flex-direction:column;gap:.5rem}
.option-item{
  padding:.75rem 1rem;border:1.5px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);
  cursor:pointer;transition:.2s;font-size:.86rem;line-height:1.45;
  background:var(--white);-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  display:flex;align-items:flex-start;gap:.5rem;
}
.option-item:hover,.option-item:active{border-color:var(--green-mid);background:var(--green-light)}
.option-item.selected{border-color:var(--green-dark);background:var(--green-light);font-weight:500}
.option-item.custom{border-style:dashed;border-color:var(--text3);color:var(--text3)}
.option-item.custom.selected{border-style:solid;border-color:var(--green-dark);color:var(--text)}
.option-radio{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.option-item.selected .option-radio{border-color:var(--green-dark)}
.option-item.selected .option-radio::after{
  content:'';width:10px;height:10px;border-radius:50%;background:var(--green-dark);
}
.option-item.multi .option-radio{border-radius:4px}
.option-item.multi.selected .option-radio::after{border-radius:2px}

/* ── Custom Input ── */
.custom-input-area{margin-top:.5rem;display:none}
.custom-input-area.show{display:block}
.custom-input{
  width:100%;padding:.6rem .8rem;border:1.5px solid var(--green-mid);border-radius:var(--radius-sm);
  font-size:.85rem;font-family:var(--font-body);background:var(--white);
  outline:none;resize:vertical;min-height:60px;
}
.custom-input:focus{border-color:var(--green-dark);box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.char-count{font-size:.68rem;color:var(--text3);text-align:right;margin-top:.2rem}

/* ── Warning Banner ── */
.warn-banner{
  display:none;padding:.55rem .8rem;background:var(--earth-light);border-radius:var(--radius-sm);
  font-size:.76rem;color:var(--earth);margin-top:.5rem;font-weight:500;
  border-left:3px solid var(--earth);
}
.warn-banner.show{display:block}

/* ── Paragraph Preview ── */
.preview-card{
  background:var(--card-bg);border-radius:var(--radius);padding:1.25rem;
  box-shadow:var(--shadow);margin-bottom:1rem;
  border:1.5px dashed var(--green-mid);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.preview-label{font-weight:700;color:var(--green-dark);margin-bottom:.5rem;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
.preview-text{
  font-size:.9rem;line-height:1.7;color:var(--text);
  padding:.75rem;background:var(--white);border-radius:var(--radius-sm);
  white-space:pre-wrap;min-height:60px;
}
.preview-text .highlight-custom{background:rgba(45,106,79,.12);padding:.1rem .25rem;border-radius:3px;font-weight:600;color:var(--green-dark)}
.preview-text .highlight-template{color:var(--text)}

/* ── Intro/Conclusion Toggles ── */
.section-toggle{
  display:flex;align-items:center;gap:.5rem;margin:1rem 0 .5rem;
  cursor:pointer;font-size:.82rem;font-weight:600;color:var(--green-dark);
  padding:.5rem .75rem;border-radius:var(--radius-sm);
  transition:.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.section-toggle:hover{background:var(--green-light)}
.section-toggle .arrow{transition:.25s;font-size:.7rem}
.section-toggle.open .arrow{transform:rotate(180deg)}
.section-body{display:none;margin-bottom:.75rem}
.section-body.show{display:block}
.template-select{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
.template-chip{
  padding:.35rem .75rem;border-radius:15px;font-size:.75rem;border:1.5px solid var(--text3);
  color:var(--text2);cursor:pointer;transition:.2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.template-chip:hover,.template-chip.selected{border-color:var(--green-mid);color:var(--green-dark);background:var(--green-light)}

/* ── Controls ── */
.controls{display:flex;gap:.6rem;justify-content:center;margin:1rem 0;flex-wrap:wrap}
.btn{
  padding:.55rem 1.3rem;border-radius:20px;font-size:.82rem;font-weight:500;
  cursor:pointer;border:none;font-family:var(--font-body);transition:.2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn-primary{background:var(--green-dark);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--green-light);color:var(--green-dark);border:1.5px solid var(--green-mid)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--text3)}
.btn-warn{background:var(--earth-light);color:var(--earth);border:1.5px solid var(--earth)}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── Glossary Sidebar ── */
.glossary-toggle{
  position:fixed;top:1rem;right:1rem;z-index:100;
  width:40px;height:40px;border-radius:50%;background:var(--green-dark);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.glossary-panel{
  position:fixed;top:0;right:-320px;width:300px;height:100vh;height:100dvh;
  background:var(--white);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:99;
  transition:right .3s;overflow-y:auto;padding:1rem;
}
.glossary-panel.open{right:0}
.glossary-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:98;
}
.glossary-overlay.show{display:block}
.glossary-search{
  width:100%;padding:.5rem .75rem;border:1.5px solid var(--text3);border-radius:var(--radius-sm);
  font-size:.85rem;margin-bottom:.75rem;font-family:var(--font-body);outline:none;
}
.glossary-item{
  padding:.45rem 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:.78rem;
  line-height:1.45;
}
.glossary-item .term{font-weight:700;color:var(--green-dark)}
.glossary-item .def{color:var(--text2);font-size:.72rem}

/* ── Final Checklist ── */
.checklist{
  background:var(--card-bg);border-radius:var(--radius);padding:1rem 1.25rem;
  box-shadow:var(--shadow);margin:1rem 0;
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.checklist-title{font-weight:700;color:var(--green-dark);font-size:.82rem;margin-bottom:.6rem}
.checklist-item{
  display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.8rem;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.checklist-item .check-box{
  width:18px;height:18px;border:2px solid var(--text3);border-radius:4px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.checklist-item.checked .check-box{background:var(--green-dark);border-color:var(--green-dark)}
.checklist-item.checked .check-box::after{content:'✓';color:#fff;font-size:.65rem;font-weight:700}
.checklist-item.checked .check-label{color:var(--green-dark)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  padding:.5rem 1.2rem;border-radius:20px;font-size:.78rem;font-weight:500;
  z-index:150;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
.toast.success{background:var(--green-dark);color:#fff}
.toast.warn{background:var(--earth);color:#fff}
.toast.info{background:var(--bark);color:#fff}

/* ── Bottom Bar Sticky ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;padding:.6rem 1rem calc(.6rem + env(safe-area-inset-bottom));
  background:rgba(255,254,247,.95);border-top:1px solid rgba(0,0,0,.06);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  display:flex;justify-content:space-between;align-items:center;z-index:50;
}
.step-indicator{font-size:.72rem;color:var(--text2)}
.step-indicator strong{color:var(--green-dark)}
.essay-counter{font-size:.72rem;color:var(--text3)}

/* ── Responsive ── */
@media (max-width:480px){
  .container{padding:.5rem .75rem 6rem}
  .q-title{font-size:.95rem}
  .option-item{font-size:.82rem;padding:.6rem .8rem}
  .glossary-panel{width:280px}
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1><span>🌿</span>PEEL Paragraph Architect</h1>
    <div class="sub">Geography Essay Trainer · S3 TWGSS</div>
  </div>

  <!-- Unit Tabs -->
  <div class="unit-tabs" id="unitTabs"></div>

  <!-- Question Card -->
  <div class="q-card" id="questionCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-title" id="qTitle"></div>
    <div class="q-type-hint" id="qHint" style="margin-top:.5rem"></div>
  </div>

  <!-- PEEL Stepper -->
  <div class="peel-stepper" id="stepper"></div>

  <!-- Step Cards (P, E, E, L) -->
  <div id="stepCards"></div>

  <!-- Warning Banner -->
  <div class="warn-banner" id="warnBanner"></div>

  <!-- Controls -->
  <div class="controls" id="controls"></div>

  <!-- Paragraph Preview -->
  <div class="preview-card" id="previewCard">
    <div class="preview-label">📝 Assembled Paragraph</div>
    <div class="preview-text" id="previewText">Select your PEEL elements to build a paragraph.</div>
  </div>

  <!-- Essay Sections -->
  <div style="margin-top:.5rem">
    <!-- Introduction -->
    <div class="section-toggle" id="introToggle">
      <span class="arrow">▶</span> Introduction <span style="font-size:.7rem;color:var(--text3)">(2 marks)</span>
    </div>
    <div class="section-body" id="introBody">
      <div class="template-select" id="introTemplateSelect"></div>
      <textarea class="custom-input" id="introText" placeholder="Write your introduction here..." rows="3"></textarea>
      <div class="char-count" id="introCount">0 chars</div>
    </div>

    <!-- Conclusion -->
    <div class="section-toggle" id="concToggle">
      <span class="arrow">▶</span> Conclusion <span style="font-size:.7rem;color:var(--text3)">(2 marks)</span>
    </div>
    <div class="section-body" id="concBody">
      <div class="template-select" id="concTemplateSelect"></div>
      <textarea class="custom-input" id="concText" placeholder="Write your conclusion here..." rows="3"></textarea>
      <div class="char-count" id="concCount">0 chars</div>
    </div>
  </div>

  <!-- Full Essay Preview -->
  <div class="preview-card" id="essayPreview" style="display:none;border-color:var(--green-dark)">
    <div class="preview-label">📄 Full Essay Draft</div>
    <div class="preview-text" id="essayText" style="font-size:.85rem"></div>
  </div>

  <!-- Final Checklist -->
  <div class="checklist" id="checklist" style="display:none">
    <div class="checklist-title">✅ Final Review Checklist</div>
    <div id="checklistItems"></div>
  </div>

</div>

<!-- Bottom Bar -->
<div class="bottom-bar" id="bottomBar">
  <div class="step-indicator" id="stepIndicator"><strong>Select a question</strong> to begin</div>
  <div class="essay-counter" id="essayCounter"></div>
</div>

<!-- Glossary Toggle & Panel -->
<button class="glossary-toggle" id="glossaryToggle" aria-label="Glossary">📖</button>
<div class="glossary-overlay" id="glossaryOverlay"></div>
<div class="glossary-panel" id="glossaryPanel">
  <input type="text" class="glossary-search" id="glossarySearch" placeholder="Search terms..." autocomplete="off">
  <div id="glossaryList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   PEEL Paragraph Architect · Geography Essay Trainer
   ═══════════════════════════════════════════════════ */

/* ── GLOSSARY (from textbook Interactive Geography / Exploring Geography) ── */
const GLOSSARY = [
  {term:'Carrying capacity',zh:'承載力',def:'Maximum number of visitors an area can support without damage',unit:'tourism'},
  {term:'Sustainable tourism',zh:'可持續旅遊',def:'Tourism that balances economic, environmental and social needs for the future',unit:'tourism'},
  {term:'Ecotourism',zh:'生態旅遊',def:'Responsible travel to natural areas that conserves the environment',unit:'tourism'},
  {term:'Mass tourism',zh:'大眾化旅遊',def:'Large-scale tourism bringing significant economic and environmental impacts',unit:'tourism'},
  {term:'Cultural conflict',zh:'文化衝突',def:'Tension between tourists and locals due to different values or behaviours',unit:'tourism'},
  {term:'Overcrowding',zh:'過度擁擠',def:'Too many tourists in one place, reducing experience quality',unit:'tourism'},
  {term:'Peak season',zh:'旺季',def:'Period of highest travel demand, often during holidays',unit:'tourism'},
  {term:'GDP per capita',zh:'人均國內生產總值',def:'Total economic output divided by population',unit:'tourism'},
  {term:'Deforestation',zh:'砍伐森林',def:'Clearing of forests on a large scale, often for agriculture or timber',unit:'rainforest'},
  {term:'Slash-and-burn',zh:'刀耕火種',def:'Traditional farming method where vegetation is cut and burned to clear land',unit:'rainforest'},
  {term:'Biodiversity',zh:'生物多樣性',def:'Variety of plant and animal life in a particular habitat',unit:'rainforest'},
  {term:'Emergent layer',zh:'露生層',def:'Topmost rainforest layer with trees over 50m tall',unit:'rainforest'},
  {term:'Canopy layer',zh:'樹冠層',def:'Dense continuous layer of tree crowns, home to most rainforest wildlife',unit:'rainforest'},
  {term:'Buttress roots',zh:'板根',def:'Large, wide roots that support tall rainforest trees',unit:'rainforest'},
  {term:'Drip-tip',zh:'滴水葉尖',def:'Pointed leaf tip that allows water to run off quickly',unit:'rainforest'},
  {term:'Habitat loss',zh:'棲息地喪失',def:'Destruction of natural habitats, a primary threat to wildlife',unit:'rainforest'},
  {term:'Plantation',zh:'種植園',def:'Large-scale farm growing a single crop, e.g. oil palm, rubber',unit:'rainforest'},
  {term:'Cattle ranching',zh:'牧牛業',def:'Large-scale livestock farming, a major cause of Amazon deforestation',unit:'rainforest'},
  {term:'Sedimentary rock',zh:'沉積岩',def:'Rock formed from compressed and cemented sediments',unit:'geology'},
  {term:'Weathering',zh:'風化',def:'Breakdown of rocks by weather, water, or biological activity',unit:'geology'},
  {term:'Erosion',zh:'侵蝕',def:'Wearing away and removal of rock or soil by water, wind, or ice',unit:'geology'},
  {term:'Compaction',zh:'壓實',def:'Process where sediments are pressed together under pressure',unit:'geology'},
  {term:'Cementation',zh:'膠結',def:'Process where minerals bind sediment particles together',unit:'geology'},
  {term:'Lithification',zh:'岩化作用',def:'Transformation of loose sediments into solid rock',unit:'geology'},
  {term:'Volcanic rock',zh:'火山岩',def:'Rock formed from cooled magma or lava',unit:'geology'},
  {term:'Intrusive rock',zh:'侵入岩',def:'Igneous rock formed when magma cools slowly beneath the surface',unit:'geology'},
  {term:'Tombolo',zh:'連島沙洲',def:'A sand or gravel bar connecting an island to the mainland',unit:'geology'},
  {term:'Columnar jointing',zh:'柱狀節理',def:'Hexagonal rock columns formed by cooling and contraction of volcanic rock',unit:'geology'},
  {term:'Geopark',zh:'地質公園',def:'A protected area with significant geological heritage',unit:'geology'},
  {term:'UNESCO Global Geopark',zh:'聯合國教科文組織世界地質公園',def:'Internationally recognized area of geological significance',unit:'geology'},
  {term:'Lamination',zh:'層理',def:'Fine layering in sedimentary rocks',unit:'geology'},
];

/* ── QUESTIIONS ── */
const QUESTIONS = [
  // ═══ RAINFORESTS ═══
  {
    id:'rf_explain',
    unit:'rainforest', unitLabel:'Saving Our Rainforests',
    type:'Explain', typeLabel:'Explain',
    title:'Explain the major causes of tropical rainforest deforestation. Use specific examples to support your answer.',
    source:'From 2324 TWGSS S3 Geog Exam (adapted)',
    marks:12,
    hint:'PEEL Mode: Explain causes → support with evidence → show cause-effect chain → link back to deforestation',
    points:[
      {id:'rf_p1',text:'Tropical rainforests are being cleared at an alarming rate due to a combination of economic activities that prioritise short-term gain over long-term environmental sustainability.',keys:['deforestation','economic activities','short-term','sustainability']},

function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getQ(){return state.currentQIdx >= 0 ? QUESTIONS[state.currentQIdx] : null;}

function getPEEL(){

  const key = q.id;
  if(!state.peelState[key]) state.peelState[key] = {pointId:null,evidenceIds:[],explanationId:null,linkId:null};
  return state.peelState[key];
}

function showToast(msg,type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(()=>t.classList.remove('show'),2000);
}

function collectAllKeys(list){
  const s = new Set();
  list.forEach(item=>item.keys.forEach(k=>s.add(k.toLowerCase())));
  return s;
}

/* ── Levenshtein for fuzzy search ── */
function levenshtein(a,b){
  if(a.length===0)return b.length;if(b.length===0)return a.length;
  let p=new Array(b.length+1),c=new Array(b.length+1);
  for(let j=0;j<=b.length;j++)p[j]=j;
  for(let i=1;i<=a.length;i++){c[0]=i;for(let j=1;j<=b.length;j++)c[j]=Math.min(p[j]+1,c[j-1]+1,p[j-1]+(a[i-1]===b[j-1]?0:1));[p,c]=[c,p];}
  return p[b.length];
}

/* ── Check overlap between two keyword sets ── */
function keyOverlap(setA,setB){
  let match=0;
  for(const k of setA){if(setB.has(k))match++;}
  return match;
}

      class="q-option qo-${cls}" data-qidx="${QUESTIONS.indexOf(q)}"
      onmouseover="this.style.background='var(--green-light)'"
      onmouseout="this.style.background='transparent'">
      <div style="font-weight:600;color:var(--bark)">Q${i+1} · <span style="font-size:.72rem;color:var(--green-dark);text-transform:uppercase">${q.type}</span></div>
      <div style="font-size:.82rem;color:var(--text2)">${q.title}</div>
      <div style="font-size:.65rem;color:var(--text3);margin-top:.2rem">${q.marks} marks · ${q.unitLabel}</div>
    </div>`;
  }).join('');
  document.getElementById('qHint').textContent = '👆 Select a question above to begin building your PEEL paragraph.';
}
document.getElementById('questionCard').addEventListener('click',e=>{
  const opt = e.target.closest('.q-option');
  if(!opt)return;
  const qIdx = parseInt(opt.dataset.qidx);
  state.currentQIdx = qIdx;
  state.currentStep = 0;
  const q = QUESTIONS[qIdx];
  state.peelState = {};
  state.customInputs = {};
  state.introText = '';
  state.concText = '';
  state.checklist = {1:false,2:false,3:false,4:false};
  // Init PEEL state
  state.peelState[q.id] = {pointId:null,evidenceIds:[],explanationId:null,linkId:null};
  renderAll();
});

/* ── Step card ── */
function renderStepCard(){
  const container = document.getElementById('stepCards');
  const q = getQ();
  if(!q){
    container.innerHTML = '';
    return;
  }
  const step = state.currentStep;
  const stepLetter = state.steps[step];
  const stepLabel = state.stepLabels[step];
  const stepDesc = state.stepDescs[step];
  const peel = getPEEL();

  // Determine options based on step
  let options = [];
  let isMulti = false;
  let selectedId = null;
  let selectedIds = [];
  if(step===0){options=q.points;selectedId=peel.pointId;}
  else if(step===1){options=q.evidences;isMulti=true;selectedIds=peel.evidenceIds;}
  else if(step===2){options=q.explanations;selectedId=peel.explanationId;}
  else if(step===3){options=q.links;selectedId=peel.linkId;}

  const customKey = q.id + '_' + stepLetter;
  const hasCustom = state.customInputs[customKey] && state.customInputs[customKey].trim().length > 0;

  let html = `<div class="step-card active">
    <div class="step-header">
      <div class="step-letter ${stepLetter.toLowerCase()}">${stepLetter}</div>
      <div>
        <div class="step-label">${stepLabel} ${isMulti?'<span style="font-size:.68rem;color:var(--text3);font-weight:400">(select all that apply)</span>':''}</div>
        <div class="step-desc">${stepDesc}</div>
      </div>
    </div>
    <div class="option-list">`;

  options.forEach(opt=>{
    const isSelected = isMulti ? selectedIds.includes(opt.id) : (selectedId===opt.id);
    const multiClass = isMulti?' multi':'';
    const selectedClass = isSelected?' selected':'';
    const customClass = opt.custom?' custom':'';
    html += `<div class="option-item ${multiClass} ${selectedClass} ${customClass}" data-optid="${opt.id}">
      <div class="option-radio"></div>
      <div>${escapeHTML(opt.text)}</div>
    </div>`;
  });

  html += `</div>`;

  // Custom input
  html += `<div class="custom-input-area ${hasCustom || (selectedId==='_custom') ? 'show' : ''}" id="customArea">
    <textarea class="custom-input" id="customInput" placeholder="Write your own ${stepLabel.toLowerCase()}...">${state.customInputs[customKey]||''}</textarea>
    <div class="char-count" id="customCount">${(state.customInputs[customKey]||'').length} chars</div>
  </div>`;

  // Warning banner
  html += `<div class="warn-banner" id="stepWarnBanner"></div>`;

  html += `</div>`;

  container.innerHTML = html;

  // Bind option clicks
  container.querySelectorAll('.option-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const optId = item.dataset.optid;
      if(isMulti){
        if(optId==='_custom'){
          // Toggle custom
          document.getElementById('customArea').classList.toggle('show');
          return;
        }
        const idx = selectedIds.indexOf(optId);
        if(idx>=0) selectedIds.splice(idx,1);
        else selectedIds.push(optId);
        peel.evidenceIds = [...selectedIds];
      }else{
        if(optId==='_custom'){
          document.getElementById('customArea').classList.add('show');
          selectedId = '_custom';
        }else{
          selectedId = optId;
          document.getElementById('customArea').classList.remove('show');
        }
        if(step===0) peel.pointId = selectedId;
        else if(step===2) peel.explanationId = selectedId;
        else if(step===3) peel.linkId = selectedId;
      }
      renderStepCard();
      checkIntersection();
      renderPreview();
    });
  });

  // Custom input listener
  const customInput = document.getElementById('customInput');
  if(customInput){
    customInput.addEventListener('input',()=>{
      state.customInputs[customKey] = customInput.value;
      document.getElementById('customCount').textContent = customInput.value.length + ' chars';
      renderPreview();
    });
  }
}

/* ── Check P↔E keyword intersection ── */
function checkIntersection(){
  const q = getQ();
  if(!q)return;
  const banner = document.getElementById('stepWarnBanner');
  if(!banner)return;
  banner.classList.remove('show');
  if(state.currentStep!==1)return;

  const peel = getPEEL();
  const pointOpt = q.points.find(p=>p.id===peel.pointId);
  if(!pointOpt || pointOpt.custom)return;
  const pointKeys = new Set(pointOpt.keys.map(k=>k.toLowerCase()));

  const selectedEvs = q.evidences.filter(e=>peel.evidenceIds.includes(e.id) && !e.custom);
  if(selectedEvs.length===0)return;

  let allMatch = true;
  for(const ev of selectedEvs){
    const evKeys = new Set(ev.keys.map(k=>k.toLowerCase()));
    if(keyOverlap(pointKeys,evKeys)===0){
      allMatch = false;
      break;
    }
  }

  if(!allMatch){
    banner.textContent = '⚠️ Warning: Your evidence may not match your chosen point. Consider selecting evidence that directly supports your topic sentence.';
    banner.classList.add('show');
  }
}

/* ── Preview assembled paragraph ── */
function renderPreview(){
  const q = getQ();
  if(!q){document.getElementById('previewText').textContent='Select your PEEL elements to build a paragraph.';return;}
  const peel = getPEEL();
  const parts = [];

  // P
  if(peel.pointId){
    const pOpt = q.points.find(p=>p.id===peel.pointId);
    if(pOpt){
      if(pOpt.custom){
        const txt = state.customInputs[q.id+'_P']||'';
        parts.push({text:txt,custom:true});
      }else{
        parts.push({text:pOpt.text,custom:false});
      }
    }
  }

  // E (evidence)
  for(const eid of peel.evidenceIds){
    const eOpt = q.evidences.find(e=>e.id===eid);
    if(eOpt){
      if(eOpt.custom){
        const txt = state.customInputs[q.id+'_E']||'';
        parts.push({text:txt,custom:true});
      }else{
        parts.push({text:eOpt.text,custom:false});
      }
    }
  }

  // E (explanation)
  if(peel.explanationId){
    const xOpt = q.explanations.find(x=>x.id===peel.explanationId);
    if(xOpt){
      if(xOpt.custom){
        const txt = state.customInputs[q.id+'_E2']||'';
        parts.push({text:txt,custom:true});
      }else{
        parts.push({text:xOpt.text,custom:false});
      }
    }
  }

  // L
  if(peel.linkId){
    const lOpt = q.links.find(l=>l.id===peel.linkId);
    if(lOpt){
      if(lOpt.custom){
        const txt = state.customInputs[q.id+'_L']||'';
        parts.push({text:txt,custom:true});
      }else{
        parts.push({text:lOpt.text,custom:false});
      }
    }
  }

  if(parts.length===0){
    document.getElementById('previewText').innerHTML = '<span style="color:var(--text3)">Select your PEEL elements to build a paragraph.</span>';
  }else{
    document.getElementById('previewText').innerHTML = parts.map(p=>
      p.custom ? `<span class="highlight-custom">${escapeHTML(p.text)}</span>` : `<span class="highlight-template">${escapeHTML(p.text)}</span>`
    ).join(' ');
  }

  // Update full essay preview
  renderEssayPreview();
}

/* ── Intro templates ── */
function renderIntroSection(){
  document.getElementById('introTemplateSelect').innerHTML = INTRO_TEMPLATES.map((t,i)=>{
    const sel = state.introText===t?'selected':'';
    return `<span class="template-chip ${sel}" data-idx="${i}">${t.substring(0,40)}...</span>`;
  }).join('');
  document.getElementById('introText').value = state.introText;
  document.getElementById('introCount').textContent = state.introText.length + ' chars';
}
document.getElementById('introTemplateSelect').addEventListener('click',e=>{
  const chip = e.target.closest('.template-chip');
  if(!chip)return;
  const idx = parseInt(chip.dataset.idx);
  if(idx===INTRO_TEMPLATES.length-1){state.introText='';}
  else{state.introText=INTRO_TEMPLATES[idx];}
  renderIntroSection();
  renderEssayPreview();
});
document.getElementById('introText').addEventListener('input',()=>{
  state.introText = document.getElementById('introText').value;
  document.getElementById('introCount').textContent = state.introText.length + ' chars';
  renderEssayPreview();
});

/* ── Conclusion templates ── */
function renderConcSection(){
  document.getElementById('concTemplateSelect').innerHTML = CONC_TEMPLATES.map((t,i)=>{
    const sel = state.concText===t?'selected':'';
    return `<span class="template-chip ${sel}" data-idx="${i}">${t.substring(0,40)}...</span>`;
  }).join('');
  document.getElementById('concText').value = state.concText;
  document.getElementById('concCount').textContent = state.concText.length + ' chars';
}
document.getElementById('concTemplateSelect').addEventListener('click',e=>{
  const chip = e.target.closest('.template-chip');
  if(!chip)return;
  const idx = parseInt(chip.dataset.idx);
  if(idx===CONC_TEMPLATES.length-1){state.concText='';}
  else{state.concText=CONC_TEMPLATES[idx];}
  renderConcSection();
  renderEssayPreview();
});
document.getElementById('concText').addEventListener('input',()=>{
  state.concText = document.getElementById('concText').value;
  document.getElementById('concCount').textContent = state.concText.length + ' chars';
  renderEssayPreview();
});

/* ── Section toggles ── */
document.getElementById('introToggle').addEventListener('click',()=>{
  const body = document.getElementById('introBody');
  const toggle = document.getElementById('introToggle');
  body.classList.toggle('show');
  toggle.classList.toggle('open');
});
document.getElementById('concToggle').addEventListener('click',()=>{
  const body = document.getElementById('concBody');
  const toggle = document.getElementById('concToggle');
  body.classList.toggle('show');
  toggle.classList.toggle('open');
});

/* ── Full essay preview ── */
function renderEssayPreview(){
  const q = getQ();
  const essayDiv = document.getElementById('essayPreview');
  const essayText = document.getElementById('essayText');
  if(!q || !state.introText || !document.getElementById('previewText').textContent.trim()){
    // Don't show if nothing meaningful
    return;
  }
  const hasBody = document.getElementById('previewText').innerHTML.length > 10;
  const hasIntro = state.introText.trim().length > 0;
  const hasConc = state.concText.trim().length > 0;
  if(!hasIntro && !hasBody && !hasConc)return;
  essayDiv.style.display = 'block';

  let html = '';
  if(hasIntro) html += `<p style="margin-bottom:.75rem"><strong style="color:var(--green-dark)">Introduction:</strong><br>${escapeHTML(state.introText)}</p>`;
  if(hasBody) html += `<p style="margin-bottom:.75rem"><strong style="color:var(--green-dark)">Body Paragraph:</strong><br>${document.getElementById('previewText').innerHTML}</p>`;
  if(hasConc) html += `<p><strong style="color:var(--green-dark)">Conclusion:</strong><br>${escapeHTML(state.concText)}</p>`;
  essayText.innerHTML = html;

  // Show checklist
  document.getElementById('checklist').style.display = 'block';
  renderChecklist();
}

/* ── Checklist ── */
function renderChecklist(){
  const items = [
    {id:1, label:'Topic sentence clearly states the main argument'},
    {id:2, label:'Specific evidence / examples are cited to support each claim'},
    {id:3, label:'Cause-effect explanation connects evidence to the argument'},
    {id:4, label:'Paragraph ends with a link back to the question or forward to the next point'}
  ];
  document.getElementById('checklistItems').innerHTML = items.map(it=>{
    const checked = state.checklist[it.id];
    return `<div class="checklist-item ${checked?'checked':''}" data-cid="${it.id}">
      <div class="check-box"></div>
      <span class="check-label">${it.label}</span>
    </div>`;
  }).join('');
}
document.getElementById('checklist').addEventListener('click',e=>{
  const item = e.target.closest('.checklist-item');
  if(!item)return;
  const cid = parseInt(item.dataset.cid);
  state.checklist[cid] = !state.checklist[cid];
  renderChecklist();
});

/* ── Stepper ── */
function renderStepper(){
  const stepper = document.getElementById('stepper');
  if(!getQ()){stepper.innerHTML='';return;}
  let html = '';
  for(let i=0;i<4;i++){
    let cls = '';
    if(i===state.currentStep)cls='active';
    else if(i<state.currentStep)cls='done';
    html += `<div class="stepper-dot ${cls}">${state.steps[i]}</div>`;
    if(i<3) html += `<div class="stepper-line ${i<state.currentStep?'done':''}"></div>`;
  }
  stepper.innerHTML = html;
}

/* ── Controls ── */
function renderControls(){
  const q = getQ();
  if(!q){
    document.getElementById('controls').innerHTML = '';
    return;
  }
  let html = '';
  if(state.currentStep>0){
    html += `<button class="btn btn-ghost" id="btnPrev">← Back</button>`;
  }
  if(state.currentStep<3){
    html += `<button class="btn btn-primary" id="btnNext">Next Step →</button>`;
  }else{
    html += `<button class="btn btn-secondary" id="btnReset">🔄 New Paragraph</button>`;
    html += `<button class="btn btn-warn" id="btnResetAll">🗑️ Start Over</button>`;
  }
  document.getElementById('controls').innerHTML = html;

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnReset = document.getElementById('btnReset');
  const btnResetAll = document.getElementById('btnResetAll');

  if(btnPrev) btnPrev.addEventListener('click',()=>{
    if(state.currentStep>0)state.currentStep--;
    renderAll();
  });
  if(btnNext) btnNext.addEventListener('click',()=>{
    if(state.currentStep<3)state.currentStep++;
    renderAll();
  });
  if(btnReset) btnReset.addEventListener('click',()=>{
    const q = getQ();
    state.peelState[q.id] = {pointId:null,evidenceIds:[],explanationId:null,linkId:null};
    state.currentStep=0;
    renderAll();
  });
  if(btnResetAll) btnResetAll.addEventListener('click',()=>{
    state.peelState = {};
    state.customInputs = {};
    state.introText = '';
    state.concText = '';
    state.checklist = {1:false,2:false,3:false,4:false};
    state.currentStep = 0;
    state.currentQIdx = -1;
    document.getElementById('essayPreview').style.display = 'none';
    document.getElementById('checklist').style.display = 'none';
    renderAll();
    showToast('All cleared — start fresh!','info');
  });

  // Step indicator
  if(getQ()){
    document.getElementById('stepIndicator').innerHTML = `<strong>Step ${state.currentStep+1}/4</strong> — ${state.stepLabels[state.currentStep]}`;
  }
}

/* ── Bottom bar ── */
function renderBottomBar(){
  const q = getQ();
  if(!q){
    document.getElementById('essayCounter').textContent = '';
    return;
  }
  const peel = getPEEL();
  const hasPoint = !!peel.pointId;
  const hasEv = peel.evidenceIds.length>0;
  const hasExpl = !!peel.explanationId;
  const hasLink = !!peel.linkId;
  const done = [hasPoint,hasEv,hasExpl,hasLink].filter(Boolean).length;
  document.getElementById('essayCounter').textContent = `PEEL: ${done}/4`;
}

/* ── Glossary ── */
function renderGlossary(filter=''){
  const q = getQ();
  const unit = q ? q.unit : 'all';
  const list = document.getElementById('glossaryList');
  let terms = GLOSSARY;
  if(unit!=='all') terms = terms.filter(t=>t.unit===unit||t.unit==='all');
  if(filter){
    const f = filter.toLowerCase();
    terms = terms.filter(t=>t.term.toLowerCase().includes(f)||t.zh.includes(f)||t.def.toLowerCase().includes(f));
    // Sort by relevance (Levenshtein)
    terms.sort((a,b)=>levenshtein(f,a.term.toLowerCase())-levenshtein(f,b.term.toLowerCase()));
  }
  if(terms.length===0){
    list.innerHTML = '<div style="color:var(--text3);font-size:.78rem;padding:.5rem 0">No matching terms.</div>';
    return;
  }
  list.innerHTML = terms.map(t=>`
    <div class="glossary-item">
      <div class="term">${t.term} <span style="font-weight:400;color:var(--text3);font-size:.7rem">${t.zh}</span></div>
      <div class="def">${t.def}</div>
    </div>
  `).join('');
}

/* ── Glossary toggle ── */
document.getElementById('glossaryToggle').addEventListener('click',()=>{
  document.getElementById('glossaryPanel').classList.toggle('open');
  document.getElementById('glossaryOverlay').classList.toggle('show');
});
document.getElementById('glossaryOverlay').addEventListener('click',()=>{
  document.getElementById('glossaryPanel').classList.remove('open');
  document.getElementById('glossaryOverlay').classList.remove('show');
});
document.getElementById('glossarySearch').addEventListener('input',function(){
  renderGlossary(this.value);
});

/* ═══════════════════════════════════════
   MASTER RENDER
   ═══════════════════════════════════════ */
function renderAll(){
  renderUnitTabs();
  renderQuestionSelect();
  renderStepper();
  renderStepCard();
  renderControls();
  renderPreview();
  renderIntroSection();
  renderConcSection();
  renderBottomBar();
  renderGlossary();
  // Scroll step card into view on mobile
  setTimeout(()=>{
    const card = document.querySelector('.step-card.active');
    if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

   INIT
   ═══════════════════════════════════════ */
renderAll();
