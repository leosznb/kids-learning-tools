<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictation: Term 2 Exam — 有容</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background:linear-gradient(160deg,#e8f5e9,#c8e6c9);
    min-height:100vh; display:flex; justify-content:center; padding:20px;
  }
  .app { max-width:580px; width:100%; }
  h1 { text-align:center; font-size:22px; color:#1b5e20; letter-spacing:1px; margin-bottom:2px; }
  .subtitle { text-align:center; font-size:12px; color:#666; margin-bottom:4px; }
  .subtitle span { display:inline-block; background:#1b5e20; color:#fff; padding:2px 10px; border-radius:3px; font-size:10px; margin-bottom:6px; }

  .top-bar { display:flex; gap:6px; justify-content:center; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
  .top-bar .counter { font-size:14px; font-weight:600; color:#333; }
  .top-bar button, .top-bar select {
    padding:5px 10px; border-radius:6px; border:1.5px solid #a5d6a7;
    background:#fff; font-size:11px; font-weight:600; cursor:pointer; color:#2e7d32;
  }
  .top-bar button:hover { background:#e8f5e9; }
  .top-bar button.active { background:#1b5e20; color:#fff; border-color:#1b5e20; }
  .top-bar select { font-size:11px; max-width:160px; }

  .play-area {
    background:#fff; border-radius:16px; padding:24px 20px;
    box-shadow:0 2px 16px rgba(0,0,0,.06); text-align:center; margin-bottom:8px;
    border:3px solid #2e7d32; min-height:180px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .big-status { font-size:16px; font-weight:700; color:#1b5e20; margin-bottom:6px; min-height:24px; }
  .big-status .cn { font-size:13px; font-weight:400; color:#888; display:block; }
  .sub-status { font-size:12px; color:#999; min-height:18px; }

  .hint-row { display:flex; gap:10px; justify-content:center; margin:10px 0; flex-wrap:wrap; }
  .hint-box {
    background:#f5f5f5; border-radius:8px; padding:8px 14px; font-size:13px;
  }
  .hint-box .label { font-size:9px; color:#999; text-transform:uppercase; letter-spacing:1px; }
  .hint-box .val { font-size:18px; font-weight:700; color:#333; letter-spacing:1px; }
  .hint-box .val.cn { font-size:14px; color:#666; font-weight:400; }

  .answer-area {
    background:#fff; border-radius:12px; padding:14px 18px;
    box-shadow:0 2px 10px rgba(0,0,0,.04); text-align:center; margin:8px 0;
    display:none;
  }
  .answer-area .word { font-size:28px; font-weight:700; color:#1a1a2e; letter-spacing:1px; }
  .answer-area .meta { font-size:11px; color:#888; margin-top:2px; }

  .action-btns { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .action-btns button {
    padding:6px 12px; border-radius:8px; border:none;
    font-size:11px; font-weight:700; cursor:pointer;
  }
  .btn-correct { background:#c8e6c9; color:#2e7d32; }
  .btn-wrong { background:#ffe0b2; color:#e65100; }
  .btn-show { background:#2e7d32; color:#fff; }
  .btn-auto { background:#ff9800; color:#fff; font-size:13px; padding:8px 20px; }
  .btn-auto.running { background:#4caf50; animation:pulse2 1s infinite; }
  @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:.7} }

  .summary {
    background:#fff; border-radius:12px; padding:14px 18px;
    box-shadow:0 2px 10px rgba(0,0,0,.04); margin-top:10px; text-align:center;
    display:none;
  }
  .summary .big { font-size:18px; font-weight:700; }
  .summary .big.good { color:#2e7d32; }
  .summary .big.meh { color:#ff9800; }
  .summary .big.bad { color:#c62828; }
  .summary .detail { font-size:12px; color:#666; margin-top:4px; }

  .mistake-log {
    background:#fff; border-radius:12px; padding:12px 16px;
    box-shadow:0 2px 10px rgba(0,0,0,.04); margin-top:10px;
    display:none; font-size:12px;
  }
  .mistake-log h3 { font-size:13px; color:#c62828; margin-bottom:4px; }
  .mistake-log .word-item {
    display:inline-block; background:#fdecea; color:#c62828;
    padding:3px 8px; border-radius:4px; margin:2px 3px;
    font-weight:600; font-size:12px;
  }

  .progress-bar { width:100%; height:4px; background:#e0e0e0; border-radius:2px; margin:6px 0; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#66bb6a,#2e7d32); border-radius:2px; transition:width .3s; }

  .countdown { font-size:40px; font-weight:700; color:#ff9800; }
  .note { font-size:10px; color:#999; text-align:center; margin-top:6px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎧 Dictation: Term 2 Exam Vocabulary</h1>
  <div class="subtitle">
    S3 English · Tsuen Wan Government Secondary School<br>
    <span>👤 有容 &nbsp;|&nbsp; 55 words · Edge 3B Units 6-7</span>
  </div>

  <div class="top-bar">
    <span class="counter" id="counter">Word 1 / 55</span>
    <select id="voiceSelect" onchange="selectVoice()"><option>Loading voices...</option></select>
    <select id="speedSelect" onchange="setSpeed(this.value)" style="width:60px;">
      <option value="0.8">0.8×</option>
      <option value="0.9">0.9×</option>
      <option value="1.0" selected>1.0×</option>
    </select>
    <button onclick="shuffleWords()">🔀 Shuffle</button>
    <button onclick="resetAll()">🔁 Restart</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>

  <div class="play-area" id="playArea">
    <div class="big-status" id="bigStatus">Ready to start<span class="cn">準備開始</span></div>
    <div id="hintRow" class="hint-row" style="display:none;">
      <div class="hint-box">
        <div class="label">中文</div>
        <div class="val cn" id="hintCN">—</div>
      </div>
      <div class="hint-box">
        <div class="label">First letter</div>
        <div class="val" id="hintLetter">—</div>
      </div>
    </div>
    <div class="countdown" id="countdown"></div>
    <div class="sub-status" id="subStatus"></div>
    <button class="btn-auto" id="autoBtn" onclick="toggleAuto()">▶ Start Auto-Play</button>
    <div class="action-btns" id="actionBtns" style="display:none;margin-top:8px;">
      <button class="btn-show" onclick="revealAnswer()">👁 Reveal</button>
      <button class="btn-correct" onclick="markCorrect()">✅ Right</button>
      <button class="btn-wrong" onclick="markWrong()">❌ Wrong</button>
      <button style="background:#e0e0e0;color:#333;" onclick="skipWord()">⏭ Skip</button>
    </div>
  </div>

  <div class="answer-area" id="answerArea">
    <div class="word" id="answerWord"></div>
    <div class="meta"><span id="answerPOS"></span> &nbsp; <span id="answerPage"></span></div>
  </div>

  <div class="summary" id="summary">
    <div class="big good" id="summaryScore"></div>
    <div class="detail" id="summaryDetail"></div>
    <button class="btn-show" style="margin-top:6px;" onclick="showMistakes()">📋 View Mistake Log</button>
    <button style="background:#ff9800;color:#fff;margin-top:6px;padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;" onclick="retryWrong()">🔄 Retry Wrong Only</button>
    <button style="background:#e0e0e0;color:#333;margin-top:6px;padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;" onclick="exportMistakes()">💾 Export Mistakes</button>
  </div>
  <div class="mistake-log" id="mistakeLog"></div>
  <div class="note">✍️ Write on paper &nbsp;·&nbsp; 🎧 Auto-play each word twice &nbsp;·&nbsp; 3s gap</div>
</div>

<script>
const words = [
  {w:"fascinate",pos:"v.",page:"P.30",cn:"使著迷"},
  {w:"problematic",pos:"adj.",page:"P.30",cn:"有問題的"},
  {w:"inaccurate",pos:"adj.",page:"P.30",cn:"不準確的"},
  {w:"insights",pos:"n.",page:"P.30",cn:"見解"},
  {w:"grave",pos:"adj.",page:"P.30",cn:"嚴重的"},
  {w:"threaten",pos:"v.",page:"P.30",cn:"威脅"},
  {w:"severe",pos:"adj.",page:"P.30",cn:"嚴重的"},
  {w:"inhabitants",pos:"n.",page:"P.30",cn:"居民"},
  {w:"remedy",pos:"n.",page:"P.30",cn:"補救方法"},
  {w:"current",pos:"adj.",page:"P.30",cn:"當前的"},
  {w:"occur",pos:"v.",page:"P.30",cn:"發生"},
  {w:"surge",pos:"v.",page:"P.31",cn:"激增"},
  {w:"skyrocketed",pos:"v.",page:"P.31",cn:"暴漲"},
  {w:"disrupted",pos:"v.",page:"P.31",cn:"擾亂"},
  {w:"adequate",pos:"adj.",page:"P.31",cn:"足夠的"},
  {w:"compound",pos:"v.",page:"P.31",cn:"加劇"},
  {w:"aggravating",pos:"v.",page:"P.31",cn:"加重的"},
  {w:"dependent",pos:"adj.",page:"P.31",cn:"依賴的"},
  {w:"pragmatic",pos:"adj.",page:"P.31",cn:"務實的"},
  {w:"ethical",pos:"adj.",page:"P.31",cn:"道德的"},
  {w:"artificial intelligence",pos:"n.ph.",page:"P.31",cn:"人工智能"},
  {w:"so-called",pos:"adj.",page:"P.31",cn:"所謂的"},
  {w:"cognitive",pos:"adj.",page:"P.31",cn:"認知的"},
  {w:"sophisticated",pos:"adj.",page:"P.31",cn:"精密的"},
  {w:"indistinguishable",pos:"adj.",page:"P.31",cn:"無法區分的"},
  {w:"concerned",pos:"adj.",page:"P.31",cn:"擔心的"},
  {w:"undoubtedly",pos:"adv.",page:"P.34",cn:"毫無疑問地"},
  {w:"astonishing",pos:"adj.",page:"P.34",cn:"驚人的"},
  {w:"manipulate",pos:"v.",page:"P.34",cn:"操縱"},
  {w:"immersed",pos:"v.",page:"P.34",cn:"沉浸於"},
  {w:"captured",pos:"v.",page:"P.34",cn:"捕捉"},
  {w:"envisions",pos:"v.",page:"P.34",cn:"設想"},
  {w:"digital",pos:"adj.",page:"P.34",cn:"數碼的"},
  {w:"embark on",pos:"ph.v.",page:"P.34",cn:"開始"},
  {w:"deceased",pos:"adj.",page:"P.35",cn:"已故的"},
  {w:"fathom",pos:"v.",page:"P.35",cn:"理解"},
  {w:"contemplate",pos:"v.",page:"P.56",cn:"沉思"},
  {w:"primates",pos:"n.",page:"P.56",cn:"靈長類動物"},
  {w:"conservation",pos:"n.",page:"P.56",cn:"保育"},
  {w:"haven",pos:"n.",page:"P.56",cn:"避風港"},
  {w:"deplorable",pos:"adj.",page:"P.56",cn:"可悲的"},
  {w:"trafficking",pos:"n.",page:"P.56",cn:"非法販運"},
  {w:"poaching",pos:"n.",page:"P.56",cn:"偷獵"},
  {w:"exploitation",pos:"n.",page:"P.57",cn:"剝削"},
  {w:"industriously",pos:"adv.",page:"P.57",cn:"勤奮地"},
  {w:"unarguably",pos:"adv.",page:"P.57",cn:"無可爭辯地"},
  {w:"stimulate",pos:"v.",page:"P.57",cn:"刺激"},
  {w:"trauma",pos:"n.",page:"P.57",cn:"創傷"},
  {w:"outraged",pos:"adj.",page:"P.57",cn:"憤怒的"},
  {w:"ignorantly",pos:"adv.",page:"P.57",cn:"無知地"},
  {w:"vulnerable",pos:"adj.",page:"P.60",cn:"脆弱的"},
  {w:"tolerate",pos:"v.",page:"P.60",cn:"容忍"},
  {w:"solitary",pos:"adj.",page:"P.60",cn:"孤獨的"},
  {w:"Yours faithfully",pos:"ph.",page:"P.61",cn:"您忠實的"},
  {w:"brink",pos:"n.",page:"P.61",cn:"邊緣"},
];

let queue=[], idx=0, correctCount=0, mistakeLog=[], currentSpeed=1.0;
let autoMode=false, autoTimer=null, selectedVoice=null, voices=[];

function setSpeed(v){currentSpeed=parseFloat(v);}

function initQueue(){
  queue=[...words]; idx=0; correctCount=0; mistakeLog=[]; stopAuto();
  updateUI(); hideAll();
}

function shuffleWords(){
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}
  idx=0; updateUI(); hideAll();
}

function resetAll(){ stopAuto(); initQueue(); }

function hideAll(){
  document.getElementById('answerArea').style.display='none';
  document.getElementById('actionBtns').style.display='none';
  document.getElementById('hintRow').style.display='none';
  document.getElementById('countdown').textContent='';
  document.getElementById('summary').style.display='none';
  document.getElementById('mistakeLog').style.display='none';
  if(!autoMode) document.getElementById('autoBtn').className='btn-auto';
}

function updateUI(){
  document.getElementById('counter').textContent = queue.length===0 ? 'Complete!' : `Word ${idx+1} / ${queue.length}`;
  document.getElementById('pbar').style.width = queue.length===0?'100%':(idx/queue.length*100)+'%';
  document.getElementById('bigStatus').innerHTML = queue.length===0 ? 'Done!<span class="cn">完成</span>' : 'Ready<span class="cn">準備</span>';
  document.getElementById('subStatus').textContent = '';
  hideAll();
  if(queue.length===0){ showSummary(); }
  document.getElementById('playArea').style.display='flex';
}

function getBestVoice(){
  return voices.find(v=>v.name.includes('Daniel')&&v.lang.startsWith('en-GB'))
      || voices.find(v=>v.name.includes('Google UK English Female'))
      || voices.find(v=>v.name.includes('Google UK English Male'))
      || voices.find(v=>v.lang.startsWith('en-GB'))
      || voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen'))
      || voices[0];
}

function populateVoices(){
  voices = window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(voices.length===0){ voices=window.speechSynthesis.getVoices(); }
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = voices.map((v,i)=>
    `<option value="${i}"${v===selectedVoice?' selected':''}>${v.name} (${v.lang})</option>`
  ).join('');
  if(!selectedVoice || !voices.includes(selectedVoice)){
    selectedVoice = getBestVoice();
    sel.value = voices.indexOf(selectedVoice);
  }
}

function selectVoice(){
  const i = parseInt(document.getElementById('voiceSelect').value);
  if(!isNaN(i) && voices[i]) selectedVoice = voices[i];
}

// Initial voice setup
window.speechSynthesis.onvoiceschanged = ()=>{
  populateVoices();
};
setTimeout(()=>{
  voices = window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(voices.length===0) voices = window.speechSynthesis.getVoices();
  populateVoices();
}, 200);

let speakSafetyTimer = null;

function speak(text, callback){
  if(speakSafetyTimer) clearTimeout(speakSafetyTimer);

  window.speechSynthesis.cancel();

  // Chrome sometimes needs a moment after cancel before speaking again
  setTimeout(()=>{
    window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    u.rate = currentSpeed;
    u.pitch = 1;
    if(selectedVoice) u.voice = selectedVoice;

    let fired = false;
    const done = ()=>{
      if(fired) return;
      fired = true;
      if(speakSafetyTimer) clearTimeout(speakSafetyTimer);
      if(callback) callback();
    };

    u.onend = done;
    u.onerror = (e)=>{
      // 'canceled' or 'interrupted' are expected when we cancel; ignore them
      if(e.error==='canceled'||e.error==='interrupted') return;
      done();
    };

    // Safety net: if onend never fires, force callback after estimated duration
    const estimatedMs = Math.max(1200, text.length * 90 / currentSpeed + 600);
    speakSafetyTimer = setTimeout(done, estimatedMs);

    window.speechSynthesis.speak(u);
  }, 60);
}

function toggleAuto(){
  if(autoMode){ stopAuto(); return; }
  if(queue.length===0) return;
  autoMode = true;
  document.getElementById('autoBtn').textContent = '⏸ Stop Auto';
  document.getElementById('autoBtn').classList.add('running');
  document.getElementById('actionBtns').style.display='none';
  runAutoCycle();
}

function stopAuto(){
  autoMode = false;
  if(autoTimer) clearTimeout(autoTimer);
  window.speechSynthesis.cancel();
  document.getElementById('autoBtn').textContent = '▶ Start Auto-Play';
  document.getElementById('autoBtn').classList.remove('running');
  document.getElementById('countdown').textContent = '';
}

function runAutoCycle(){
  if(!autoMode || idx>=queue.length){ stopAuto(); if(idx>=queue.length) showSummary(); return; }
  const word = queue[idx].w;

  // Show hints
  document.getElementById('hintRow').style.display='flex';
  document.getElementById('hintCN').textContent = queue[idx].cn;
  document.getElementById('hintLetter').textContent = word.charAt(0)+
    '_'.repeat(Math.max(0,word.length-1)).replace(/ /g,'\u00A0\u00A0');
  document.getElementById('answerArea').style.display='none';
  document.getElementById('actionBtns').style.display='none';
  document.getElementById('bigStatus').innerHTML = `Word ${idx+1}<span class="cn">第 ${idx+1} 個</span>`;

  // Play word twice with 3s gap
  let count = 0;
  function playLoop(){
    if(!autoMode) return;
    if(count >= 2){
      // After 2 plays, show answer for 3 seconds then move on
      revealAnswer();
      document.getElementById('bigStatus').innerHTML = 'Check your answer<span class="cn">核對答案</span>';
      document.getElementById('subStatus').textContent = 'Auto-advancing in 3s...';
      
      // Countdown 3, 2, 1
      let cd = 3;
      document.getElementById('countdown').textContent = cd;
      const cdTimer = setInterval(()=>{
        cd--;
        if(cd<=0 || !autoMode){ clearInterval(cdTimer); document.getElementById('countdown').textContent=''; return; }
        document.getElementById('countdown').textContent = cd;
      }, 1000);

      autoTimer = setTimeout(()=>{
        if(!autoMode) return;
        mistakeLog.push({word:queue[idx],correct:null});
        idx++;
        if(idx >= queue.length){ showSummary(); stopAuto(); return; }
        // Don't call updateUI() here — it calls hideAll which resets too much.
        // Just refresh what we need for the next word.
        document.getElementById('counter').textContent = `Word ${idx+1} / ${queue.length}`;
        document.getElementById('pbar').style.width = (idx/queue.length*100)+'%';
        document.getElementById('answerArea').style.display='none';
        document.getElementById('actionBtns').style.display='none';
        document.getElementById('countdown').textContent='';
        runAutoCycle();
      }, 3000);
      return;
    }
    count++;
    document.getElementById('subStatus').textContent = `Playing (${count}/2) · ${currentSpeed}× · 3s gap`;
    speak(word, ()=>{
      if(!autoMode) return;
      autoTimer = setTimeout(playLoop, count===1?3000:500);
    });
  }
  playLoop();
}

function revealAnswer(){
  const w = queue[idx];
  document.getElementById('answerArea').style.display='block';
  document.getElementById('answerWord').textContent = w.w;
  document.getElementById('answerPOS').textContent = w.pos;
  document.getElementById('answerPage').textContent = w.page;
}

function markCorrect(){ mistakeLog.push({word:queue[idx],correct:true}); correctCount++; advanceWord(); }
function markWrong(){ mistakeLog.push({word:queue[idx],correct:false}); advanceWord(); }
function skipWord(){ mistakeLog.push({word:queue[idx],correct:null}); advanceWord(); }

function advanceWord(){
  idx++;
  if(idx>=queue.length){ showSummary(); return; }
  updateUI();
}

function showSummary(){
  document.getElementById('playArea').style.display='none';
  document.getElementById('answerArea').style.display='none';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('counter').textContent='Complete!';
  document.getElementById('summary').style.display='block';
  const total = mistakeLog.length;
  const pct = total===0?100:Math.round(correctCount/total*100);
  const s = document.getElementById('summaryScore');
  s.textContent = `${correctCount} / ${total} correct (${pct}%)`;
  s.className = 'big '+(pct>=80?'good':pct>=60?'meh':'bad');
  document.getElementById('summaryDetail').textContent =
    total===0?'No words attempted.':`${mistakeLog.filter(m=>m.correct===false).length} words need review.`;
}

function showMistakes(){
  const wrong = mistakeLog.filter(m=>m.correct===false);
  if(wrong.length===0){
    document.getElementById('mistakeLog').innerHTML='<h3>✅ Mistake Log</h3><p>No mistakes — perfect!</p>';
  } else {
    document.getElementById('mistakeLog').innerHTML=
      `<h3>📋 Mistake Log (${wrong.length} words)</h3>`+
      wrong.map(m=>`<span class="word-item">${m.word.w} <small>(${m.word.cn})</small></span>`).join(' ');
  }
  document.getElementById('mistakeLog').style.display='block';
}

function retryWrong(){
  const wrong = mistakeLog.filter(m=>m.correct===false).map(m=>m.word);
  if(wrong.length===0){ alert('No mistakes to retry!'); return; }
  queue=wrong; idx=0; correctCount=0; mistakeLog=[]; stopAuto();
  document.getElementById('summary').style.display='none';
  document.getElementById('mistakeLog').style.display='none';
  document.getElementById('playArea').style.display='flex';
  updateUI();
}

function exportMistakes(){
  const wrong = mistakeLog.filter(m=>m.correct===false);
  if(wrong.length===0){ alert('No mistakes to export!'); return; }
  const text = wrong.map(m=>`${m.word.w} (${m.word.pos}) — ${m.word.cn}`).join('\n');
  const blob = new Blob([text],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dictation_mistakes_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}

initQueue();
</script>
</body>
</html>
